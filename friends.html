<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>الدعوات</title><style>*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;font-family:Segoe UI,Tahoma,Arial,sans-serif}body{margin:0;background:#0d0e1a;color:#fff;min-height:100vh;overflow-x:hidden;padding-bottom:92px;direction:rtl}.app{width:100%;padding:0 12px 110px}.top{position:sticky;top:0;z-index:20;background:#0d0e1a;display:flex;align-items:center;justify-content:center;padding:14px 0 12px}.top h1{margin:0;font-size:22px;font-weight:900;letter-spacing:.2px}.ic{border:0;background:none;color:#fff;padding:8px;cursor:pointer;display:flex;align-items:center;justify-content:center}.back{position:absolute;left:4px;top:8px;width:40px;height:40px}.back svg,.i svg{width:24px;height:24px;fill:none;stroke:#fff;stroke-width:2.2;stroke-linecap:round;stroke-linejoin:round}.card{background:#141526;border:1.5px solid rgba(245,166,35,.18);border-radius:16px;padding:26px 10px 24px;box-shadow:0 10px 30px rgba(0,0,0,.22)}.g{display:grid;grid-template-columns:1fr 1fr;gap:34px 8px;text-align:center}.it b{display:block;font-size:16px;font-weight:800;color:#fff;margin-bottom:8px;line-height:1.5}.it span{font-size:20px;font-weight:900;color:#f5a623}.lbl{display:block;margin:24px 2px 9px;color:#a8afc7;font-size:15px;font-weight:700;text-align:right}.fld{height:58px;background:#141526;border:1.5px solid #1e1f2e;border-radius:12px;padding:0 14px;display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:center;direction:ltr;overflow:hidden}.acts{display:flex;gap:6px}.i{width:30px;height:30px}.code{margin-left:auto;font-size:28px;font-weight:900;letter-spacing:1px;color:#fff}.url{font-size:13px;font-weight:700;color:#d6d9e8;white-space:nowrap;overflow:auto hidden;scrollbar-width:none}.url::-webkit-scrollbar{display:none}.panel:empty{display:none}.ph{margin:18px 0 4px;background:#141526;border:1.5px solid #1e1f2e;border-radius:14px;padding:18px;text-align:center;color:#9ca3af}.ph h3{margin:0 0 8px;color:#fff;font-size:16px}.foot{position:fixed;left:0;right:0;bottom:0;background:#141526;border-top:1px solid #1e2035;padding:12px 12px calc(12px + env(safe-area-inset-bottom));z-index:50}.bar{display:grid;grid-template-columns:1fr 1fr;gap:12px;direction:ltr}.btn{height:52px;border-radius:10px;border:1.5px solid #2c2f49;background:#0d0e1a;color:#fff;cursor:pointer;font-size:15px;font-weight:900}.btn.dark{background:linear-gradient(90deg,#f5a623,#ffb93e);color:#0d0e1a;border-color:#f5a623;box-shadow:0 6px 20px rgba(245,166,35,.25)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.65);display:grid;place-items:center;opacity:0;pointer-events:none;transition:.2s;z-index:99}.modal.on{opacity:1;pointer-events:auto}.box{width:min(92vw,360px);background:#141526;border:1.5px solid rgba(245,166,35,.25);border-radius:18px;padding:18px;text-align:center;box-shadow:0 20px 50px rgba(0,0,0,.5)}.box h3{margin:0 0 12px;font-size:18px;font-weight:900;color:#f5a623}.box img{width:min(72vw,260px);height:auto;display:block;margin:0 auto 12px;background:#fff;padding:10px;border-radius:14px}.toast{position:fixed;left:50%;top:16px;transform:translateX(-50%) translateY(-12px);background:#f5a623;color:#0d0e1a;padding:10px 14px;border-radius:999px;font-size:13px;font-weight:900;opacity:0;pointer-events:none;transition:.25s;z-index:120}.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}</style></head><body><main class="app"><header class="top"><button class="ic back" id="bB" aria-label="رجوع"><svg viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg></button><h1>الدعوات</h1></header><section class="card"><div class="g"><div class="it"><b>عدد أعضاء الفريق</b><span>1</span></div><div class="it"><b>عدد المستخدمين التابعين الفعالين</b><span>0</span></div><div class="it"><b>عدد عمليات الشحن</b><span>0</span></div><div class="it"><b>مبلغ الشحن (USDT)</b><span>0</span></div><div class="it"><b>عدد نسخ التداول</b><span> tElementById('panel');let _t;function toast(m){tE.textContent=m;tE.classList.add('on');clearTimeout(_t);_t=setTimeout(()=>tE.classList.remove('on'),1800)}function copy(v){if(navigator.clipboard&&location.protocol==='https:')navigator.clipboard.writeText(v).then(()=>toast('✅ تم النسخ'));else{const a=document.createElement('textarea');a.value=v;document.body.appendChild(a);a.select();document.execCommand('copy');a.remove();toast('✅ تم النسخ')}}function showLog(t){panel.innerHTML='<div class="ph"><h3>'+t+'</h3><p>لا توجد بيانات حالياً</p></div>';window.scrollTo({top:document.body.scrollHeight,behavior:'smooth'})}document.getElementById('bB').onclick=()=>history.back();document.getElementById('bCC').onclick=()=>copy(IC);document.getElementById('bCL').onclick=()=>copy(IL);document.getElementById('bQR').onclick=()=>{qrI.src='https://api.qrserver.com/v1/create-qr-code/?size=320x320&data='+encodeURIComponent(IL);qrM.classList.add('on')};document.getElementById('bCQ').onclick=()=>qrM.classList.remove('on');qrM.onclick=()=>qrM.classList.remove('on');document.getElementById('qrB').onclick=e=>e.stopPropagation();document.getElementById('bCH').onclick=()=>showLog('سجل شحن الفريق');document.getElementById('bIN').onclick=()=>showLog('سجل الدعوات');</script></body></html>
