<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📋 حسابات المستخدمين</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: #0a0a0f;
            color: #eee;
            padding: 20px;
            direction: rtl;
        }
        .container {
            max-width: 1300px;
            margin: auto;
            background: #12121a;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.8);
            border: 1px solid #2a2a35;
        }
        h1 {
            color: #f5c518;
            font-size: 28px;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .sub {
            color: #888;
            font-size: 14px;
            margin-bottom: 25px;
            border-bottom: 1px solid #2a2a35;
            padding-bottom: 15px;
        }
        .stats {
            display: flex;
            gap: 25px;
            flex-wrap: wrap;
            margin-bottom: 25px;
            background: #1a1a26;
            padding: 15px 20px;
            border-radius: 14px;
        }
        .stats span {
            color: #aaa;
            font-size: 14px;
        }
        .stats strong {
            color: #fff;
            font-size: 18px;
            margin-left: 5px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
        }
        th {
            background: #1f1f2e;
            color: #f5c518;
            padding: 14px 12px;
            text-align: right;
            border-bottom: 2px solid #f5c518;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #2a2a35;
            vertical-align: middle;
        }
        tr:hover {
            background: #1a1a26;
        }
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
        }
        .badge-gold {
            background: #f5c51820;
            color: #f5c518;
            border: 1px solid #f5c51840;
        }
        .badge-green {
            background: #22c55e20;
            color: #22c55e;
            border: 1px solid #22c55e40;
        }
        .badge-red {
            background: #ef444420;
            color: #ef4444;
            border: 1px solid #ef444440;
        }
        .badge-blue {
            background: #3b82f620;
            color: #3b82f6;
            border: 1px solid #3b82f640;
        }
        .refresh-btn {
            background: #f5c518;
            color: #000;
            border: none;
            padding: 10px 28px;
            border-radius: 30px;
            font-weight: 800;
            font-size: 15px;
            cursor: pointer;
            transition: 0.2s;
            margin-top: 10px;
        }
        .refresh-btn:hover {
            background: #d4a80f;
            transform: scale(1.02);
        }
        .loading {
            text-align: center;
            padding: 40px;
            color: #888;
        }
        .error {
            color: #ef4444;
            background: #1a0a0a;
            padding: 20px;
            border-radius: 12px;
            border: 1px solid #ef444440;
        }
        .count-badge {
            background: #2a2a35;
            padding: 2px 12px;
            border-radius: 30px;
            font-size: 14px;
            color: #ccc;
        }
        @media (max-width: 700px) {
            table { font-size: 12px; }
            th, td { padding: 8px 6px; }
            .stats { flex-direction: column; gap: 8px; }
        }
    </style>
</head>
<body>
<div class="container">
    <h1>📋 حسابات المستخدمين</h1>
    <div class="sub">قائمة جميع المستخدمين المسجلين في منصة التداول</div>

    <div class="stats">
        <span>👥 إجمالي المسجلين: <strong id="total-users">0</strong></span>
        <span>✅ الموثقون (KYC): <strong id="kyc-users">0</strong></span>
        <span>🪙 الرصيد الإجمالي: <strong id="total-balance">0.00</strong> $</span>
        <span>📅 آخر تحديث: <strong id="last-update">-</strong></span>
    </div>

    <button class="refresh-btn" onclick="fetchUsers()">🔄 تحديث البيانات</button>
    <div style="margin-top: 20px; overflow-x: auto;">
        <div id="table-container">
            <div class="loading">⏳ جاري تحميل بيانات المستخدمين...</div>
        </div>
    </div>
</div>

<script>
    // ==================== بيانات الاتصال ====================
    const SUPABASE_URL = 'https://kxdgowkgprvygsntqyrd.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4ZGdvd2tncHJ2eWdzbnRxeXJkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODM5MjY5MzYsImV4cCI6MjA5OTUwMjkzNn0._hmiFAW9TWWtH8hLdwUVBJkYK71V_DpAXMExpD2jzFw';

    async function fetchUsers() {
        const container = document.getElementById('table-container');
        container.innerHTML = `<div class="loading">⏳ جاري التحميل...</div>`;

        try {
            const response = await fetch(`${SUPABASE_URL}/rest/v1/profiles?select=*`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });

            if (!response.ok) {
                throw new Error(`HTTP ${response.status} - ${response.statusText}`);
            }

            const users = await response.json();

            if (!users || users.length === 0) {
                container.innerHTML = `<div class="loading">📭 لا يوجد مستخدمون مسجلون حالياً.</div>`;
                return;
            }

            // إحصائيات
            document.getElementById('total-users').innerText = users.length;
            const kycCount = users.filter(u => u.kyc_status === 'verified').length;
            document.getElementById('kyc-users').innerText = kycCount;
            const totalBal = users.reduce((sum, u) => sum + (parseFloat(u.wallet_balance) || 0), 0);
            document.getElementById('total-balance').innerText = totalBal.toFixed(2);
            document.getElementById('last-update').innerText = new Date().toLocaleString('ar-EG');

            // بناء الجدول
            let html = `
                <table>
                    <thead>
                        <tr>
                            <th>#</th>
                            <th>المعرف (UID)</th>
                            <th>اسم المستخدم</th>
                            <th>البريد الإلكتروني</th>
                            <th>الرصيد ($)</th>
                            <th>حالة KYC</th>
                            <th>المدعو من</th>
                            <th>تاريخ التسجيل</th>
                        </tr>
                    </thead>
                    <tbody>
            `;

            users.forEach((u, i) => {
                const kycBadge = u.kyc_status === 'verified'
                    ? `<span class="badge badge-green">✅ موثق</span>`
                    : u.kyc_status === 'pending'
                    ? `<span class="badge badge-blue">⏳ قيد المراجعة</span>`
                    : `<span class="badge badge-red">❌ غير موثق</span>`;

                html += `
                    <tr>
                        <td>${i + 1}</td>
                        <td><span class="badge badge-gold">${u.user_uid || '—'}</span></td>
                        <td><strong>${u.username || '—'}</strong></td>
                        <td style="direction: ltr; font-size: 13px;">${u.email || '—'}</td>
                        <td style="direction: ltr; font-weight: 700; color: #f5c518;">${(parseFloat(u.wallet_balance) || 0).toFixed(2)}</td>
                        <td>${kycBadge}</td>
                        <td>${u.referred_by || '—'}</td>
                        <td style="font-size: 12px; color: #aaa;">${u.created_at ? new Date(u.created_at).toLocaleDateString('ar-EG') : '—'}</td>
                    </tr>
                `;
            });

            html += `</tbody></table>`;
            container.innerHTML = html;

        } catch (error) {
            container.innerHTML = `
                <div class="error">
                    ❌ فشل تحميل البيانات: ${error.message}<br>
                    <small>تأكد من اتصالك بالإنترنت وصحة المفتاح.</small>
                </div>
            `;
            console.error('خطأ في جلب البيانات:', error);
        }
    }

    // تشغيل التحميل عند فتح الصفحة
    fetchUsers();
</script>
</body>
</html>
