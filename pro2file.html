<!DOCTYPE html><html dir="rtl" lang="ar"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
body{background:#0d1526;color:#fff;padding:14px 16px 40px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px}
.top .search{color:#9aa4b8;font-size:22px}
.top .asset{display:flex;align-items:center;gap:10px;color:#c7cede;font-size:17px}
.top .asset span:first-child{color:#8b95ab;font-size:20px}
.tabs{display:flex;gap:28px;border-bottom:1px solid #1c273d;margin-bottom:16px}
.tab{padding-bottom:12px;font-size:17px;font-weight:600;color:#6b7690;cursor:pointer;border-bottom:3px solid transparent}
.tab.active{color:#fff;border-color:#ff7a1a}
.filters{display:flex;gap:10px;margin-bottom:18px;overflow-x:auto}
.pill{border:1px solid #2a3652;border-radius:22px;padding:11px 18px;font-size:15px;color:#dfe3ec;white-space:nowrap;cursor:pointer;background:transparent}
.pill.sel{border-color:#ff7a1a;color:#ff7a1a}
.gear{border:1px solid #2a3652;border-radius:50%;width:44px;height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px}
.row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #182238}
.row .left{display:flex;align-items:center;gap:18px}
.star{font-size:24px;color:#4b5670;cursor:pointer;user-select:none}
.star.on{color:#ff9f2e}
.pct{color:#25d998;font-size:19px;font-weight:700;min-width:60px}
.name{font-size:19px;font-weight:600}
.icon{position:relative;width:46px;height:46px;border-radius:50%;background:#1c2740;display:flex;align-items:center;justify-content:center;font-size:20px;overflow:hidden}
.otc{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);background:#ff7a1a;color:#fff;font-size:9px;font-weight:700;padding:1px 5px;border-radius:6px;white-space:nowrap}
</style></head>
<body>
<div class="top"><div class="search">🔍</div><div class="asset"><span>➜</span><span>اختر أحد الأصول</span></div></div>
<div class="tabs">
 <div class="tab active" data-t="1">خيارات ثنائية (Binary)</div>
 <div class="tab" data-t="2">Blitz</div>
</div>
<div class="filters">
 <div class="pill" data-f>السلع</div>
 <div class="pill sel" data-f>أسهم مالية</div>
 <div class="pill sel" data-f>أزواج العملات</div>
 <div class="gear">⚙️</div>
</div>
<div id="list"></div>

<script>
const assets=[
{p:87,n:'FET (OTC)',i:'🐼',bg:'#c9e88f'},
{p:87,n:'Render (OTC)',i:'📡',bg:'#e5453d'},
{p:87,n:'TAO (OTC)',i:'Ⓣ',bg:'#fff',c:'#000'},
{p:85,n:'EUR/USD (OTC)',i:'🇪🇺🇺🇸'},
{p:85,n:'EUR/GBP (OTC)',i:'🇪🇺🇬🇧'},
{p:85,n:'USD/CHF (OTC)',i:'🇺🇸🇨🇭'},
{p:85,n:'EUR/JPY (OTC)',i:'🇪🇺🇯🇵'},
{p:85,n:'NZD/USD (OTC)',i:'🇳🇿🇺🇸'},
{p:85,n:'GBP/USD (OTC)',i:'🇬🇧🇺🇸'}
];
document.getElementById('list').innerHTML=assets.map(a=>`
<div class="row">
 <div class="left">
  <div class="star" onclick="this.classList.toggle('on');this.textContent=this.classList.contains('on')?'★':'☆'">☆</div>
  <div class="pct">+${a.p}%</div>
 </div>
 <div class="name">${a.n}</div>
 <div class="icon" style="background:${a.bg||'#1c2740'};color:${a.c||'#fff'}">${a.i}<span class="otc">OTC</span></div>
</div>`).join('');

document.querySelectorAll('.tab').forEach(t=>t.onclick=()=>{document.querySelectorAll('.tab').forEach(x=>x.classList.remove('active'));t.classList.add('active')});
document.querySelectorAll('.pill').forEach(p=>p.onclick=()=>p.classList.toggle('sel'));
</script>
</body></html>
