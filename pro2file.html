<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
body{background:#0d1526;color:#fff;padding:18px 16px 40px;direction:rtl}
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.search-icon{font-size:22px;color:#aab4c8}
.asset-pick{display:flex;align-items:center;gap:10px;color:#c7cede;font-size:17px}
.tabs{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #1c273d;margin-bottom:16px}
.tab{padding-bottom:13px;font-size:18px;font-weight:600;color:#6b7690;position:relative}
.tab.active{color:#fff}
.tab.active::after{content:"";position:absolute;bottom:-1px;right:0;left:0;height:3px;background:#ff7a1a;border-radius:2px}
.filters{display:flex;align-items:center;gap:8px;margin-bottom:20px;overflow-x:auto;padding-bottom:4px}
.pill{border:1px solid #2b3752;border-radius:24px;padding:11px 16px;font-size:14px;color:#dfe3ec;white-space:nowrap;cursor:pointer;flex-shrink:0}
.pill.sel{border-color:#ff7a1a;color:#ff7a1a}
.gear{border:1px solid #2b3752;border-radius:50%;width:44px;height:44px;min-width:44px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:16px;color:#c7cede;flex-shrink:0}
.row{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-bottom:1px solid #182238}
.row-right{display:flex;align-items:center;gap:14px;min-width:0}
.row-left{display:flex;align-items:center;gap:14px;flex-shrink:0}
.icon{position:relative;width:40px;height:40px;flex-shrink:0;display:flex;align-items:center;justify-content:center}
.icon img{width:36px;height:36px;object-fit:contain}
.icon .ph{width:36px;height:36px;background:#26314c;border-radius:6px}
.otc{position:absolute;bottom:-4px;left:50%;transform:translateX(-50%);background:#ff7a1a;color:#fff;font-size:8px;font-weight:700;padding:1px 6px;border-radius:6px;white-space:nowrap}
.name{font-size:17px;font-weight:600;color:#fff;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pct{color:#25d998;font-size:18px;font-weight:700;direction:ltr;unicode-bidi:embed}
.star{font-size:24px;color:#4b5670;cursor:pointer;user-select:none;line-height:1}
</style>
</head>
<body>

<div class="top">
  <div class="asset-pick"><span>→</span><span>اختر أحد الأصول</span></div>
  <div class="search-icon">🔍</div>
</div>

<div class="tabs">
  <div class="tab">Blitz</div>

</div>

<div class="filters" id="filters">

  <div class="pill" data-cat="commodities">السلع</div>
  <div class="pill" data-cat="indices">مؤشرات</div>

const listEl = document.getElementById('list');
let activeCats = [];

function render(){
  const cats = activeCats.length ? activeCats : Object.keys(data);
  let items = [];
  cats.forEach(c => data[c].forEach(([n,u]) => items.push([n,u])));

  listEl.innerHTML = items.map(([name,url]) => `
    <div class="row">
      <div class="row-right">
        <div class="icon">
          ${url ? `<img src="${url}" alt="">` : `<div class="ph"></div>`}
          <span class="otc">OTC</span>
        </div>
        <div class="name">${name}</div>
      </div>
      <div class="row-left">
        <div class="pct">+${DEF_PCT}%</div>
        <div class="star" onclick="this.textContent=this.textContent==='☆'?'★':'☆';this.style.color=this.textContent==='★'?'#ff9f2e':'#4b5670'">☆</div>
      </div>
    </div>
  `).join('');
}
