<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif}
body{background:#0d1526;color:#fff;padding:18px 16px 40px;direction:rtl}

/* الشريط العلوي */
.top{display:flex;align-items:center;justify-content:space-between;margin-bottom:22px}
.search-icon{font-size:22px;color:#aab4c8}
.asset-pick{display:flex;align-items:center;gap:10px;color:#c7cede;font-size:17px}
.asset-pick .arrow{font-size:19px;color:#c7cede}

/* التبويبات */
.tabs{display:flex;justify-content:space-between;align-items:flex-end;border-bottom:1px solid #1c273d;margin-bottom:16px}
.tab{padding-bottom:13px;font-size:18px;font-weight:600;color:#6b7690;position:relative}
.tab.active{color:#fff}
.tab.active::after{content:"";position:absolute;bottom:-1px;right:0;left:0;height:3px;background:#ff7a1a;border-radius:2px}
.tab.blitz{color:#8b95ab}

/* أزرار التصنيف */
.filters{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:20px}
.group{display:flex;border:1px solid #2b3752;border-radius:24px;overflow:hidden}
.pill{padding:12px 20px;font-size:15px;color:#dfe3ec;white-space:nowrap;cursor:pointer}
.group .pill:first-child{border-left:1px solid #2b3752}
.solo{border:1px solid #2b3752;border-radius:24px;padding:12px 20px;font-size:15px;color:#dfe3ec;white-space:nowrap;cursor:pointer}
.gear{border:1px solid #2b3752;border-radius:50%;width:46px;height:46px;min-width:46px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:17px;color:#c7cede}

/* قائمة الأصول */
.row{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-bottom:1px solid #182238}
.row-right{display:flex;align-items:center;gap:16px}
.row-left{display:flex;align-items:center;gap:16px}
.icon{position:relative;width:44px;height:44px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:19px;overflow:hidden;flex-shrink:0}
.otc{position:absolute;bottom:-3px;left:50%;transform:translateX(-50%);background:#ff7a1a;color:#fff;font-size:8px;font-weight:700;padding:1px 6px;border-radius:6px;white-space:nowrap;border:1.5px solid #0d1526}
.name{font-size:19px;font-weight:600;color:#fff}
.pct{color:#25d998;font-size:19px;font-weight:700;direction:ltr;unicode-bidi:embed}
.star{font-size:25px;color:#4b5670;cursor:pointer;user-select:none;line-height:1}
</style>
</head>
<body>

<div class="top">
  <div class="asset-pick"><span class="arrow">→</span><span>اختر أحد الأصول</span></div>
  <div class="search-icon">🔍</div>
</div>

<div class="tabs">
  <div class="tab blitz">Blitz</div>
  <div class="tab active">خيارات ثنائية (Binary)</div>
</div>

<div class="filters">
  <div class="group">
    <div class="pill">أزواج العملات</div>
    <div class="pill">أسهم مالية</div>
  </div>
  <div class="solo">السلع</div>
  <div class="gear">⎓</div>
</div>

<div id="list"></div>

<script>
const assets=[
{p:87,n:'FET (OTC)',bg:'#c9e88f',i:'🐼'},
{p:87,n:'Render (OTC)',bg:'#e5453d',i:'📡'},
{p:87,n:'TAO (OTC)',bg:'#fff',c:'#111',i:'Ⓣ'},
{p:85,n:'EUR/USD (OTC)',bg:'#1c2740',i:'🇪🇺🇺🇸'},
{p:85,n:'EUR/GBP (OTC)',bg:'#1c2740',i:'🇪🇺🇬🇧'},
{p:85,n:'USD/CHF (OTC)',bg:'#1c2740',i:'🇺🇸🇨🇭'},
{p:85,n:'EUR/JPY (OTC)',bg:'#1c2740',i:'🇪🇺🇯🇵'},
{p:85,n:'NZD/USD (OTC)',bg:'#1c2740',i:'🇳🇿🇺🇸'}
];

document.getElementById('list').innerHTML = assets.map(a => `
  <div class="row">
    <div class="row-right">
      <div class="icon" style="background:${a.bg};color:${a.c||'#fff'}">${a.i}<span class="otc">OTC</span></div>
      <div class="name">${a.n}</div>
    </div>
    <div class="row-left">
      <div class="pct">+${a.p}%</div>
      <div class="star" onclick="this.textContent=this.textContent==='☆'?'★':'☆'; this.style.color=this.textContent==='★'?'#ff9f2e':'#4b5670'">☆</div>
    </div>
  </div>
`).join('');

document.querySelectorAll('.tab').forEach(t => t.onclick = () => {
  document.querySelectorAll('.tab').forEach(x => x.classList.remove('active'));
  t.classList.add('active');
});
document.querySelectorAll('.pill,.solo').forEach(p => p.onclick = () => p.classList.toggle('sel'));
</script>
</body>
</html>
