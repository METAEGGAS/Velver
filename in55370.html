<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#0d1730" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<title>FXER - Trading Chart</title>

<!-- ============================================================
     TradingView Lightweight Charts (Official CDN) - KEPT FROM ORIGINAL
     ============================================================ -->
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>

<!-- ============================================================
     Firebase SDK v12 (App + Auth + Firestore)
     - Auth : للتحقق من جلسة المستخدم
     - Firestore : لمزامنة currentIndex العالمي بين جميع الأجهزة
     ============================================================ -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-analytics.js";
  import {
    getAuth,
    onAuthStateChanged
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";
  import {
    getFirestore,
    doc,
    getDoc,
    setDoc,
    onSnapshot,
    runTransaction,
    serverTimestamp
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDQIKQ5swu_XnVtqET0B9EelRKFjr0LXHI",
    authDomain: "ksksjsh-724f2.firebaseapp.com",
    projectId: "ksksjsh-724f2",
    storageBucket: "ksksjsh-724f2.firebasestorage.app",
    messagingSenderId: "1046924412561",
    appId: "1:1046924412561:web:1a40834236da75d0d6e130",
    measurementId: "G-5D3YJQDH8B"
  };

  const app       = initializeApp(firebaseConfig);
  try { getAnalytics(app); } catch(e) { /* analytics قد لا يعمل في بيئات معينة */ }
  const auth      = getAuth(app);
  const firestore = getFirestore(app);

  // نُصدِّر ما يحتاجه بقية الكود إلى الـ window حتى يستطيع النص العادي (non-module) استخدامه.
  window.FIREBASE = {
    app,
    auth,
    firestore,
    onAuthStateChanged,
    doc,
    getDoc,
    setDoc,
    onSnapshot,
    runTransaction,
    serverTimestamp,
    ready: true
  };

  // إشعار بقية الكود بأن Firebase جاهز (لأن module قد يُحمَّل بعد DOMContentLoaded).
  window.dispatchEvent(new Event('firebase-ready'));
</script>

<style>
  /* ============================================================
     DESIGN COPIED VERBATIM FROM REFERENCE FILE
     (erg_modV3ified_firestore_leaderboard.html)
     - Colors, sizing, spacing, radii, borders, layout
     - NO business logic, no data, only visual design
     ============================================================ */
  :root{
    --u:#0d1730;
    --bd:#223252;
  }
  *{
    box-sizing:border-box;
    -webkit-tap-highlight-color:transparent;
    margin:0;
    padding:0;
  }
  body,html{
    height:100%;
    overflow:hidden;
  }
  body{
    background:var(--u);
    color:#eef5ff;
    user-select:none;
    font:500 11px/1.15 system-ui,-apple-system,Segoe UI,Tahoma,Arial,sans-serif;
  }

  /* -------- APP CONTAINER -------- */
  .app{
    background:var(--u);
    width:100vw;
    height:100dvh;
    padding-bottom:env(safe-area-inset-bottom);
    padding-top:env(safe-area-inset-top);
    flex-direction:column;
    display:flex;
    position:relative;
  }

  /* -------- TOP BAR (balance + bonus) -------- */
  .top{
    direction:ltr;
    flex:none;
    justify-content:space-between;
    align-items:flex-start;
    padding:5px 5px 3px;
    display:flex;
  }
  .tc{
    background:var(--u);
    border:1px solid var(--bd);
    direction:ltr;
    border-radius:8px;
    max-width:255px;
    padding:3px 8px;
  }
  .t1{
    align-items:center;
    display:flex;
    justify-content:space-between;
    gap:8px;
  }
  .lg{
    align-items:center;
    display:flex;
    gap:6px;
  }
  .d{
    color:#fff;
    background:#f1ad24;
    border-radius:4px;
    place-items:center;
    width:17px;
    height:17px;
    font:800 12px/1 system-ui;
    display:grid;
  }
  .nm{
    color:#fff;
    white-space:nowrap;
    align-items:center;
    gap:4px;
    font-size:11px;
    font-weight:500;
    display:flex;
  }
  .nm b{
    color:#f1ad24;
    font-size:13px;
    font-weight:600;
    line-height:1;
  }
  .t2{
    align-items:center;
    display:flex;
    color:#ffcf54;
    margin-top:2px;
    font-size:14px;
    font-weight:500;
    letter-spacing:.2px;
  }
  .usd{
    color:#ffcf54;
    border:1px solid #8d6b1f;
    border-radius:4px;
    margin-left:6px;
    padding:1px 5px;
    font-size:8px;
    line-height:1;
  }
  .dd{
    color:#f1ad24;
    margin-top:-4px;
    font-size:16px;
    font-weight:600;
    line-height:1;
  }
  .fxBonus{
    display:inline-flex;
    align-items:center;
    gap:5px;
    background:#6429D8;
    border-radius:8px;
    padding:4px 8px;
    color:#fff;
    font-size:9px;
    font-weight:600;
    line-height:1.15;
    cursor:pointer;
    box-shadow:0 2px 6px rgba(100,41,216,.35);
    white-space:normal;
    text-align:center;
    max-width:110px;
  }
  .fxBonus img{
    width:18px;
    height:18px;
    flex:none;
    filter:brightness(0) invert(1);
  }
  .dep{
    color:#f1ad24;
    text-align:center;
    cursor:pointer;
    font-size:9px;
    line-height:1.05;
  }
  .dep img{
    filter:brightness(0) saturate(1) invert(72%) sepia(58%) saturate(720%) hue-rotate(360deg) brightness(97%) contrast(94%);
    width:32px;
    height:32px;
    margin:0 auto 3px;
    display:block;
  }

  /* -------- ASSET / PAIR ROW -------- */
  .asset{
    align-items:center;
    display:grid;
    z-index:20;
    direction:ltr;
    flex:none;
    grid-template-rows:32px;
    grid-template-columns:32px 132px;
    place-content:start;
    column-gap:3px;
    padding:3px 5px 4px;
    position:relative;
  }
  .sq{
    color:#cad6eb;
    background:var(--u);
    border:1px solid var(--bd);
    border-radius:7px;
    flex:none;
    grid-area:1/1;
    place-items:center;
    width:32px;
    height:32px;
    font-size:22px;
    display:grid;
  }
  .pair{
    background:var(--u);
    border:1px solid var(--bd);
    z-index:21;
    pointer-events:auto;
    touch-action:manipulation;
    border-radius:7px;
    flex:none;
    grid-area:1/2;
    align-items:center;
    gap:6px;
    width:132px;
    height:32px;
    padding:0 8px;
    display:flex;
    position:relative;
    cursor:pointer;
  }
  .fg{
    flex:none;
    width:30px;
    height:17px;
    position:relative;
  }
  .fg em{
    background:#fff;
    border-radius:50%;
    place-items:center;
    width:17px;
    height:17px;
    font-size:11px;
    font-style:normal;
    display:grid;
    position:absolute;
    top:0;
  }
  .fg .c{ left:0; }
  .fg .j{ left:12px; }
  .pair small{
    color:#ffffff94;
    margin-bottom:1px;
    font-size:7px;
    display:block;
  }
  .pair b{
    color:#fff;
    font-size:12px;
  }

  /* -------- CHART CONTAINER -------- */
  .chart{
    /* يمتد الشارت بعرض الشاشة كاملاً، وينتهي قبل شريط الأدوات السفلي (شريط الأسعار السفلي يمتد للآخر عادي). */
    background:transparent;
    touch-action:none;
    flex:1 1 0;
    min-height:0;
    width:100vw;
    max-width:100vw;
    margin-top:0;
    margin-inline:0;
    position:relative;
    overflow:hidden;
  }
  /* طبقة الشارت نفسها تملأ المساحة كاملة من اليمين إلى اليسار. */
  #chart{
    width:100%;
    height:100%;
    display:block;
    position:absolute;
    inset:0;
    background:transparent;
  }

  /* -------- FLOATING PRICE LABELS OVERLAY --------
     شريط أسعار عائم: أرقام فقط بدون خلفية، بدون حواف، بدون ظل، بدون بادينج.
     يقع فوق الشارت في الجانب الأيمن، مع مرور الشموع والجريد أسفله بحرية. */
  .price-overlay{
    position:absolute;
    top:0;
    right:0;
    bottom:0;
    width:56px;
    pointer-events:none;
    background:transparent;
    border:0;
    box-shadow:none;
    padding:0;
    margin:0;
    z-index:5;
    overflow:hidden;
    font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif;
  }
  .price-overlay .pl{
    position:absolute;
    right:4px;
    transform:translateY(-50%);
    color:#f1ad24;
    font-size:9px;
    line-height:1;
    background:transparent;
    border:0;
    box-shadow:none;
    padding:0;
    margin:0;
    white-space:nowrap;
    direction:ltr;
    text-align:right;
  }
  .price-overlay .pl.live{
    color:#ffffff;
    font-weight:600;
    font-size:10px;
  }
  /* علامة الزوم (Zoom debug) مخفية كلياً بناءً على طلب المستخدم */
  .zoomDebug{ display:none !important; }
  .ptm{
    z-index:6;
    pointer-events:none;
    direction:ltr;
    background:0 0;
    border:0;
    justify-content:flex-start;
    align-items:center;
    gap:6px;
    width:auto;
    height:34px;
    padding:0;
    display:flex;
    position:absolute;
    top:41px;
    left:8px;
    right:auto;
  }
  .pi{
    color:#fff;
    background:#2196f3;
    border-radius:50%;
    flex:none;
    place-items:center;
    width:18px;
    height:18px;
    font:800 12px/1 system-ui;
    display:grid;
  }
  .ptx{
    flex-direction:column;
    line-height:1;
    display:flex;
  }
  .ptx b, .ptx small{
    color:#8a99a8;
    font-weight:700;
  }
  .ptx b{ font-size:11px; }
  .ptx small{ margin-top:3px; font-size:10px; }
  .pg{
    background:#10b981;
    border-radius:50%;
    flex:none;
    width:10px;
    height:10px;
    box-shadow:0 0 0 2px #0d173099;
  }

  /* -------- ZOOM DEBUG READOUT (temporary calibration helper) -------- */
  .zoomDebug{
    z-index:7;
    pointer-events:none;
    direction:ltr;
    background:0 0;
    border:0;
    box-shadow:none;
    padding:0;
    color:#9aa9ba;
    font-size:9px;
    font-weight:700;
    white-space:nowrap;
    position:absolute;
    top:41px;
    right:8px;
  }

  /* -------- BOTTOM CHART TOOLBAR (.bar) -------- */
  .bar{
    background:var(--u);
    direction:ltr;
    flex:none;
    justify-content:space-between;
    align-items:center;
    gap:4px;
    height:30px;
    padding:0 7px;
    display:flex;
  }
  .inf,.pm,.tfb,.tool{
    color:#c7d5ef;
    background:var(--u);
    border:1px solid var(--bd);
    border-radius:7px;
    flex:none;
    place-items:center;
    height:22px;
    display:grid;
  }
  .inf,.pm,.tool{
    cursor:pointer;
    width:22px;
    font-size:12px;
  }
  .pm img{
    object-fit:contain;
    filter:brightness(0) saturate(1) invert(86%) sepia(12%) saturate(448%) hue-rotate(184deg) brightness(93%) contrast(93%);
    width:14px;
    height:14px;
  }
  .tfs{
    flex:1;
    grid-template-columns:repeat(4,1fr);
    gap:4px;
    display:grid;
  }
  .tfb{
    cursor:pointer;
    font-size:11px;
  }
  .tfb.on{
    color:#56a0ff;
    border-color:#2b568c;
    font-weight:800;
  }

  /* -------- CTRL (time + amount rows) -------- */
  .ctrl{
    flex:none;
    padding:3px 3px 0;
  }
  .rw{
    direction:ltr;
    gap:3px;
    display:flex;
    height:34px;
  }
  .rw2{
    direction:ltr;
    gap:3px;
    display:flex;
    height:33px;
    margin-top:3px;
  }
  .bx,.bx3{
    background:var(--u);
    border:1px solid #1e2a43;
  }
  .bx{
    color:#fff;
    flex:1;
    justify-content:center;
    align-items:center;
    display:flex;
  }
  .bx3{
    color:#dbe7ff;
    justify-content:center;
    align-items:center;
    width:36px;
    font-size:17px;
    display:flex;
  }
  .bx .bx3{
    border-top:0;
    border-bottom:0;
    height:100%;
  }
  .mid,.val{
    text-align:center;
    flex:1;
    font-size:12px;
  }

  /* -------- ACTIONS ROW (buy / sell buttons) -------- */
  .acts{
    flex:none;
    gap:3px;
    padding:3px;
    display:flex;
  }
  .btn{
    color:#fff;
    text-align:left;
    border:0;
    flex:1;
    height:54px;
    padding:7px 10px;
    position:relative;
    cursor:pointer;
    font-family:inherit;
  }
  .btn b{
    letter-spacing:.5px;
    font-size:15px;
  }
  .btn .rt{
    font-size:12px;
    font-weight:800;
    position:absolute;
    top:7px;
    right:10px;
  }
  .btn i{
    opacity:.9;
    margin-top:3px;
    font-size:9px;
    font-style:normal;
    display:block;
  }
  .btn small{
    font-size:12px;
    position:absolute;
    bottom:7px;
    right:10px;
  }
  .up{
    background:linear-gradient(#21c965,#109a4a);
    border-radius:0 0 0 7px;
  }
  .dn{
    background:linear-gradient(#ff4f4f,#d81f1f);
    border-radius:0 0 7px;
  }

  /* -------- BOTTOM NAV -------- */
  .nav{
    background:var(--u);
    direction:ltr;
    border-top:1px solid #111b31;
    flex:none;
    height:50px;
    display:flex;
  }
  .ni{
    color:#7d8fae;
    cursor:pointer;
    flex-direction:column;
    flex:1;
    justify-content:center;
    align-items:center;
    gap:3px;
    display:flex;
    position:relative;
  }
  .ni img{
    object-fit:contain;
    opacity:.7;
    width:19px;
    height:19px;
  }
  .ni span{ font-size:9px; }
  .ni.a{ color:#3e8cff; }
  .ni.a img{ opacity:1; }
  .ni.a:before{
    content:"";
    background:#2f84ff;
    height:3px;
    position:absolute;
    top:0;
    left:12%;
    right:12%;
  }

  /* ============================================================
     UPLOAD / LOADING OVERLAY - KEPT FROM ORIGINAL PROJECT
     (only re-skinned to match reference palette)
     ============================================================ */
  .overlay{
    position:absolute;
    inset:0;
    background:rgba(13,23,48,0.95);
    display:flex;
    align-items:center;
    justify-content:center;
    z-index:100;
    flex-direction:column;
    gap:20px;
  }
  .overlay.hidden{ display:none; }
  .upload-box{
    background:var(--u);
    border:2px dashed var(--bd);
    border-radius:12px;
    padding:30px 40px;
    text-align:center;
    max-width:460px;
    transition:all .2s;
  }
  .upload-box:hover, .upload-box.drag{
    border-color:#3e8cff;
    background:#111a35;
  }
  .upload-box h2{
    font-size:16px;
    margin-bottom:8px;
    color:#eef5ff;
  }
  .upload-box p{
    font-size:12px;
    color:#8a99b8;
    margin-bottom:16px;
    line-height:1.6;
  }
  .file-input-btn{
    background:#2796e8;
    color:#fff;
    padding:9px 22px;
    border:none;
    border-radius:7px;
    cursor:pointer;
    font-size:12px;
    font-weight:600;
    font-family:inherit;
  }
  .file-input-btn:hover{ background:#1e88e5; }
  .url-input{
    width:100%;
    padding:8px 12px;
    margin-top:10px;
    background:#0d1730;
    border:1px solid var(--bd);
    color:#eef5ff;
    border-radius:6px;
    font-size:12px;
    font-family:inherit;
  }
  .divider{
    color:#5a6883;
    font-size:11px;
    margin:12px 0;
  }
  .loading-spinner{
    border:3px solid var(--bd);
    border-top-color:#3e8cff;
    border-radius:50%;
    width:36px;
    height:36px;
    animation:spin .8s linear infinite;
  }
  @keyframes spin{ to{ transform:rotate(360deg); } }
  .loading-text{ color:#c7d5ef; font-size:12px; }

  /* Scrollbar */
  ::-webkit-scrollbar{ width:6px; height:6px; }
  ::-webkit-scrollbar-track{ background:var(--u); }
  ::-webkit-scrollbar-thumb{ background:var(--bd); border-radius:3px; }
  ::-webkit-scrollbar-thumb:hover{ background:#2a3a5a; }
</style>
</head>
<body>

<div class="app">

  <!-- ============ TOP BAR (balance + bonus + deposit) ============ -->
  <div class="top">
    <div class="tc">
      <div class="t1">
        <div class="lg">
          <span class="d">D</span>
          <span class="nm"><span>الخيار</span><b>demo</b></span>
        </div>
        <span class="dd">▾</span>
      </div>
      <div class="t2">
        <span id="topBalance">$ 29,960.00</span>
        <span class="usd">USD</span>
      </div>
    </div>
    <div class="fxBonus">
      <img src="https://cdn-icons-png.flaticon.com/128/6941/6941697.png" alt="" />
      <span>احصل على مكافأة 50% علي ايداعك</span>
    </div>
    <div class="dep">
      <img alt="" src="https://www.babaoption.com/mwebterminal/mobile-assets/images/icon_deposit_2x.png" />
      شحن الرصيد
    </div>
  </div>

  <!-- ============ ASSET / PAIR ============ -->
  <div class="asset">
    <div class="sq">📊</div>
    <div class="pair" id="pairBtn">
      <div class="fg">
        <em class="c">🇪🇺</em>
        <em class="j">🇺🇸</em>
      </div>
      <div>
        <small>UP & DOWN</small>
        <b id="symbolLabel">—</b>
      </div>
    </div>
  </div>

  <!-- ============ CHART ============ -->
  <div class="chart" id="CH">
    <div id="chart"></div>
    <!-- Floating transparent price labels layer -->
    <div class="price-overlay" id="priceOverlay"></div>

    <!-- Time / status floating label (matches reference .ptm) -->
    <div class="ptm">
      <span class="pi">i</span>
      <div class="ptx">
        <b id="ptmH">—</b>
        <small id="statusText">في انتظار البيانات</small>
      </div>
      <span class="pg"></span>
    </div>

    <!-- Zoom debug readout: shows live bar spacing + min/max reached, for calibrating zoom limits later -->
    <div class="zoomDebug" id="zoomDebug">Zoom: —</div>

    <!-- Loading Overlay (auto-load only, no upload UI) -->
    <div class="overlay" id="loadingOverlay">
      <div class="loading-spinner"></div>
      <div class="loading-text" id="loadingText">جاري تحميل البيانات...</div>
    </div>
  </div>

  <!-- ============ BAR (tools + timeframes) ============ -->
  <div class="bar">
    <div class="tool" id="btnReload" title="تحميل CSV">↻</div>
    <div class="tool" id="btnFit" title="ملائمة">⛶</div>
    <div class="tfs" id="tfButtons">
      <div class="tfb on" data-tf="1m">1m</div>
      <div class="tfb" data-tf="5m">5m</div>
      <div class="tfb" data-tf="15m">15m</div>
      <div class="tfb" data-tf="1h">1H</div>
    </div>
    <div class="inf" id="btnLive" title="Live">●</div>
  </div>

  <!-- ============ CTRL (time / amount rows) ============ -->
  <div class="ctrl">
    <div class="rw">
      <div class="bx3" id="tmM">-</div>
      <div class="bx cp" id="tOpen">
        <div class="mid" id="tVal">00:01:00</div>
      </div>
      <div class="bx3" id="tmP">+</div>
    </div>
    <div class="rw2">
      <div class="bx cp" id="aOpen">
        <div class="bx3" id="amM">-</div>
        <div class="val" id="aVal">$ 23</div>
        <div class="bx3" id="amP">+</div>
      </div>
      <div class="bx">
        <div class="bx3">-</div>
        <div class="val" id="livePrice">0.00000</div>
        <div class="bx3">+</div>
      </div>
    </div>
  </div>

  <!-- ============ ACTS (BUY / SELL buttons) ============ -->
  <div class="acts">
    <button class="btn up" id="btnBuy">
      <b>UP</b>
      <div class="rt">93%</div>
      <i>الربح</i>
      <small id="p1">$ 21.39</small>
    </button>
    <button class="btn dn" id="btnSell">
      <b>DOWN</b>

<script>
/* ===============================================================
 *  Professional Trading Chart System
