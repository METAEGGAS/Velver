/* ===============================================================
 *  1. TICK_PARSER  (NEW — replaces the old M1 CSV_PARSER)
 *  --------------------------------------------------------------
 *  يقرأ ملف Tick Data ويستخرج قائمة الـTicks الخام.
 *  كل Tick = { time (epoch ثانية), price (رقم عائم) }.
 *
 *  التنسيقات المدعومة (يتم اكتشاف الفاصل و الأعمدة تلقائياً):
 *   - timestamp, bid, ask [, volume]
 *   - timestamp, price [, volume]
 *   - datetime, bid, ask, volume        (HistData tick)
 *   - YYYYMMDD HHMMSSmmm, bid, ask, vol (HistData tick 4 columns)
 *
 *  التاريخ يمكن أن يكون:
 *   - epoch بالثواني أو الملّي ثانية
 *   - YYYY.MM.DD,HH:MM:SS[.SSS]
 *   - YYYYMMDD HHMMSS[fff]
 *   - YYYY-MM-DD HH:MM:SS[.SSS]
 *
 *  ملاحظة: تُبقي هذه الوحدة قواعد التوقيت الأصلية للمشروع
 *  (+5h offset في parseHistDataDate) للحفاظ على نفس عرض الوقت
 *  على الشارت.
 * =============================================================== */
const TICK_PARSER = (() => {

  /* التاريخ الحقلي التقليدي لملفات HistData: يُعيد epoch بالثواني
     مع نفس الـoffset (+5h) المستخدم في الإصدار السابق للحفاظ على
     تطابق التصميم والوقت المعروض. */
  const parseHistDataDate = (raw) => {
    raw = String(raw).trim();
    let y, mo, d, h = 0, mi = 0, s = 0, ms = 0;

    if (raw.includes('.') && raw.includes(',')) {
      // 2024.01.02,10:15:30.123
      const [dp, tp] = raw.split(',');
      const [yy, mm, dd] = dp.split('.');
      y = +yy; mo = +mm - 1; d = +dd;
      if (tp) {
        const [hh, min, secRaw] = tp.split(':');
        h = +hh; mi = +min;
        if (secRaw != null) {
          if (secRaw.includes('.')) {
            const [ss, mss] = secRaw.split('.');
            s = +ss; ms = +((mss || '0').padEnd(3, '0').slice(0, 3));
          } else {
            s = +secRaw;
          }
        }
      }
    } else if (raw.includes('-') && raw.includes(':')) {
      // 2024-01-02 10:15:30.123  أو  2024-01-02T10:15:30
      const norm = raw.replace('T', ' ');
      const [dp, tp] = norm.split(/\s+/);
      const [yy, mm, dd] = dp.split('-');
      y = +yy; mo = +mm - 1; d = +dd;
      if (tp) {
        const [hh, min, secRaw] = tp.split(':');
        h = +hh; mi = +min;
        if (secRaw != null) {
          if (secRaw.includes('.')) {
            const [ss, mss] = secRaw.split('.');
            s = +ss; ms = +((mss || '0').padEnd(3, '0').slice(0, 3));
          } else {
            s = +secRaw;
          }
        }
      }
    } else {
      // 20240102 101530  أو  20240102 101530123
      const parts = raw.split(/\s+/);
      const date = parts[0];
      const time = parts[1] || '000000';
      y  = +date.substr(0, 4);
      mo = +date.substr(4, 2) - 1;
      d  = +date.substr(6, 2);
      h  = +time.substr(0, 2);
      mi = +time.substr(2, 2);
      s  = +time.substr(4, 2) || 0;
      if (time.length > 6) ms = +time.substr(6, 3) || 0;
    }
    // نُبقي على نفس الـoffset (+5h) الموجود في الإصدار السابق للحفاظ
    // على نفس التوقيت المعروض على الشارت.
    return Math.floor(Date.UTC(y, mo, d, h, mi, s, ms) / 1000) + (5 * 3600);
  };

  /* اكتشاف الفاصل تلقائياً */
  const detectDelimiter = (line) => {
    if (line.includes(';')) return ';';
    if (line.includes(',')) return ',';
    if (line.includes('\t')) return '\t';
    return ';';
  };

  /* حاول تحويل حقل التاريخ إلى epoch (ثانية). يدعم: أرقام epoch (s/ms)،
     أو صيغ التاريخ النصية المذكورة في parseHistDataDate. */
  const parseTimeCell = (raw, secondCell) => {
    if (raw == null) return NaN;
    const s = String(raw).trim();
    if (!s) return NaN;

    // إذا كان رقماً بحتاً → epoch ثانية أو ملّي ثانية
    if (/^\d+(?:\.\d+)?$/.test(s)) {
      const n = +s;
      if (!isFinite(n)) return NaN;
      // >1e12 → ms، وإلا ثانية
      return n > 1e12 ? Math.floor(n / 1000) : Math.floor(n);
    }

    // صيغ HistData (تاريخ + وقت في عمودين منفصلين مفصولين بفاصلة)
    if (s.includes('.') && secondCell && /^\d{1,2}:/.test(String(secondCell))) {
      return parseHistDataDate(s + ',' + String(secondCell).trim());
    }

    // صيغ متعددة الأشكال
    try { return parseHistDataDate(s); } catch (e) { return NaN; }
  };

  /* التحليل الرئيسي — يُرجع قائمة Ticks مرتبة زمنياً */
  const parse = (rawText) => {
    if (!rawText || typeof rawText !== 'string')
      throw new Error('Empty tick content');

    const lines = rawText.split(/\r?\n/).filter(l => l.trim().length > 0);
    if (lines.length === 0) throw new Error('No data rows in tick file');

    // تجاهل سطر رأس (header) إن كان نصياً غير رقمي
    let startIdx = 0;
    const firstLine = lines[0];
    if (/[a-zA-Z]{2,}/.test(firstLine) && !/^\d{4}[-\.\/]/.test(firstLine)) {
      startIdx = 1;
    }

    const delim = detectDelimiter(lines[startIdx] || firstLine);

    const ticks = [];
    for (let i = startIdx; i < lines.length; i++) {
      const line = lines[i].trim();
      if (!line) continue;
      const cols = line.split(delim).map(s => s.trim());
      if (cols.length < 2) continue;

      let time = NaN, price = NaN;

      try {
        // Case A: تاريخ + وقت في عمودين منفصلين + bid + ask (HistData tick 4 cols)
        //         مثال: 2024.01.02,10:15:30.123, 1.10123, 1.10125, 0
        if (cols.length >= 4 && cols[0].includes('.') && /:/.test(cols[1])) {
          time = parseTimeCell(cols[0], cols[1]);
          const bid = +cols[2];
          const ask = +cols[3];
          if (isFinite(bid) && isFinite(ask) && bid > 0 && ask > 0) {
            price = (bid + ask) / 2;
          } else if (isFinite(bid) && bid > 0) {
            price = bid;
          }
        }
        // Case B: timestamp, bid, ask [, volume]
        else if (cols.length >= 3) {
          time = parseTimeCell(cols[0]);
          const a = +cols[1];
          const b = +cols[2];
          if (isFinite(a) && isFinite(b) && a > 0 && b > 0) {
            price = (a + b) / 2;   // bid/ask → mid
          } else if (isFinite(a) && a > 0) {
            price = a;             // timestamp, price [, volume]
          }
        }
        // Case C: timestamp, price
        else if (cols.length === 2) {
          time = parseTimeCell(cols[0]);
          price = +cols[1];
        }

        if (!isFinite(time) || !isFinite(price) || price <= 0) continue;
        ticks.push({ time: time, price: price });
      } catch (err) { continue; }
    }

    if (ticks.length === 0)
      throw new Error('No valid ticks parsed. Check file format.');

    ticks.sort((a, b) => a.time - b.time);
    return ticks;
  };

  return { parse };
})();


/* ===============================================================
 *  1.5  TICK_AGGREGATOR  (NEW)
 *  --------------------------------------------------------------
 *  يحوّل قائمة Ticks الخام إلى بنية بيانات مجمَّعة حسب الدقيقة
 *  لتوفير وصول سريع إلى Ticks كل دقيقة (يُبنى مرة واحدة فقط).
 *
 *  يبني:
 *    - buckets[]     : كل عنصر  = { minuteEpoch, ticks:[{time,price},...] }
 *                      لكل دقيقة *فقط* تحتوي على Ticks (بلا فجوات في المصفوفة)
 *                      لكنه *يمثّل* الدقائق كما تُقدَّم فعلياً.
 *                      الدقائق الفارغة لا تُدرج كعنصر منفصل — بدلاً من ذلك
 *                      يُملأ الفراغ عبر propagation عند البناء (see below).
 *
 *  الاختيار التصميمي: نبني قائمة "دقائق فعلية" مرتبطة بـ currentIndex.
 *  currentIndex يشير إلى بنود buckets. الدقائق التي لا تحتوي على Ticks:
 *  لا نُدرجها كعنصر مستقل (وإلا سنكسر التسلسل بشمعة بلا حركة). هذا يحافظ
 *  على معنى: "currentIndex = 20 → 20 شمعة مكتملة" لأن كل شمعة تُبنى من
 *  Ticks حقيقية.
 *
 *  في حال أراد المستخدم مستقبلاً إدراج شموع "فارغة" للدقائق الميتة،
 *  يمكن ضبط INCLUDE_EMPTY_MINUTES = true؛ عندها ستُضاف شمعة فارغة
 *  (open=high=low=close=آخر إغلاق) بلا Ticks ولا حركة داخل الدقيقة.
 * =============================================================== */
const TICK_AGGREGATOR = (() => {
  /* true  = تُدرج الدقائق التي لا تحتوي على Ticks كشموع فارغة
              (تبقى ثابتة عند آخر سعر إغلاق).
     false = تُتجاهَل الدقائق الفارغة تماماً (currentIndex يمثّل
              فقط الدقائق التي حصل فيها نشاط سوق). */
  const INCLUDE_EMPTY_MINUTES = false;

  /* aggregate: من قائمة Ticks الخام → قائمة buckets الدقائق. */
  const aggregate = (ticks) => {
    if (!Array.isArray(ticks) || ticks.length === 0) return [];

    // نتوقّع أن الـTicks مرتبة أصلاً — لكن نضمن ذلك.
    const sorted = ticks.slice().sort((a, b) => a.time - b.time);

    if (!INCLUDE_EMPTY_MINUTES) {
      const map = new Map();
      for (const t of sorted) {
        const minEpoch = Math.floor(t.time / 60) * 60;
        let arr = map.get(minEpoch);
        if (!arr) { arr = []; map.set(minEpoch, arr); }
        arr.push(t);
      }
      const buckets = Array.from(map.entries())
        .sort((a, b) => a[0] - b[0])
        .map(([minuteEpoch, arr]) => ({ minuteEpoch, ticks: arr }));
      return buckets;
    }

    // فرع اختياري: إدراج الدقائق الفارغة بين أول وآخر دقيقة.
    const firstMin = Math.floor(sorted[0].time / 60) * 60;
    const lastMin  = Math.floor(sorted[sorted.length - 1].time / 60) * 60;
    const map = new Map();
    for (const t of sorted) {
      const minEpoch = Math.floor(t.time / 60) * 60;
      let arr = map.get(minEpoch);
      if (!arr) { arr = []; map.set(minEpoch, arr); }
      arr.push(t);
    }
    const buckets = [];
    for (let m = firstMin; m <= lastMin; m += 60) {
      const arr = map.get(m) || [];
      buckets.push({ minuteEpoch: m, ticks: arr });
    }
    return buckets;
  };

  /* بناء شمعة OHLC كاملة من مجموعة Ticks (مغلقة). إن كانت الدقيقة
     فارغة → نُعيد شمعة "محافظة" مبنية على prevClose (لن يحدث هذا
     في الوضع الافتراضي INCLUDE_EMPTY_MINUTES=false). */
  const buildClosedCandle = (bucket, prevClose) => {
    const t = bucket.minuteEpoch;
    if (!bucket.ticks || bucket.ticks.length === 0) {
      const px = (typeof prevClose === 'number' && isFinite(prevClose)) ? prevClose : 0;
      return { time: t, open: px, high: px, low: px, close: px, volume: 0 };
    }
    let open = bucket.ticks[0].price;
    let high = open, low = open, close = open;
    for (const tk of bucket.ticks) {
      if (tk.price > high) high = tk.price;
      if (tk.price < low)  low  = tk.price;
      close = tk.price;
    }
    return { time: t, open, high, low, close, volume: bucket.ticks.length };
  };

  /* بناء "شمعة جزئية" (نشطة) من أول k من Ticks في bucket. k=0 → شمعة
     ابتدائية عند open. */
  const buildPartialCandle = (bucket, upToTickIdx /* inclusive; -1 = قبل أي tick */) => {
    const t = bucket.minuteEpoch;
    if (!bucket.ticks || bucket.ticks.length === 0) {
      return { time: t, open: 0, high: 0, low: 0, close: 0, volume: 0 };
    }
    const open = bucket.ticks[0].price;
    let high = open, low = open, close = open;
    const limit = Math.max(0, Math.min(upToTickIdx, bucket.ticks.length - 1));
    for (let i = 0; i <= limit; i++) {
      const p = bucket.ticks[i].price;
      if (p > high) high = p;
      if (p < low)  low  = p;
      close = p;
    }
    return { time: t, open, high, low, close, volume: limit + 1 };
  };

  /* من buckets[] → مصفوفة شموع M1 مغلقة لجميع الدقائق (تُستخدم كمصدر
     لـ CANDLE_ENGINE لتجميع الأُطر الزمنية الأخرى). */
  const bucketsToM1 = (buckets) => {
    const out = [];
    let prevClose = 0;
    for (const b of buckets) {
      const c = buildClosedCandle(b, prevClose);
      out.push(c);
      prevClose = c.close;
    }
    return out;
  };

  return {
    aggregate,
    buildClosedCandle,
    buildPartialCandle,
    bucketsToM1,
    INCLUDE_EMPTY_MINUTES
  };
})();


/* ===============================================================
 *  2. DATA_LOADER  (REPLACED — now loads Tick Data instead of M1)
 *  --------------------------------------------------------------
 *  - loadFromUrl : يقرأ ملف Tick Data من الشبكة مرة واحدة.
 *  - loadFromFiles : يقرأ ملفات محلية (زر ↻ / اختيار يدوي).
 *  - بعد التحميل: يبني بنية buckets الدقائق للوصول السريع.
 *  - getBuckets  : buckets الدقائق (كل عنصر يحتوي على Ticks الحقيقية).
 *  - getM1       : شموع M1 المغلقة لكل الدقائق (متوافق مع بقية المشروع).
 * =============================================================== */
const DATA_LOADER = (() => {
  let _tickCache = [];     // Ticks الخام
  let _buckets   = [];     // buckets الدقائق
  let _m1Cache   = [];     // شموع M1 المغلقة لكل الدقائق (مبنية من buckets)
  let _symbol    = 'UNKNOWN';

  const detectSymbolFromName = (name) => {
    const m = name.match(/DAT_[A-Z]+_([A-Z]{6,7})_/i);
    if (m) return m[1].toUpperCase();
    const m2 = name.match(/([A-Z]{6,7})/);
    return m2 ? m2[1].toUpperCase() : 'CUSTOM';
  };

  const _buildFromTicks = (ticks) => {
    _tickCache = ticks;
    _buckets   = TICK_AGGREGATOR.aggregate(ticks);
    _m1Cache   = TICK_AGGREGATOR.bucketsToM1(_buckets);
  };

  const loadFromFiles = async (fileList) => {
    const all = [];
    for (const f of fileList) {
      _symbol = detectSymbolFromName(f.name);
      const text = await f.text();
      const parsed = TICK_PARSER.parse(text);
      all.push(...parsed);
    }
    all.sort((a, b) => a.time - b.time);
    _buildFromTicks(all);
    return {
      ticks:   _tickCache,
      buckets: _buckets,
      candles: _m1Cache,
      symbol:  _symbol
    };
  };

  const loadFromUrl = async (url) => {
    const res = await fetch(url);
    if (!res.ok) throw new Error(`HTTP ${res.status} loading ${url}`);
    const text = await res.text();
    _symbol = detectSymbolFromName(url.split('/').pop() || 'CUSTOM');
    const parsed = TICK_PARSER.parse(text);
    _buildFromTicks(parsed);
    return {
      ticks:   _tickCache,
      buckets: _buckets,
      candles: _m1Cache,
      symbol:  _symbol
    };
  };

  const getTicks   = () => _tickCache;
  const getBuckets = () => _buckets;
  const getM1      = () => _m1Cache;
  const getSymbol  = () => _symbol;

  return { loadFromFiles, loadFromUrl, getTicks, getBuckets, getM1, getSymbol };
})();


/* ===============================================================
 *  3. CANDLE_ENGINE  (UNCHANGED)
 * =============================================================== */
const CANDLE_ENGINE = (() => {
  const TF_SECONDS = {
    '1m': 60, '5m': 5*60, '15m': 15*60, '30m': 30*60,
    '1h': 60*60, '4h': 4*60*60, '1D': 24*60*60,
  };
  const alignTime = (t, sec) => Math.floor(t / sec) * sec;
  const aggregate = (m1, tf) => {
    const sec = TF_SECONDS[tf];
    if (!sec) throw new Error(`Unknown TF: ${tf}`);
    if (tf === '1m') return m1.slice();
    const out = [];
    let bucket = null;
    for (const c of m1) {
      const alignedT = alignTime(c.time, sec);
      if (!bucket || bucket.time !== alignedT) {
        if (bucket) out.push(bucket);
        bucket = { time: alignedT, open: c.open, high: c.high, low: c.low, close: c.close, volume: c.volume || 0 };
      } else {
        bucket.high   = Math.max(bucket.high, c.high);
        bucket.low    = Math.min(bucket.low,  c.low);
        bucket.close  = c.close;
        bucket.volume += (c.volume || 0);
      }
    }
    if (bucket) out.push(bucket);
    return out;
  };
  const getTFSeconds = (tf) => TF_SECONDS[tf];
  const listTFs = () => Object.keys(TF_SECONDS);
  return { aggregate, getTFSeconds, listTFs, alignTime };
})();


/* ===============================================================
 *  4. TICK_PLAYER  (REPLACES FAKE_PRICE_GENERATOR)
 *  --------------------------------------------------------------
 *  يعيد تشغيل Ticks الحقيقية للدقيقة النشطة بنفس ترتيبها الزمني
 *  الحقيقي، بحيث تتكوّن الشمعة بنفس الشكل والحركة التي حدثت في
 *  السوق فعلياً.
 *
 *  - يقتصر على bucket واحد فقط (الدقيقة النشطة = currentIndex).
 *  - يوزّع Ticks على الدقيقة الجدارية (wall-clock minute) الحالية:
 *      * الدقيقة تُغلق عند بداية الدقيقة الجدارية التالية (anchor+1).
 *      * حركة الـTicks تُعرض بترتيبها الزمني الحقيقي:
 *          - إذا كانت الـticks الأصلية تحمل timestamps داخل الدقيقة،
 *            تُعرض بنفس المسافات الزمنية النسبية (elapsedFractional).
 *          - إذا كانت جميعها بنفس الطابع الزمني، يُوزّع كل tick
 *            بالتساوي على مدى الدقيقة.
 *  - عند استهلاك جميع Ticks + بلوغ حدّ الدقيقة → onClose(closedCandle).
 *  - APP هو من يقرر ما إذا كان سيقدّم currentIndex عبر Firestore.
 *
 *  ملاحظة توافق: نُبقي على الاسم القديم FAKE_PRICE_GEN كـalias حتى
 *  لا نمسّ أي جزء آخر من الكود يستخدمه. لا حركة اصطناعية إطلاقاً.
 * =============================================================== */
const TICK_PLAYER = (() => {
  let _timer = null;
  let _running = false;
  let _onTick = null;
  let _onClose = null;

  let _bucket = null;             // { minuteEpoch, ticks:[{time,price}] }
  let _bucketT = 0;               // = _bucket.minuteEpoch (وقت الشمعة على الشارت)
  let _tickIdx = -1;              // آخر tick تم تطبيقه (-1 = لم يُطبَّق أي tick بعد)
  let _price = 0;
  let _open  = 0;
  let _high  = 0;
  let _low   = 0;

  let _startWallMs = 0;           // ms الجداري عند بداية الدقيقة النشطة
  let _closeAtMs   = 0;           // ms الجداري عند حدّ الغلق
  let _closedFired = false;

  // أوقات نسبية للـTicks داخل الدقيقة (0..1). تُحسب مرة واحدة عند start().
  let _tickFracs = [];

  /* حساب مواضع الـTicks النسبية داخل الدقيقة. */
  const _computeFractions = (bucket) => {
    const arr = bucket.ticks || [];
    if (arr.length === 0) return [];
    // إذا كانت الـTicks تحمل timestamps متمايزة داخل الدقيقة → نستخدم مواقعها الحقيقية.
    const t0 = bucket.minuteEpoch;
    const spread = arr[arr.length - 1].time - arr[0].time;
    if (spread > 0) {
      return arr.map(t => {
        const rel = (t.time - t0) / 60;   // (0..1] تقريباً
        return Math.max(0, Math.min(1, rel));
      });
    }
    // كل الـTicks بنفس الطابع الزمني → توزيع منتظم على الدقيقة.
    const n = arr.length;
    return arr.map((_, i) => (n === 1 ? 0 : i / (n - 1)));
  };

  /* بناء الشمعة الحالية بناءً على _tickIdx (شاملاً).
     يقبل overrideClose اختياري لعرض سعر إغلاق مُنعَّم (interpolated) بصرياً
     فقط، دون المسّ بقيم OHLC الحقيقية المخزَّنة. القيود المضمونة:
       - overrideClose يُستخدم فقط لخانة close المعروضة.
       - high/low تبقى كما بُنيت من Ticks الحقيقية → لا يتجاوز الرسم
         النطاق الحقيقي إطلاقاً.
       - عند وصول Tick حقيقي جديد أو عند نهاية الدقيقة، نُرجع close إلى
         سعر Tick الحقيقي (مطابقة 100% للبيانات النهائية). */
  const _buildCurrent = (overrideClose) => {
    if (!_bucket) return { time: _bucketT, open: _open, high: _high, low: _low, close: _price, volume: 0 };
    const c = TICK_AGGREGATOR.buildPartialCandle(_bucket, _tickIdx);
    if (typeof overrideClose === 'number' && isFinite(overrideClose)) {
      // نُقيِّد overrideClose داخل [low, high] الحقيقيتين للشمعة الجزئية
      // كضمان إضافي بألا يتجاوز أي شيء نطاق البيانات الحقيقية.
      let cc = overrideClose;
      if (cc > c.high) cc = c.high;
      if (cc < c.low)  cc = c.low;
      c.close = cc;
    }
    return c;
  };

  /* دالة تنعيم (smoothstep) لجعل الانتقال بين tick والذي يليه أكثر طبيعية
     (تسارع/تباطؤ خفيف) بدلاً من خط مستقيم صارم. لا تؤثر على أي قيمة
     نهائية — تُستخدم فقط لتحديد close البصري بين ticks. */
  const _ease = (t) => {
    if (t <= 0) return 0;
    if (t >= 1) return 1;
    return t * t * (3 - 2 * t);
  };

  /* المؤقّت الرئيسي (40ms) — يتقدّم عبر الـTicks المستحقّة حتى الآن،
     ويعرض حركة سلسة (interpolation) بين كل tick والذي يليه داخل
     النطاق الحقيقي للشمعة، دون تغيير أي قيمة نهائية. */
  const _timerFn = () => {
    if (!_running || !_bucket) return;

    const nowMs = Date.now();
    const elapsedMs = Math.max(0, nowMs - _startWallMs);
    const totalMs   = Math.max(1, _closeAtMs - _startWallMs);   // = 60000 عادةً
    const frac      = Math.min(1, elapsedMs / totalMs);

    // تقدَّم عبر جميع الـTicks التي حان وقتها بحسب _tickFracs.
    const ticks = _bucket.ticks || [];
    let advanced = false;
    while (_tickIdx + 1 < ticks.length && _tickFracs[_tickIdx + 1] <= frac) {
      _tickIdx++;
      const p = ticks[_tickIdx].price;
      _price = p;
      if (_tickIdx === 0) {
        _open = p; _high = p; _low = p;
      } else {
        if (p > _high) _high = p;
        if (p < _low)  _low  = p;
      }
      advanced = true;
    }

    /* ==== حركة انتقالية سلسة (Interpolation) بين آخر tick تم تطبيقه
       والـtick التالي — بصرية بحتة، لا تمسّ OHLC الحقيقية ====
       - إذا لم يكن هناك tick تالٍ (وصلنا لآخر tick في الدقيقة) → نعرض
         سعر آخر tick حقيقي كما هو (لا تخمين).
       - إذا لم يُطبَّق أي tick بعد (_tickIdx === -1) → نعرض سعر أول
         tick لأننا لم نبدأ الشمعة فعلياً بعد.
       - وإلا: نُنعِّم close من سعر tick الحالي إلى سعر tick التالي
         بحسب موضع الوقت النسبي بين fraction الحالي و fraction التالي.
       ملاحظة أمان: القيمة الناتجة مقيَّدة في _buildCurrent داخل [low,high]
       المبنيّتين من ticks حقيقية → لا يمكن أن يتجاوز الرسم نطاق البيانات. */
    let interpClose;
    if (_tickIdx < 0) {
      // قبل أول tick — لا حركة زائفة؛ نعرض سعر أول tick (سيتم اعتماده فوراً).
      interpClose = (ticks.length > 0) ? ticks[0].price : _price;
    } else if (_tickIdx + 1 >= ticks.length) {
      // لا يوجد tick تالٍ — التزم بسعر آخر tick حقيقي (لا حركة تخيّلية).
      interpClose = _price;
    } else {
      const pCur   = _price;                    // سعر آخر tick حقيقي مُطبَّق
      const pNext  = ticks[_tickIdx + 1].price; // سعر tick التالي (حقيقي)
      const fCur   = _tickFracs[_tickIdx];
      const fNext  = _tickFracs[_tickIdx + 1];
      const seg    = fNext - fCur;
      let   local  = (seg > 0) ? (frac - fCur) / seg : 1;
      if (local < 0) local = 0;
      if (local > 1) local = 1;
      const k = _ease(local);
      interpClose = pCur + (pNext - pCur) * k;
    }

    // أطلق onTick بعد كل tick جديد أو بشكل دوري (لتحديث label الوقت).
    if (_onTick) {
      const cur = _buildCurrent(interpClose);
      _onTick(cur);
    }

    // بلوغ حدّ الدقيقة → إغلاق. نضمن أولاً استهلاك جميع الـTicks المتبقية.
    if (!_closedFired && nowMs >= _closeAtMs) {
      // استهلك أي tick متبقٍّ (لضمان بناء شمعة كاملة حتى لو تأخّر المؤقت).
      while (_tickIdx + 1 < ticks.length) {
        _tickIdx++;
        const p = ticks[_tickIdx].price;
        _price = p;
        if (_tickIdx === 0) { _open = p; _high = p; _low = p; }
        else {
          if (p > _high) _high = p;
          if (p < _low)  _low  = p;
        }
      }
      _closedFired = true;
      // عند الإغلاق: لا override — الإغلاق = سعر آخر tick حقيقي تماماً.
      const closed = _buildCurrent();
      // شمعة "تالية" افتراضية للـ chart (تبدأ من نفس سعر الإغلاق).
      // سيُعيد APP بناء الشارت بعد نجاح advance() ليعرض الشمعة الحقيقية من bucket التالية.
      const nextT = _bucketT + 60;
      const newCandle = { time: nextT, open: _price, high: _price, low: _price, close: _price, volume: 0 };
      if (_onClose) _onClose(closed, newCandle);
    }
  };

  /* start:
       bucket             : bucket الدقيقة النشطة { minuteEpoch, ticks[] }
       lastCandle         : (اختياري) شمعة OHLC ابتدائية للتمهيد قبل بدء الـTicks —
                            تُستخدم فقط إذا لم يوجد أي tick في bucket.
       tf                 : متروك للتوافق مع الاستدعاء القديم — غير مستخدم في التوقيت.
       anchorEpochMinute  : الدقيقة (منذ epoch/60000) التي بدأت فيها هذه الشمعة.
                            إذا لم تُمرَّر → نأخذ الدقيقة الحالية.
       onTick / onClose   : callbacks.
  */
  const start = ({ bucket, lastCandle, tf, anchorEpochMinute, onTick, onClose }) => {
    stop();

    _onTick = onTick; _onClose = onClose;
    _bucket = bucket || null;
    _bucketT = (_bucket && _bucket.minuteEpoch)
      ? _bucket.minuteEpoch
      : (lastCandle ? lastCandle.time : Math.floor(Date.now() / 60) * 60);

    _tickIdx = -1;
    _tickFracs = _bucket ? _computeFractions(_bucket) : [];

    // قيم OHLC الابتدائية:
    if (_bucket && _bucket.ticks && _bucket.ticks.length > 0) {
      _open  = _bucket.ticks[0].price;
      _price = _open;
      _high  = _open;
      _low   = _open;
    } else if (lastCandle) {
      _open  = lastCandle.open;
      _price = lastCandle.close;
      _high  = lastCandle.high;
      _low   = lastCandle.low;
    } else {
      _open = _price = _high = _low = 0;
    }

    const nowMs = Date.now();
    let anchor = (typeof anchorEpochMinute === 'number' && isFinite(anchorEpochMinute))
      ? anchorEpochMinute
      : Math.floor(nowMs / 60000);
    /* FIX (Tick Timing Bug): دفاع إضافي — لا يُسمح للشمعة بالبدء بـanchor منقضٍ فعلاً
       (أي متأخر عن الدقيقة الجدارية الحالية). لو وصل anchor متأخراً لأي
       سبب (انقطاع اتصال/توقف التبويب…)، فإن closeAtMs سيكون في الماضي وسيجعل
       الموقّت يستهلك كل التيكس فوراً ويقفل الشمعة خلال تايمر الـ40ms الأول
       (هو سبب شموع الـ~5 ثوانٍ بدلاً من 60 ثانية). نُعيد ضبط anchor إلى الدقيقة
       الجدارية الحالية لضمان نافذة 60 ثانية كاملة دائماً، مهما كانت القيمة
       القادمة من anchorEpochMinute (قد تأتي من Firestore قديمة/متأخرة). */
    const currentWallMinute = Math.floor(nowMs / 60000);
    if (anchor < currentWallMinute) {
      console.warn('[TICK_PLAYER] anchorEpochMinute (' + anchor + ') متأخر عن الدقيقة الجدارية الحالية (' +
                   currentWallMinute + ') — تم ضبطه لضمان شمعة 60 ثانية كاملة.');
      anchor = currentWallMinute;
    }
    _startWallMs = anchor * 60000;
    _closeAtMs   = (anchor + 1) * 60000;
    _closedFired = false;
    _running     = true;

    // إطلاق فوري لتحديث الحالة على الشارت قبل أول tick.
    if (_onTick) _onTick(_buildCurrent());

    _timer = setInterval(_timerFn, 40);
  };

  const stop = () => {
    if (_timer) clearInterval(_timer);
    _timer = null;
    _running = false;
  };
  const isRunning = () => _running;
  const getPrice  = () => _price;
  return { start, stop, isRunning, getPrice };
})();

/* ---------------------------------------------------------------
 * توافق خلفي: بقية الكود يستخدم الاسم FAKE_PRICE_GEN. نُعيّن alias
 * إلى المشغّل الجديد حتى لا يتغيّر أي جزء آخر من المشروع.
 * --------------------------------------------------------------- */
const FAKE_PRICE_GEN = TICK_PLAYER;


/* ===============================================================
 *  5. CHART_MANAGER
 *  --------------------------------------------------------------
 *  Chart styling adapted to reference palette (#0d1730 / #223252),
 *  but candle sizing, barSpacing, price scale layout, and chart
 *  container dimensions match the reference visual density.
 * =============================================================== */
const CHART_MANAGER = (() => {
  let _chart, _series, _container;

  const create = (container) => {
    _container = container;
    _chart = LightweightCharts.createChart(container, {
      width:  container.clientWidth,
      height: container.clientHeight,
      layout: {
        /* خلفية شفافة 100% للشارت ومقياس الأسعار معاً — بلا أي لون خلفية أو صندوق أو ظل خلف الأرقام. */
        background: { type: 'solid', color: 'rgba(0,0,0,0)' },
        textColor:  '#9aa9ba',
        fontSize:   9,
        fontFamily: 'system-ui, -apple-system, "Segoe UI", Tahoma, Arial, sans-serif',
      },
      grid: {
        vertLines: { color: '#1a2540' },
        horzLines: { color: '#1a2540' },
      },
      crosshair: {
        mode: LightweightCharts.CrosshairMode.Normal,
        vertLine: { color: '#3e8cff', width: 1, style: 3, labelBackgroundColor: '#223252' },
        horzLine: { color: '#3e8cff', width: 1, style: 3, labelBackgroundColor: '#223252' },
      },
      rightPriceScale: {
        /* شريط الأسعار المدمج مخفي تماماً — يمتد الشارت والجريد بعرض الشاشة كاملاً.
           التسميات تُرسم عبر طبقة HTML شفافة (#priceOverlay). */
        visible: false,
        borderVisible: false,
        borderColor: 'rgba(0,0,0,0)',
        scaleMargins: { top: 0.05, bottom: 0.05 },
        entireTextOnly: false,
      },
      timeScale: {
        borderVisible: false,
        borderColor: 'rgba(0,0,0,0)',
        timeVisible: true,
        secondsVisible: false,
        /* الإزاحة تُحسب ديناميكياً لتثبيت الشمعة النشطة في منتصف الشاشة */
        rightOffset: 10,
        barSpacing: 6.37,
        minBarSpacing: 4.74,
        shiftVisibleRangeOnNewBar: false,
      },
      handleScroll: {
        mouseWheel: true, pressedMouseMove: true,
        horzTouchDrag: true, vertTouchDrag: true,
      },
      handleScale: {
        mouseWheel: true, pinch: true, axisPressedMouseMove: true,
      },
    });

    /* حدود الزوم: أدنى 4.74px وأقصى 21.86px — تُفرض بشكل دائم. */
    const _MIN_BS = 4.74;
    const _MAX_BS = 21.86;
    const _DEFAULT_BS = 6.37;
    let _clampGuard = false;
    const _clampBarSpacing = () => {
      if (_clampGuard) return;
      const opts = _chart.options && _chart.options();
      const ts = _chart.timeScale();
      // نقرأ barSpacing الحالي من خيارات timeScale
      let cur = null;
      try { cur = _chart.timeScale().options().barSpacing; } catch(e){ cur = null; }
      if (typeof cur !== 'number' || !isFinite(cur)) return;
      let target = cur;
      if (cur < _MIN_BS) target = _MIN_BS;
      else if (cur > _MAX_BS) target = _MAX_BS;
      if (target !== cur) {
        _clampGuard = true;
        _chart.applyOptions({ timeScale: { barSpacing: target } });
        setTimeout(() => { _clampGuard = false; }, 0);
      }
    };

    _series = _chart.addCandlestickSeries({
      upColor:         '#21c965',
      downColor:       '#ff4f4f',
      borderUpColor:   '#109a4a',
      borderDownColor: '#d81f1f',
      wickUpColor:     '#21c965',
      wickDownColor:   '#ff4f4f',
      priceFormat: { type: 'price', precision: 5, minMove: 0.00001 },
    });

    const ro = new ResizeObserver(() => {
      _chart.applyOptions({ width: container.clientWidth, height: container.clientHeight });
      _centerLastCandle();
      _renderPriceOverlay();
    });
    ro.observe(container);

    /* ---- Floating price-labels overlay:
       يرسم تسميات الأسعار كأرقام HTML شفافة فوق الشارت في الجانب الأيمن.
       لا خلفية، لا ظل، لا حدود — أرقام فقط والشموع/الجريد يمرون تحتها. */
    _overlayEl = document.getElementById('priceOverlay');
    _chart.subscribeCrosshairMove(() => { /* keep overlay stable on hover */ });
    _chart.timeScale().subscribeVisibleTimeRangeChange(() => _renderPriceOverlay());

    /* تطبيق حدود الزوم ديناميكياً على أي تغيير في نطاق الرؤية (pinch / wheel / drag) */
    _chart.timeScale().subscribeVisibleLogicalRangeChange(() => {
      _clampBarSpacing();
    });
  };

  /* يُثبّت الشمعة النشطة (الأخيرة) في منتصف عرض الشارت تماماً
     عبر حساب rightOffset = (نصف العرض بالبكسل) / barSpacing.
     القيمة مقيسة بوحدة "عدد الأعمد" وليس بالبكسل. */
  const _centerLastCandle = () => {
    if (!_chart || !_container) return;
    const w = _container.clientWidth;
    if (!w) return;
    let bs = 6.37;
    try { bs = _chart.timeScale().options().barSpacing || bs; } catch(e){}
    if (!isFinite(bs) || bs <= 0) bs = 6.37;
    const bars = (w / 2) / bs;
    _chart.applyOptions({ timeScale: { rightOffset: bars } });
  };

  const setData = (candles) => { _series.setData(candles); _centerLastCandle(); _renderPriceOverlay(); };
  const update  = (candle)  => { _series.update(candle); _renderPriceOverlay(); };
  const fitContent = () => { _chart.timeScale().fitContent(); _centerLastCandle(); _renderPriceOverlay(); };
  const scrollToRealTime = () => { _chart.timeScale().scrollToRealTime(); _centerLastCandle(); };
  const getChart  = () => _chart;
  const getSeries = () => _series;
  const setPricePrecision = (precision, minMove) => {
    _pricePrecision = precision;
    _series.applyOptions({ priceFormat: { type: 'price', precision, minMove } });
    _renderPriceOverlay();
  };
  const setLivePrice = (price, up) => {
    _liveValue = price;
    _liveUp = !!up;
    _renderPriceOverlay();
  };

  /* ---- Overlay renderer state ---- */
  let _overlayEl = null;
  let _pricePrecision = 5;
  let _liveValue = null;
  let _liveUp = true;

  /* يحسب مجموعة أسعار مرئية حالياً ثم يوزعها رأسياً كـ <span> شفافة. */
  const _renderPriceOverlay = () => {
    if (!_overlayEl || !_series || !_chart) return;
    const h = _container ? _container.clientHeight : 0;
    if (!h) return;

    // نقرأ نطاق الأسعار المرئي من خلال coordinate↔price لأقصى/أدنى وحدتي تيكست.
    const priceTop    = _series.coordinateToPrice(2);
    const priceBottom = _series.coordinateToPrice(h - 2);
    if (priceTop == null || priceBottom == null) return;
    const pMax = Math.max(priceTop, priceBottom);
    const pMin = Math.min(priceTop, priceBottom);
    const range = pMax - pMin;
    if (!isFinite(range) || range <= 0) return;

    // عدد التسميات حسب الارتفاع (واحدة كل ~60px).
    const desired = Math.max(4, Math.min(12, Math.round(h / 60)));
    // نختار step مقروءاً (1/2/5 × 10^n) قريب من range/desired.
    const raw = range / desired;
    const mag = Math.pow(10, Math.floor(Math.log10(raw)));
    const norm = raw / mag;
    let step;
    if (norm < 1.5) step = 1 * mag;
    else if (norm < 3.5) step = 2 * mag;
    else if (norm < 7.5) step = 5 * mag;
    else step = 10 * mag;

    const first = Math.ceil(pMin / step) * step;
    const frag = document.createDocumentFragment();
    const prec = _pricePrecision;
    for (let p = first; p <= pMax; p += step) {
      const y = _series.priceToCoordinate(p);
      if (y == null || y < 0 || y > h) continue;
      const el = document.createElement('span');
      el.className = 'pl';
      el.style.top = y + 'px';
      el.textContent = Number(p).toFixed(prec);
      frag.appendChild(el);
    }

    // السعر اللحظي (live) — أبيض وأقوى، يُرسم فوق الباقي.
    if (_liveValue != null) {
      const y = _series.priceToCoordinate(_liveValue);
      if (y != null && y >= 0 && y <= h) {
        const el = document.createElement('span');
        el.className = 'pl live';
        el.style.top = y + 'px';
        el.style.color = _liveUp ? '#21c965' : '#ff4f4f';
        el.textContent = Number(_liveValue).toFixed(prec);
        frag.appendChild(el);
      }
    }

    _overlayEl.textContent = '';
    _overlayEl.appendChild(frag);
  };

  return { create, setData, update, fitContent, scrollToRealTime, getChart, getSeries, setPricePrecision, setLivePrice, centerLastCandle: _centerLastCandle };
})();


/* ===============================================================
 *  6. TRADE_MANAGER  (UNCHANGED)
 * =============================================================== */
const TRADE_MANAGER = (() => {
  let _positions = [], _idSeq = 1, _listEl = null;
  const attach = (listEl) => { _listEl = listEl; };
  const open = (side, price) => {
    if (!price || price <= 0) return;
    const priceLine = CHART_MANAGER.getSeries().createPriceLine({
      price,
      color: side === 'BUY' ? '#21c965' : '#ff4f4f',
      lineWidth: 2, lineStyle: 2, axisLabelVisible: true,
      title: `${side} #${_idSeq}`,
    });
    _positions.push({ id: _idSeq++, side, entry: price, priceLine, openedAt: Date.now() });
    render();
  };
  const close = (id) => {
    const idx = _positions.findIndex(p => p.id === id);
    if (idx < 0) return;
    try { CHART_MANAGER.getSeries().removePriceLine(_positions[idx].priceLine); } catch(e){}
    _positions.splice(idx, 1);
    render();
  };
  const closeAll = () => {
    for (const p of _positions) {
      try { CHART_MANAGER.getSeries().removePriceLine(p.priceLine); } catch(e){}
    }
    _positions = [];
    render();
  };
  const updateLivePnL = (currentPrice) => {
    if (!_listEl || _positions.length === 0) return;
    for (const p of _positions) {
      const diff = p.side === 'BUY' ? (currentPrice - p.entry) : (p.entry - currentPrice);
      const el = _listEl.querySelector(`[data-pid="${p.id}"] .pnl`);
      if (el) {
        const pips = (diff * 10000).toFixed(1);
        el.textContent = (diff >= 0 ? '+' : '') + pips + ' pips';
      }
    }
  };
  const render = () => {
    if (!_listEl) return;
    _listEl.innerHTML = '';
    for (const p of _positions) {
      const row = document.createElement('div');
      row.dataset.pid = p.id;
      row.innerHTML = `<span>${p.side}</span><span>@${p.entry.toFixed(5)}</span><span class="pnl">+0.0 pips</span>`;
      _listEl.appendChild(row);
    }
  };
  return { attach, open, close, closeAll, updateLivePnL };
})();


/* ===============================================================
 *  6.5  GLOBAL_INDEX_MANAGER  (NEW)
 *  --------------------------------------------------------------
 *  إدارة تسلسل الشموع العالمي عبر Firestore.
 *  ---------------------------------------------------------------
 *  المفهوم:
 *    - ملف EUR.USD.csv يُقرأ مرة واحدة فقط عند التشغيل.
 *    - Firestore يحتوي على مستند واحد فقط:  chartState/global
 *          { currentIndex: <number>, updatedAt: <timestamp> }
 *    - كل الأجهزة تقرأ نفس currentIndex وترى نفس السوق نفس اللحظة.
 *    - عند إغلاق الشمعة الحالية والانتقال للتالية → transaction تزيد
 *      currentIndex بمقدار 1 (منع تعارض التحديث بين الأجهزة).
 *    - onSnapshot يستمع لأي تغيير خارجي على المستند فيُطبَّق فوراً.
 *    - سلوك آخر الملف قابل للتعديل عبر WRAP_AT_END:
 *          true  → يعود من البداية (0)
 *          false → يتوقف عند آخر شمعة
 *    - أي قيمة غير صالحة (خارج النطاق / NaN / سالبة) تُعاد ضبطها تلقائياً
 *      إلى قيمة صحيحة مع تحذير في Console.
 * =============================================================== */
const GLOBAL_INDEX_MANAGER = (() => {
  const DOC_PATH_COLLECTION = 'chartState';
  const DOC_PATH_ID         = 'global';

  /* السلوك عند الوصول لآخر شمعة:
     true  = إعادة من البداية (loop)
     false = التوقف عند آخر شمعة */
  const WRAP_AT_END = true;

  let _totalCandles     = 0;
  let _currentIndex     = 0;
  let _anchorEpochMinute= 0;      /* الدقيقة التي بدأت فيها الشمعة currentIndex (مزامنة جميع الأجهزة) */
  let _docRef           = null;
  let _unsubscribe      = null;
  let _initialized      = false;
  let _onIndexChange    = null;   // callback عند وصول تحديث خارجي
  let _updating         = false;  // حماية من re-entrancy

  const _fb = () => window.FIREBASE;

  /* تصحيح قيمة index لتقع دائماً داخل [0, total-1] */
  const _sanitize = (idx, total) => {
    if (total <= 0) return 0;
    if (typeof idx !== 'number' || !isFinite(idx) || idx < 0) {
      console.warn('[GLOBAL_INDEX] قيمة currentIndex غير صالحة (' + idx +
                   ') — إعادة الضبط إلى 0.');
      return 0;
    }
    idx = Math.floor(idx);
    if (idx >= total) {
      if (WRAP_AT_END) {
        console.warn('[GLOBAL_INDEX] currentIndex (' + idx + ') تجاوز عدد الشموع (' +
                     total + ') — إعادة الضبط إلى 0 (WRAP).');
        return 0;
      } else {
        console.warn('[GLOBAL_INDEX] currentIndex (' + idx + ') تجاوز عدد الشموع (' +
                     total + ') — التثبيت على آخر شمعة.');
        return total - 1;
      }
    }
    return idx;
  };

  /* تهيئة المدير: يقرأ (أو ينشئ) مستند chartState/global
     ويُرجع currentIndex العالمي. */
  const init = async (totalCandles) => {
    if (!_fb() || !_fb().ready)
      throw new Error('Firebase لم يُهيَّأ بعد.');
    if (!totalCandles || totalCandles <= 0)
      throw new Error('عدد الشموع غير صالح.');

    _totalCandles = totalCandles;
    _docRef = _fb().doc(_fb().firestore, DOC_PATH_COLLECTION, DOC_PATH_ID);

    // قراءة أولية
    const snap = await _fb().getDoc(_docRef);
    const nowMinute = Math.floor(Date.now() / 60000);
    if (!snap.exists()) {
      // إنشاء المستند لأول مرة على الإطلاق
      _currentIndex = 0;
      _anchorEpochMinute = nowMinute;
      await _fb().setDoc(_docRef, {
        currentIndex: 0,
        anchorEpochMinute: _anchorEpochMinute,
        totalCandles: _totalCandles,
        updatedAt: _fb().serverTimestamp()
      });
      console.info('[GLOBAL_INDEX] تم إنشاء مستند التسلسل العالمي (index=0, anchor=' + _anchorEpochMinute + ').');
    } else {
      const data = snap.data() || {};
      _currentIndex = _sanitize(data.currentIndex, _totalCandles);
      /* قراءة anchor المخزَّن. إن لم يوجد (مستند قديم من إصدار سابق) → استخدم الدقيقة الحالية واكتبها.
         وإن كان غير صالح جداً (قديم جداً → تُتَرك anchor+k > now) تلقائية التصحيح تحدث في advance. */
      const rawAnchor = data.anchorEpochMinute;
      let _anchorNeedsRewrite = false;
      if (typeof rawAnchor === 'number' && isFinite(rawAnchor) && rawAnchor > 0) {
        _anchorEpochMinute = Math.floor(rawAnchor);
      } else {
        _anchorEpochMinute = nowMinute;
        _anchorNeedsRewrite = true;
      }
      /* FIX (Tick Timing Bug): إن كان الـanchor المخزَّن في الماضي (أقدم من الدقيقة
         الجدارية الحالية) — أي أن الشمعة كان يجب أن تُغلق فعلياً منذ وقت طويل
         (مثلاً لا أحد كان يشاهد الصفحة) — فإن TICK_PLAYER سيبدأ ويرى فوراً
         Date.now() >= closeAtMs فيستهلك كل الـTicks دفعة واحدة ويُغلق الشمعة
         خلال أجزاء من الثانية (المتصفح يفتح الشمعة في نفس اللحظة التي
         "يجب أن تُغلق" فيها). نُعيد مزامنته إلى الدقيقة الجدارية الحالية
         حتى تحصل كل شمعة نشطة دائماً على نافذة 60 ثانية كاملة وحقيقية. */
      if (_anchorEpochMinute < nowMinute) {
        console.warn('[GLOBAL_INDEX] anchorEpochMinute المخزَّن (' + _anchorEpochMinute +
                     ') أقدم من الدقيقة الحالية (' + nowMinute + ') — إعادة المزامنة لضمان شمعة 60 ثانية كاملة.');
        _anchorEpochMinute = nowMinute;
        _anchorNeedsRewrite = true;
      }
      // إذا كانت القيمة غير صالحة أو تمّت إعادة مزامنتها، اكتب القيمة المصححة مرة واحدة.
      if (_currentIndex !== data.currentIndex || typeof rawAnchor !== 'number' || _anchorNeedsRewrite) {
        try {
          await _fb().setDoc(_docRef, {
            currentIndex: _currentIndex,
            anchorEpochMinute: _anchorEpochMinute,
            totalCandles: _totalCandles,
            updatedAt: _fb().serverTimestamp()
          }, { merge: true });
        } catch(e) {
          console.warn('[GLOBAL_INDEX] فشل كتابة القيمة المصححة:', e);
        }
      }
      console.info('[GLOBAL_INDEX] currentIndex العالمي = ' + _currentIndex +
                   ' / ' + _totalCandles + ' (anchorMinute=' + _anchorEpochMinute + ')');
    }

    // الاستماع لأي تحديث خارجي (جهاز آخر يزيد الفهرس)
    _unsubscribe = _fb().onSnapshot(_docRef, (docSnap) => {
      if (!docSnap.exists()) return;
      const data = docSnap.data() || {};
      const remote = _sanitize(data.currentIndex, _totalCandles);
      const rawAnchor = data.anchorEpochMinute;
      const remoteAnchor = (typeof rawAnchor === 'number' && isFinite(rawAnchor) && rawAnchor > 0)
        ? Math.floor(rawAnchor)
        : _anchorEpochMinute;
      const changedIdx    = remote       !== _currentIndex;
      const changedAnchor = remoteAnchor !== _anchorEpochMinute;
      if (!changedIdx && !changedAnchor) return;
      const prev = _currentIndex;
      _currentIndex = remote;
      _anchorEpochMinute = remoteAnchor;
      if (_updating) return;   // لا تطلق معالج التغيير من صدى كتابتنا المحلية
      if (changedIdx) {
        console.info('[GLOBAL_INDEX] تحديث خارجي: ' + prev + ' → ' + remote + ' (anchor=' + remoteAnchor + ')');
        if (typeof _onIndexChange === 'function') {
          try { _onIndexChange(_currentIndex, prev); } catch(e) { console.error(e); }
        }
      }
    }, (err) => {
      console.error('[GLOBAL_INDEX] خطأ في onSnapshot:', err);
    });

    _initialized = true;
    return _currentIndex;
  };

  /* advance() — idempotent وآمن ضد التعارض.
     ---------------------------------------------------------------
     يطلب التقديم من anchor إلى anchor+1 (وزيادة currentIndex معه).
     داخل الـ Transaction:
       - إذا كان anchor في Firestore يساوي expectedAnchor فقط، نقدّم.
       - إذا سبقنا جهاز آخر (anchor في Firestore ≠ expectedAnchor)
         → لا نفعل شيئاً، ونُرجع القيم الراهنة (وستصل أيضاً عبر onSnapshot).
     المعامل expectedAnchor يسمح للمُطلّق (setInterval) بأن يطلب زيادة محددة
     (من الدقيقة X إلى X+1) دون خطر القفزتين لو تأخّر المؤقت. */
  const advance = async (expectedAnchor) => {
    if (!_initialized || !_docRef)
      throw new Error('GLOBAL_INDEX_MANAGER لم يُهيَّأ.');
    if (typeof expectedAnchor !== 'number' || !isFinite(expectedAnchor)) {
      // توافق خلفي: أي استدعاء قديم بدون وسيطة → افترض anchor المحلي.
      expectedAnchor = _anchorEpochMinute;
    }
    _updating = true;
    try {
      const result = await _fb().runTransaction(_fb().firestore, async (tx) => {
        const s = await tx.get(_docRef);
        let cur = 0;
        let curAnchor = expectedAnchor;
        if (s.exists()) {
          const d = s.data() || {};
          cur = _sanitize(d.currentIndex, _totalCandles);
          const rawA = d.anchorEpochMinute;
          if (typeof rawA === 'number' && isFinite(rawA) && rawA > 0) {
            curAnchor = Math.floor(rawA);
          }
        }
        // سبقنا جهاز آخر (أو anchor المخزّن لا يطابق ما نتوقّع) → لا تقدم.
        if (curAnchor !== expectedAnchor) {
          return { advanced: false, currentIndex: cur, anchorEpochMinute: curAnchor };
        }
        let next = cur + 1;
        if (next >= _totalCandles) {
          if (WRAP_AT_END) {
            next = 0;
          } else {
            next = _totalCandles - 1;    // ثبات عند آخر شمعة
          }
        }
        const nextAnchor = curAnchor + 1;
        tx.set(_docRef, {
          currentIndex: next,
          anchorEpochMinute: nextAnchor,
          totalCandles: _totalCandles,
          updatedAt: _fb().serverTimestamp()
        }, { merge: true });
        return { advanced: true, currentIndex: next, anchorEpochMinute: nextAnchor };
      });
      _currentIndex      = result.currentIndex;
      _anchorEpochMinute = result.anchorEpochMinute;
      return result;
    } catch (err) {
      console.error('[GLOBAL_INDEX] فشل advance() transaction:', err);
      throw err;
    } finally {
      // نُبقي _updating=true لبرهة قصيرة حتى يمر صدى onSnapshot الخاص بنا.
      setTimeout(() => { _updating = false; }, 250);
    }
  };

  const getIndex     = () => _currentIndex;
  const getTotal     = () => _totalCandles;
  const getAnchor    = () => _anchorEpochMinute;
  const onChange     = (cb) => { _onIndexChange = cb; };
  const dispose      = () => { if (_unsubscribe) { _unsubscribe(); _unsubscribe = null; } };

  return { init, advance, getIndex, getTotal, getAnchor, onChange, dispose, WRAP_AT_END };
})();


/* ===============================================================
 *  7. APP
 *  --------------------------------------------------------------
 *  الوظائف الأخرى بلا أي تغيير — التعديل فقط في:
 *    - init() : تحقق من جلسة المستخدم (Auth) قبل التشغيل، وإلا
 *               إعادة توجيه إلى login.html.
 *    - autoLoadCsv() : يقرأ CSV مرة واحدة فقط.
 *    - rebuild() : يبدأ من currentIndex العالمي (Firestore).
 *    - onClose (Live) : يستدعي GLOBAL_INDEX_MANAGER.advance()
 *                       لمزامنة تقدّم الشمعة بين جميع الأجهزة.
 * =============================================================== */
const APP = (() => {
  const state = {
    currentTF: '1m',
    aggregated: [],
    liveEnabled: true,
    symbol: '',
    /* نسخة الشموع الأصلية 1m كاملة (تُبنى من buckets الـTicks — تُقرأ مرة واحدة فقط) */
    m1Full: [],
    /* buckets الدقائق (كل عنصر يحتوي على Ticks الحقيقية) */
    tickBuckets: [],
    /* الفهرس العالمي داخل m1Full/tickBuckets — مصدره Firestore */
    globalIndex: 0,
    /* هل تم تحميل ملف الـTicks بالفعل؟ (لضمان قراءته مرة واحدة فقط) */
    csvLoaded: false
  };
  const els = {};

  const cacheEls = () => {
    els.loadingOver  = document.getElementById('loadingOverlay');
    els.loadingText  = document.getElementById('loadingText');
    els.symbolLabel  = document.getElementById('symbolLabel');
    els.livePrice    = document.getElementById('livePrice');
    els.tfButtons    = document.getElementById('tfButtons');
    els.btnReload    = document.getElementById('btnReload');
    els.btnFit       = document.getElementById('btnFit');
    els.btnLive      = document.getElementById('btnLive');
    els.btnBuy       = document.getElementById('btnBuy');
    els.btnSell      = document.getElementById('btnSell');
    els.btnCloseAll  = document.getElementById('btnCloseAll');
    els.positions    = document.getElementById('positionsList');
    els.statusText   = document.getElementById('statusText');
    els.statsText    = document.getElementById('statsText');
    els.ptmH         = document.getElementById('ptmH');
  };

  const showLoading = (msg) => {
    els.loadingOver.classList.remove('hidden');
    els.loadingText.textContent = msg || 'جاري التحميل...';
  };
  const hideLoading = () => els.loadingOver.classList.add('hidden');

  /* ===============================================================
   *  AUTO-LOADER: يحمّل EUR.USD.csv تلقائياً من نفس الدومين
   *  --------------------------------------------------------------
   *  - لا يعتمد على أي تدخل من المستخدم.
   *  - يستخدم fetch() مع cache-busting بسيط (query-string بالطابع الزمني)
   *    حتى يقرأ Vercel/GitHub Pages أحدث نسخة من الملف عند كل فتح.
   *  - في حالة الفشل يعرض رسالة واضحة في Console + على الشاشة.
   * =============================================================== */
  const AUTO_CSV_FILENAME = 'EUR.USD.csv';

  /* ===============================================================
   *  autoLoadCsv:
   *  - يقرأ ملف Tick Data (باسم EUR.USD.csv) مرة واحدة فقط
   *    (state.csvLoaded يمنع التكرار).
   *  - يبني buckets الدقائق داخل DATA_LOADER (تجميع Ticks → OHLC داخلياً).
   *  - يهيئ GLOBAL_INDEX_MANAGER بعد نجاح القراءة.
   *  - يبدأ الشارت من الشمعة التي يشير إليها currentIndex العالمي.
   *  - زر ↻ (btnReload) يستطيع فرض إعادة التحميل الكامل عند الحاجة.
   * =============================================================== */
  const autoLoadCsv = async ({ force = false } = {}) => {
    // منع القراءة المتكررة — ملف الـTicks يُحمَّل مرة واحدة فقط ما لم نُجبَر على إعادة التحميل.
    if (state.csvLoaded && !force) {
      console.info('[AUTO-TICK] الملف محمَّل مسبقاً — لا حاجة لإعادة القراءة.');
      rebuild();
      return;
    }

    const url = AUTO_CSV_FILENAME + '?v=' + Date.now();
    try {
      showLoading('جاري تحميل ' + AUTO_CSV_FILENAME + ' ...');
      // نستخدم DATA_LOADER.loadFromUrl (يقرأ Tick Data ويجمّعها إلى دقائق داخلياً)
      const { candles: c2, buckets, ticks, symbol } = await DATA_LOADER.loadFromUrl(url);
      if (!buckets || !buckets.length || !c2 || !c2.length) {
        throw new Error('لم يتم استخراج أي دقائق/شموع من ' + AUTO_CSV_FILENAME);
      }

      state.symbol      = symbol || 'EURUSD';
      state.m1Full      = c2.slice();          // شموع M1 المغلقة (مبنية من Ticks)
      state.tickBuckets = buckets;             // buckets الدقائق (للوصول السريع)
      state.csvLoaded   = true;
      els.symbolLabel.textContent = state.symbol;

      console.info('[AUTO-TICK] تم تحميل ' + AUTO_CSV_FILENAME +
                   ' بنجاح — عدد الـTicks: ' + (ticks ? ticks.length : 0) +
                   ' — عدد الدقائق: ' + state.m1Full.length);

      // تهيئة الفهرس العالمي من Firestore (مرة واحدة).
      showLoading('جاري مزامنة الشمعة الحالية...');
      try {
        state.globalIndex = await GLOBAL_INDEX_MANAGER.init(state.m1Full.length);
      } catch (fErr) {
        console.error('[GLOBAL_INDEX] فشل الاتصال بـ Firestore:', fErr);
        // في حال فشل Firestore نُشغّل النظام بالاعتماد على m1Full كاملاً كسلوك احتياطي.
        state.globalIndex = 0;
      }

      // اربط الاستماع للتحديثات الخارجية: أي جهاز آخر يزيد currentIndex
      // ينعكس تلقائياً على هذا الجهاز.
      GLOBAL_INDEX_MANAGER.onChange((newIdx, prevIdx) => {
        state.globalIndex = newIdx;
        // إعادة بناء الشارت لعرض نفس الحالة على جميع الأجهزة.
        rebuild();
      });

      rebuild();
      hideLoading();
    } catch (err) {
      console.error('[AUTO-TICK ERROR] فشل تحميل ' + AUTO_CSV_FILENAME + ':', err);
      setStatus('فشل تحميل ' + AUTO_CSV_FILENAME + ' — راجع Console');
      els.loadingText.textContent =
        '❌ فشل تحميل ' + AUTO_CSV_FILENAME + '\n' + err.message;
    }
  };

  const setStatus = (msg) => { els.statusText.textContent = msg; };
  const setStats  = () => {
    els.statsText.textContent =
      `Candles: ${state.aggregated.length} | ${state.currentTF}`;
  };

  const updatePriceLabel = (price, up) => {
    els.livePrice.textContent = price.toFixed(5);
    els.livePrice.style.color = up ? '#21c965' : '#ff4f4f';
    // تحديث طبقة الأسعار العائمة فوق الشارت
    if (CHART_MANAGER.setLivePrice) CHART_MANAGER.setLivePrice(price, up);
  };

  /* ===============================================================
   *  rebuild:
   *  --------------------------------------------------------------
   *  يبني الشارت بحيث تكون الشمعة النشطة (اللحظية) هي بالضبط
   *  الشمعة التي يشير إليها state.globalIndex داخل m1Full.
   *  --------------------------------------------------------------
   *  المنطق المطابق للمواصفات:
   *   - idx == 0  → لا توجد شموع سابقة؛ تُعرض فقط الشمعة رقم 0 كشمعة نشطة.
   *   - idx == 20 → تُعرض الشمعات 0..19 كشموع تاريخية مغلقة،
   *                  والشمعة 20 هي الشمعة النشطة التي تتحرّك.
   *  - CSV لا يُعاد تحميله هنا نهائياً — نعتمد فقط على state.m1Full.
   *  تأخذ شريحة [0 .. idx] ثم تُجمّعها للـ TF المطلوب (للعرض فقط؛
   *  التقدّم في currentIndex مرتبط دائماً بشموع 1m).
   * =============================================================== */
  const rebuild = () => {
    const m1Full = state.m1Full;
    if (!m1Full || !m1Full.length) return;

    const total = m1Full.length;
    // ضمان صلاحية الفهرس (طبقة حماية إضافية بجانب GLOBAL_INDEX_MANAGER)
    let idx = state.globalIndex;
    if (typeof idx !== 'number' || !isFinite(idx) || idx < 0) {
      console.warn('[REBUILD] globalIndex غير صالح (' + idx + ') — الضبط إلى 0.');
      idx = 0;
    }
    if (idx >= total) {
      console.warn('[REBUILD] globalIndex (' + idx + ') ≥ total (' + total +
                   ') — الضبط إلى ' + (total - 1) + '.');
      idx = total - 1;
    }
    state.globalIndex = idx;

    /* شريحة من البداية حتى الشمعة الحالية شاملة (آخر عنصر = الشمعة النشطة).
       عند idx=0: m1Slice = [candle0] → شمعة واحدة فقط (هي النشطة)، ولا شموع سابقة. */
    const m1Slice = m1Full.slice(0, idx + 1);

    const samplePrice = m1Slice[m1Slice.length - 1].close;
    let precision = 5, minMove = 0.00001;
    if (samplePrice > 100)   { precision = 3; minMove = 0.001; }
    if (samplePrice > 1000)  { precision = 2; minMove = 0.01; }
    CHART_MANAGER.setPricePrecision(precision, minMove);

    state.aggregated = CANDLE_ENGINE.aggregate(m1Slice, state.currentTF);
    CHART_MANAGER.setData(state.aggregated);
    FAKE_PRICE_GEN.stop();
    if (state.liveEnabled && state.aggregated.length) startLive();
    CHART_MANAGER.fitContent();
    setStats();
    setStatus(`${state.symbol} • ${state.aggregated.length} • idx ${idx}/${total-1}`);
  };

  /* startLive:
     --------------------------------------------------------------
     - يعتمد الآن على TICK_PLAYER الذي يعيد تشغيل Ticks الحقيقية
       من bucket الدقيقة النشطة (state.tickBuckets[state.globalIndex]).
     - يُمرِّر anchorEpochMinute المحفوظ في Firestore إلى المشغّل
       حتى تُغلق الشمعة عند الحدّ الفعلي للدقيقة (متزامناً مع بقية الأجهزة).
     - عند الإغلاق: نطلب advance(expectedAnchor). إن نجح الـ transaction
       → onIndexChange سيعيد بناء الشارت (rebuild) لعرض الشمعة التالية
       الحقيقية من bucket التالي. إن فشل (جهاز آخر سبقنا) → onSnapshot
       يجلب القيمة الصحيحة تلقائياً ويُعاد بناء الشارت أيضاً. */
  const startLive = () => {
    const last = state.aggregated[state.aggregated.length - 1];
    if (!last) return;

    /* bucket الدقيقة النشطة الحقيقية = state.tickBuckets[state.globalIndex].
       ملاحظة: aggregated قد يكون مُجمَّعاً (5m/15m/…) لكن TICK_PLAYER
       يعيد تشغيل ticks الدقيقة الأخيرة فقط، ونحن نُدرج تأثيرها في الشمعة
       المجمَّعة الأخيرة ديناميكياً في onTick أدناه. */
    const activeBucket = state.tickBuckets && state.tickBuckets[state.globalIndex]
      ? state.tickBuckets[state.globalIndex]
      : null;

    const expectedAnchor = (GLOBAL_INDEX_MANAGER.getAnchor && GLOBAL_INDEX_MANAGER.getAnchor())
      ? GLOBAL_INDEX_MANAGER.getAnchor()
      : Math.floor(Date.now() / 60000);

    /* لدمج شمعة الدقيقة النشطة داخل الشمعة المُجمَّعة الأخيرة (5m/15m/…) بشكل صحيح،
       نحتفظ بـ snapshot للشمعة المجمَّعة الأخيرة *قبل* بداية الدقيقة النشطة —
       أي بدون الشمعة M1 النشطة الحالية. عند كل tick نُحدّث high/low/close
       فقط باستخدام قيم الشمعة M1 النشطة الجزئية.

       الحالة الخاصة: إذا كان TF = '1m' فإن الشمعة المجمَّعة الأخيرة هي
       بذاتها شمعة M1 النشطة، وسيُستبدلها candle.
    */
    let baseAggregated = null;   // snapshot للشمعة المجمَّعة قبل دمج M1 النشطة
    if (state.currentTF !== '1m' && state.aggregated.length > 0) {
      // ابنِ الشريحة M1 حتى قبل الدقيقة النشطة (idx-1) ثم جمِّعها ثم خذ الأخيرة.
      const idx = state.globalIndex;
      if (idx > 0) {
        const sliceBefore = state.m1Full.slice(0, idx);   // exclude idx
        const aggBefore   = CANDLE_ENGINE.aggregate(sliceBefore, state.currentTF);
        if (aggBefore.length) {
          const lastAggT = state.aggregated[state.aggregated.length - 1].time;
          const match = aggBefore[aggBefore.length - 1];
          if (match && match.time === lastAggT) {
            baseAggregated = { ...match };
          }
        }
      }
    }

    FAKE_PRICE_GEN.start({
      bucket: activeBucket,
      lastCandle: last,
      tf: state.currentTF,
      anchorEpochMinute: expectedAnchor,
      onTick: (m1Candle) => {
        /* m1Candle = الشمعة M1 النشطة المبنيّة من Ticks حتى الآن. */
        let displayCandle;
        if (state.currentTF === '1m') {
          displayCandle = m1Candle;
        } else if (baseAggregated) {
          // ادمج m1Candle داخل الشمعة المجمَّعة الأخيرة
          displayCandle = {
            time:   baseAggregated.time,
            open:   baseAggregated.open,
            high:   Math.max(baseAggregated.high, m1Candle.high),
            low:    Math.min(baseAggregated.low,  m1Candle.low),
            close:  m1Candle.close,
            volume: (baseAggregated.volume || 0) + (m1Candle.volume || 0)
          };
        } else {
          // لا شموع سابقة داخل نفس الـbucket المجمَّع → الشمعة النشطة = m1 النشطة
          displayCandle = {
            time:   state.aggregated[state.aggregated.length - 1].time,
            open:   m1Candle.open,
            high:   m1Candle.high,
            low:    m1Candle.low,
            close:  m1Candle.close,
            volume: m1Candle.volume || 0
          };
        }

        state.aggregated[state.aggregated.length - 1] = displayCandle;
        CHART_MANAGER.update(displayCandle);
        const prevClose = state.aggregated.length > 1
          ? state.aggregated[state.aggregated.length - 2].close
          : displayCandle.open;
        updatePriceLabel(displayCandle.close, displayCandle.close >= prevClose);
        // Update floating time label
        if (els.ptmH) {
          const d = new Date(displayCandle.time * 1000);
          els.ptmH.textContent = d.toISOString().substr(11,8);
        }
        TRADE_MANAGER.updateLivePnL(displayCandle.close);
      },
      onClose: (closedM1, next) => {
        /* أغلقنا الشمعة محلياً — دمج شمعة M1 المغلقة داخل الشمعة المُجمَّعة الأخيرة
           بنفس منطق onTick (لا يتغيّر السلوك المرئي). ثم أوقف المشغّل وانتظر Firestore. */
        let finalCandle;
        if (state.currentTF === '1m') {
          finalCandle = closedM1;
        } else if (baseAggregated) {
          finalCandle = {
            time:   baseAggregated.time,
            open:   baseAggregated.open,
            high:   Math.max(baseAggregated.high, closedM1.high),
            low:    Math.min(baseAggregated.low,  closedM1.low),
            close:  closedM1.close,
            volume: (baseAggregated.volume || 0) + (closedM1.volume || 0)
          };
        } else {
          finalCandle = {
            time:   state.aggregated[state.aggregated.length - 1].time,
            open:   closedM1.open,
            high:   closedM1.high,
            low:    closedM1.low,
            close:  closedM1.close,
            volume: closedM1.volume || 0
          };
        }
        state.aggregated[state.aggregated.length - 1] = finalCandle;
        CHART_MANAGER.update(finalCandle);
        FAKE_PRICE_GEN.stop();
        setStats();

        /* ===============================================================
         *  التسلسل العالمي: انتهت الدقيقة → قدِّم currentIndex في
         *  Firestore عبر Transaction مع تمرير expectedAnchor.
         *  - إن نجحنا: onIndexChange سيقود rebuild() تلقائياً.
         *  - إن سبقنا جهاز آخر: onSnapshot الخارجي سيجلب القيمة الجديدة.
         * =============================================================== */
        GLOBAL_INDEX_MANAGER.advance(expectedAnchor)
          .then((result) => {
            if (result && result.advanced) {
              console.info('[LIVE] Advanced globalIndex → ' + result.currentIndex +
                           ' (anchor=' + result.anchorEpochMinute + ')');
              /* نجحت الـ Transaction محلياً: حدّث state مباشرة وأعد البناء. */
              state.globalIndex = result.currentIndex;
              rebuild();
            } else {
              console.info('[LIVE] جهاز آخر سبقنا — سنتلقى التحديث عبر onSnapshot.');
              /* Transaction قرأت أن anchor تغيّر مسبقاً, غالباً وصلتنا القيمة
                 الجديدة داخل result. أعد البناء لمطابقة الفهرس. */
              if (result && typeof result.currentIndex === 'number') {
                state.globalIndex = result.currentIndex;
                rebuild();
              }
            }
            /* شبكة أمان: إذا لم يبدأ المولّد لأي سبب, أعد البناء بعد فترة قصيرة. */
            setTimeout(() => {
              if (!FAKE_PRICE_GEN.isRunning()) rebuild();
            }, 800);
          })
          .catch((err) => {
            console.error('[LIVE] فشل تقديم currentIndex:', err);
            setTimeout(() => {
              if (!FAKE_PRICE_GEN.isRunning()) rebuild();
            }, 1500);
          });
      },
    });
  };

  const onTFClick = (e) => {
    const btn = e.target.closest('.tfb');
    if (!btn) return;
    const tf = btn.dataset.tf;
    if (!tf || tf === state.currentTF) return;
    document.querySelectorAll('.tfb').forEach(b => b.classList.remove('on'));
    btn.classList.add('on');
    state.currentTF = tf;
    rebuild();
  };

  /* ===============================================================
   *  bootUI:
   *  إعداد واجهة المستخدم كما في الأصل — بلا أي تغيير في السلوك.
   *  استُخرجت من init() لتُستدعى فقط بعد التحقق من جلسة المستخدم.
   * =============================================================== */
  const bootUI = () => {
    cacheEls();
    CHART_MANAGER.create(document.getElementById('chart'));
    TRADE_MANAGER.attach(els.positions);

    els.tfButtons.addEventListener('click', onTFClick);

    // زر ↻ يعيد قراءة CSV بالكامل عند الطلب اليدوي (force reload).
    els.btnReload.addEventListener('click', () => autoLoadCsv({ force: true }));
    els.btnFit.addEventListener('click', () => CHART_MANAGER.fitContent());
    els.btnLive.addEventListener('click', () => {
      state.liveEnabled = !state.liveEnabled;
      els.btnLive.style.color = state.liveEnabled ? '#21c965' : '#c7d5ef';
      if (state.liveEnabled) startLive();
      else FAKE_PRICE_GEN.stop();
      setStats();
    });

    els.btnBuy.addEventListener('click', () => {
      const px = FAKE_PRICE_GEN.getPrice() ||
                 (state.aggregated.length ? state.aggregated.at(-1).close : 0);
      if (px) TRADE_MANAGER.open('BUY', px);
    });
    els.btnSell.addEventListener('click', () => {
      const px = FAKE_PRICE_GEN.getPrice() ||
                 (state.aggregated.length ? state.aggregated.at(-1).close : 0);
      if (px) TRADE_MANAGER.open('SELL', px);
    });
    els.btnCloseAll.addEventListener('click', () => TRADE_MANAGER.closeAll());

    setStatus('في انتظار البيانات');

    // تحميل تلقائي فوري لملف EUR.USD.csv — يحدث مرة واحدة فقط طوال الجلسة.
    autoLoadCsv();
  };

  /* ===============================================================
   *  init:
   *  --------------------------------------------------------------
   *  1) ينتظر جهوزية Firebase (module قد يُحمَّل بعد DOMContentLoaded).
   *  2) يتحقق من جلسة المستخدم عبر onAuthStateChanged.
   *     - إن لم يكن هناك مستخدم مسجل → إعادة توجيه إلى login.html.
   *     - إن كان هناك مستخدم → bootUI() يشغّل النظام.
   *  3) يتم كل ذلك في الخلفية — لا واجهة تسجيل داخل هذه الصفحة.
   * =============================================================== */
  const init = () => {
    const startWhenReady = () => {
      const FB = window.FIREBASE;
      if (!FB || !FB.ready) {
        // إذا لم يجهز Firebase بعد، انتظر الحدث.
        window.addEventListener('firebase-ready', startWhenReady, { once: true });
        return;
      }

      // حراسة الجلسة — نتحقق مرة واحدة بعد ثبات حالة المصادقة.
      let authResolved = false;
      FB.onAuthStateChanged(FB.auth, (user) => {
        if (authResolved) return;   // نتعامل مع أول تقرير حالة فقط
        authResolved = true;

        if (!user) {
          console.warn('[AUTH] لا توجد جلسة مستخدم — إعادة توجيه إلى login.html');
          // منع أي وميض للـ UI قبل التوجيه.
          try { document.body.style.visibility = 'hidden'; } catch(e){}
          window.location.replace('login.html');
          return;
        }

        console.info('[AUTH] مستخدم مسجَّل: ' + (user.email || user.uid));
        bootUI();
      }, (err) => {
        console.error('[AUTH] خطأ في مراقبة حالة الجلسة:', err);
        window.location.replace('login.html');
      });
    };

    startWhenReady();
  };

  return { init };
})();

window.addEventListener('DOMContentLoaded', APP.init);
</script>
