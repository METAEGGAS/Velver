<!DOCTYPE html><html lang="ar"><head><meta charset="UTF-8"><title>محاكي التداول</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial}body{background:#0d1421;color:#d1d4dc;overflow:hidden}#app{display:flex;flex-direction:column;height:100vh}#top{background:#1e222d;padding:8px 15px;display:flex;justify-content:space-between;align-items:center;border-bottom:1px solid #2a2e39;flex-wrap:wrap;gap:10px}.sym{font-size:18px;font-weight:bold;color:#fff}.price{font-size:22px;font-weight:bold}.up{color:#26a69a}.dn{color:#ef5350}.stats{display:flex;gap:15px;font-size:12px}.stat span{color:#787b86;display:block}.ctrl{display:flex;gap:5px}.btn{background:#2a2e39;color:#d1d4dc;border:none;padding:6px 12px;cursor:pointer;border-radius:3px;font-size:12px}.btn:hover{background:#363a45}.btn.act{background:#2962ff;color:#fff}#chart{flex:1;position:relative;background:#0d1421}canvas{position:absolute;top:0;left:0}#tip{position:absolute;background:#1e222d;border:1px solid #2a2e39;padding:8px;font-size:11px;pointer-events:none;display:none;z-index:10;border-radius:3px}#bot{background:#1e222d;padding:10px;border-top:1px solid #2a2e39;display:flex;gap:10px;flex-wrap:wrap;align-items:center}.trd{display:flex;gap:5px;align-items:center}.buy{background:#26a69a;color:#fff;padding:8px 20px;border:none;cursor:pointer;font-weight:bold;border-radius:3px}.sell{background:#ef5350;color:#fff;padding:8px 20px;border:none;cursor:pointer;font-weight:bold;border-radius:3px}input{background:#2a2e39;color:#fff;border:1px solid #363a45;padding:6px;width:80px;border-radius:3px}.bal{font-size:14px}.bal b{color:#26a69a}</style></head><body><div id="app"><div id="top"><div><div class="sym" id="sym">BTC/USDT</div><div class="price" id="prc">0.00</div></div><div class="stats"><div class="stat"><span>التغير 24س</span><b id="chg">0%</b></div><div class="stat"><span>أعلى</span><b id="hi">0</b></div><div class="stat"><span>أدنى</span><b id="lo">0</b></div><div class="stat"><span>الحجم</span><b id="vol">0</b></div></div><div class="ctrl"><select class="btn" id="selSym"><option value="BTC/USDT">BTC/USDT</option><option value="ETH/USDT">ETH/USDT</option><option value="XAU/USD">XAU/USD</option><option value="EUR/USD">EUR/USD</option></select><button class="btn act" data-tf="1">1د</button><button class="btn" data-tf="5">5د</button><button class="btn" data-tf="15">15د</button><button class="btn" data-tf="60">1س</button><button class="btn" id="pause">⏸</button></div></div><div id="chart"><canvas id="cv"></canvas><div id="tip"></div></div><div id="bot"><div class="bal">الرصيد: $<b id="bl">10000.00</b> | المفتوح: <b id="op">0</b> | الربح/الخسارة: <b id="pl">$0.00</b></div><div class="trd"><input type="number" id="qty" value="0.01" step="0.01"><button class="buy" onclick="tr(1)">شراء</button><button class="sell" onclick="tr(-1)">بيع</button><button class="btn" onclick="cl()">إغلاق الكل</button></div></div></div><script>
const cv=document.getElementById('cv'),ctx=cv.getContext('2d'),tip=document.getElementById('tip');
let S={sym:'BTC/USDT',tf:1,price:0,candles:[],paused:false,bal:10000,pos:[],mx:-1,my:-1,zoom:1,ofs:0,trend:0};
const base={'BTC/USDT':45000,'ETH/USDT':2500,'XAU/USD':2000,'EUR/USD':1.08};
const volPct={'BTC/USDT':0.0025,'ETH/USDT':0.003,'XAU/USD':0.0015,'EUR/USD':0.0008};
function rnd(){let u=0,v=0;while(u===0)u=Math.random();while(v===0)v=Math.random();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)}
function genCandle(prevClose,vp,trend){const o=prevClose,drift=trend*vp*0.15,vol=vp*(0.7+Math.random()*0.6),c=o*(1+drift+rnd()*vol*0.5),bodyHi=Math.max(o,c),bodyLo=Math.min(o,c),bodySize=bodyHi-bodyLo,wickMax=bodySize*(0.3+Math.random()*0.7)+o*vp*0.1,h=bodyHi+Math.random()*wickMax*0.5,l=bodyLo-Math.random()*wickMax*0.5;return{o,h,l,c,v:Math.random()*800+400}}
function init(){S.candles=[];let p=base[S.sym];const now=Date.now(),tfMs=S.tf*60000,vp=volPct[S.sym];let trend=0;for(let i=200;i>=0;i--){if(Math.random()<0.05)trend=(Math.random()-0.5)*2;else trend*=0.98;const t=now-i*tfMs,cd=genCandle(p,vp,trend);S.candles.push({t,...cd});p=cd.c}S.price=p;S.trend=trend}
function tick(){if(S.paused)return;const c=S.candles[S.candles.length-1],vp=volPct[S.sym];if(Math.random()<0.03)S.trend=(Math.random()-0.5)*2;else S.trend*=0.99;const mv=S.price*(S.trend*vp*0.02+rnd()*vp*0.08);S.price+=mv;c.c=S.price;if(S.price>c.h)c.h=S.price;if(S.price<c.l)c.l=S.price;c.v+=Math.random()*8;const tfMs=S.tf*60000;if(Date.now()-c.t>tfMs){const nc=genCandle(S.price,vp,S.trend);S.candles.push({t:Date.now(),o:S.price,h:Math.max(S.price,S.price*1.0005),l:Math.min(S.price,S.price*0.9995),c:S.price,v:Math.random()*300+200});S.price=S.candles[S.candles.length-1].c;if(S.candles.length>500)S.candles.shift()}updInfo();draw()}
function updInfo(){const c=S.candles,p=S.price,first=c[Math.max(0,c.length-100)].o,chg=((p-first)/first*100),hi=Math.max(...c.slice(-100).map(x=>x.h)),lo=Math.min(...c.slice(-100).map(x=>x.l)),v=c.slice(-100).reduce((a,b)=>a+b.v,0);const dec=S.sym==='EUR/USD'?4:2;document.getElementById('prc').textContent=p.toFixed(dec);document.getElementById('prc').className='price '+(chg>=0?'up':'dn');document.getElementById('chg').textContent=(chg>=0?'+':'')+chg.toFixed(2)+'%';document.getElementById('chg').className=chg>=0?'up':'dn';document.getElementById('hi').textContent=hi.toFixed(dec);document.getElementById('lo').textContent=lo.toFixed(dec);document.getElementById('vol').textContent=v.toFixed(0);let pl=0;S.pos.forEach(po=>{pl+=(p-po.p)*po.q*po.d});document.getElementById('pl').textContent='$'+pl.toFixed(2);document.getElementById('pl').className=pl>=0?'up':'dn';document.getElementById('op').textContent=S.pos.length;document.getElementById('bl').textContent=S.bal.toFixed(2)}
function draw(){const w=cv.width=cv.parentElement.clientWidth,h=cv.height=cv.parentElement.clientHeight,pd=60,vh=h*0.75,volH=h*0.2;ctx.fillStyle='#0d1421';ctx.fillRect(0,0,w,h);const vis=Math.floor(80/S.zoom),start=Math.max(0,S.candles.length-vis-S.ofs),end=S.candles.length-S.ofs,cs=S.candles.slice(start,end);if(!cs.length)return;const hi=Math.max(...cs.map(c=>c.h)),lo=Math.min(...cs.map(c=>c.l)),pad=(hi-lo)*0.1,ymax=hi+pad,ymin=lo-pad,yr=ymax-ymin,cw=(w-pd)/cs.length,mv=Math.max(...cs.map(c=>c.v));ctx.strokeStyle='#1e222d';ctx.lineWidth=1;for(let i=0;i<=5;i++){const y=vh*i/5;ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w-pd,y);ctx.stroke();const pr=ymax-yr*i/5,dec=S.sym==='EUR/USD'?4:2;ctx.fillStyle='#787b86';ctx.font='10px Arial';ctx.fillText(pr.toFixed(dec),w-pd+5,y+4)}cs.forEach((c,i)=>{const x=i*cw+cw/2,yO=vh-((c.o-ymin)/yr)*vh,yC=vh-((c.c-ymin)/yr)*vh,yH=vh-((c.h-ymin)/yr)*vh,yL=vh-((c.l-ymin)/yr)*vh,up=c.c>=c.o,col=up?'#26a69a':'#ef5350';ctx.strokeStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,yH);ctx.lineTo(x,yL);ctx.stroke();ctx.fillStyle=col;const bw=Math.max(cw*0.7,1);ctx.fillRect(x-bw/2,Math.min(yO,yC),bw,Math.max(Math.abs(yC-yO),1));const vy=vh+20+(volH-20)*(1-c.v/mv);ctx.fillStyle=col+'80';ctx.fillRect(x-bw/2,vy,bw,vh+volH-vy)});const cp=S.price,yp=vh-((cp-ymin)/yr)*vh;if(yp>=0&&yp<=vh){ctx.strokeStyle='#2962ff';ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(0,yp);ctx.lineTo(w-pd,yp);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#2962ff';ctx.fillRect(w-pd,yp-9,pd,18);ctx.fillStyle='#fff';ctx.font='bold 11px Arial';const dec=S.sym==='EUR/USD'?4:2;ctx.fillText(cp.toFixed(dec),w-pd+3,yp+4)}S.pos.forEach(po=>{const y=vh-((po.p-ymin)/yr)*vh;if(y<0||y>vh)return;ctx.strokeStyle=po.d>0?'#26a69a':'#ef5350';ctx.setLineDash([5,5]);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w-pd,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=po.d>0?'#26a69a':'#ef5350';ctx.font='10px Arial';ctx.fillText((po.d>0?'▲شراء ':'▼بيع ')+po.q,5,y-3)});if(S.mx>=0&&S.mx<w-pd&&S.my>=0&&S.my<vh){ctx.strokeStyle='#363a45';ctx.setLineDash([2,2]);ctx.beginPath();ctx.moveTo(S.mx,0);ctx.lineTo(S.mx,vh);ctx.moveTo(0,S.my);ctx.lineTo(w-pd,S.my);ctx.stroke();ctx.setLineDash([]);const idx=Math.floor(S.mx/cw);if(cs[idx]){const c=cs[idx],dec=S.sym==='EUR/USD'?4:2;tip.style.display='block';tip.style.left=Math.min(S.mx+15,w-160)+'px';tip.style.top=(S.my+15)+'px';tip.innerHTML=`<b>${new Date(c.t).toLocaleTimeString()}</b><br>افتتاح: ${c.o.toFixed(dec)}<br>أعلى: ${c.h.toFixed(dec)}<br>أدنى: ${c.l.toFixed(dec)}<br>إغلاق: ${c.c.toFixed(dec)}<br>حجم: ${c.v.toFixed(0)}`}}else tip.style.display='none'}
function tr(d){const q=parseFloat(document.getElementById('qty').value);if(!q||q<=0)return;S.pos.push({d,q,p:S.price,t:Date.now()})}
function cl(){let tot=0;S.pos.forEach(po=>{tot+=(S.price-po.p)*po.q*po.d});S.bal+=tot;S.pos=[];updInfo()}
cv.parentElement.addEventListener('mousemove',e=>{const r=cv.getBoundingClientRect();S.mx=e.clientX-r.left;S.my=e.clientY-r.top;draw()});
cv.parentElement.addEventListener('mouseleave',()=>{S.mx=-1;S.my=-1;tip.style.display='none';draw()});
cv.parentElement.addEventListener('wheel',e=>{e.preventDefault();S.zoom=Math.max(0.3,Math.min(3,S.zoom+(e.deltaY<0?0.1:-0.1)));draw()});
document.querySelectorAll('[data-tf]').forEach(b=>b.onclick=()=>{document.querySelectorAll('[data-tf]').forEach(x=>x.classList.remove('act'));b.classList.add('act');S.tf=+b.dataset.tf;init();draw()});
document.getElementById('selSym').onchange=e=>{S.sym=e.target.value;document.getElementById('sym').textContent=S.sym;init();draw()};
document.getElementById('pause').onclick=e=>{S.paused=!S.paused;e.target.textContent=S.paused?'▶':'⏸'};
window.addEventListener('resize',draw);init();updInfo();draw();setInterval(tick,300);
</script></body></html>
