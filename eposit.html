<!doctype html><html dir=rtl lang=ar><meta charset=utf-8><meta name=viewport content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover"><meta name=theme-color content=#0d1730><title>FXER · لوحة توليد الشموع</title><style>:root{--u:#0d1730;--bd:#223252;--ac:#3a7bff;--gn:#26a69a;--rd:#ef5350;--mu:#8aa0c7}*{box-sizing:border-box;-webkit-tap-highlight-color:transparent;margin:0;padding:0}html,body{height:100%}body{background:var(--u);color:#eef5ff;font:500 13px/1.35 system-ui,-apple-system,Segoe UI,Tahoma,Arial,sans-serif;overflow-x:hidden;padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left)}.wrap{max-width:720px;margin:0 auto;padding:12px}h1{font-size:16px;font-weight:700;margin:0 0 10px;text-align:center;color:#cfe0ff}.card{background:#0f1c3a;border:1px solid var(--bd);border-radius:10px;padding:12px;margin-bottom:10px}.row{display:flex;gap:8px;margin-bottom:8px;flex-wrap:wrap}.row>*{flex:1}label{display:block;font-size:11px;color:var(--mu);margin-bottom:4px}input,select,button{width:100%;background:#0d1730;color:#eef5ff;border:1px solid var(--bd);border-radius:8px;padding:9px 10px;font:inherit;outline:none}input:focus,select:focus{border-color:var(--ac)}button{background:var(--ac);border-color:var(--ac);color:#fff;font-weight:700;cursor:pointer}button.sec{background:#152344;border-color:var(--bd);color:#cfe0ff}button.danger{background:var(--rd);border-color:var(--rd)}button:disabled{opacity:.5;cursor:not-allowed}.pill{display:inline-block;padding:3px 8px;border:1px solid var(--bd);border-radius:999px;font-size:11px;color:var(--mu);margin:2px 4px 2px 0}.pill.on{background:var(--ac);border-color:var(--ac);color:#fff}.tfs{display:flex;gap:6px;flex-wrap:wrap}.tfs .pill{cursor:pointer;user-select:none}.log{background:#0a1428;border:1px solid var(--bd);border-radius:8px;padding:8px;max-height:220px;overflow:auto;font:12px/1.4 ui-monospace,Menlo,Consolas,monospace;white-space:pre-wrap;word-break:break-all}.log .ok{color:var(--gn)}.log .er{color:var(--rd)}.log .mu{color:var(--mu)}.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 8px;background:#152344;border:1px solid var(--bd);border-radius:6px;font-size:11px}.dot{width:8px;height:8px;border-radius:50%;background:var(--mu)}.dot.on{background:var(--gn);box-shadow:0 0 6px var(--gn)}.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}.mini{font-size:11px;color:var(--mu)}.gate{position:fixed;inset:0;background:var(--u);display:flex;align-items:center;justify-content:center;z-index:9}.gate .card{width:calc(100% - 24px);max-width:340px}.hide{display:none!important}.grid2{display:grid;grid-template-columns:1fr 1fr;gap:8px}.progress{height:6px;background:#0a1428;border:1px solid var(--bd);border-radius:999px;overflow:hidden;margin-top:6px}.progress>i{display:block;height:100%;background:var(--ac);width:0;transition:width .2s}</style>

<div class=gate id=gate>
<div class=card>
<h1>🔒 لوحة التحكم — FXER</h1>
<label>كلمة السر</label>
<input id=pw type=password autocomplete=off placeholder="••••••">
<div style="height:8px"></div>
<button id=pwb>دخول كأدمن</button>
<div class=mini id=pwe style="margin-top:8px;color:var(--rd);min-height:14px"></div>
</div>
</div>

<div class=wrap id=app style="display:none">
<div class=hd>
<h1>🕯️ مولد الشموع</h1>
<span class=badge><i class=dot id=fbdot></i><span id=fbst>...</span></span>
</div>

<div class=card>
<label>الزوج</label>
<select id=pair></select>
<div style="height:8px"></div>
<label>الفريم</label>
<div class=tfs id=tfs></div>
</div>

<div class=card>
<div class=grid2>
<div><label>عدد الشموع</label><input id=cnt type=number min=1 max=2000 value=50></div>
<div><label>الاتجاه (اختياري)</label>
<select id=bias><option value=0>عشوائي</option><option value=1>صاعد</option><option value=-1>هابط</option><option value=2>عرضي</option></select>
</div>
</div>
<div class=grid2 style="margin-top:8px">
<div><label>تقلّب %</label><input id=vol type=number step=0.01 min=0.01 max=10 value=0.35></div>
<div><label>سعر بداية (فارغ = آخر شمعة)</label><input id=st type=number step=any placeholder="auto"></div>
</div>
<div style="height:10px"></div>
<div class=row>
<button id=gen>⚡ توليد دفعة واحدة</button>
<button id=stp class=danger style="flex:0 0 90px" disabled>إيقاف</button>
</div>
<div class=progress><i id=pg></i></div>
<div class=mini style="margin-top:6px" id=info>—</div>
</div>

<div class=card>
<div class=hd><b style="font-size:12px">السجل</b><button class=sec id=clr style="width:auto;padding:4px 10px;font-size:11px">مسح</button></div>
<div class=log id=log></div>
</div>

<div class=mini style="text-align:center;opacity:.6;margin-top:6px">Firestore: market/{pair}/tf_{tf}/{t}</div>
</div>

<script type=module>
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc,collection,query,orderBy,limit,getDocs,writeBatch}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const fbCfg={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",databaseURL:"https://hhhxh-5ebe4-default-rtdb.firebaseio.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d"};
const app=initializeApp(fbCfg),auth=getAuth(app),db=getFirestore(app);

const TFS=[{k:'30s',ms:30000},{k:'1m',ms:60000},{k:'5m',ms:300000},{k:'1h',ms:3600000}];
const PK=p=>String(p).replace(/[\/\\\.\#\$\[\]]/g,'_');
const $=id=>document.getElementById(id);

/* أزواج الفوركس */
const FX='AUD/CAD,AUD/JPY,CAD/JPY,USD/CAD,CAD/CHF,EUR/GBP,EUR/USD,AUD/USD,GBP/USD,CHF/JPY,USD/JPY,AUD/NZD,GBP/JPY,EUR/CAD,EUR/CHF,EUR/JPY,NZD/JPY,USD/NOK,USD/PLN,GBP/NZD,AUD/CHF,EUR/AUD,EUR/NZD,GBP/CAD,GBP/CHF,NZD/USD,USD/CHF'.split(',');
const ST=['LMT','AMZN','AIG','AAPL','BIDU','KO','GS','IBM','INTC','JPM','META','MSFT','MS','NKE','NVDA','TSLA','DIS','YUM','C','MCD','NFLX','GOOGL'].map(x=>x+'.US');
const CM=['XAUUSD','XTIUSD','XBRUSD','XAGUSD','HK50','US100','DE40','JP225','US30','US500'];
const CR=['BTC','ETH','SOL','DOGE','LINK','LTC','XRP'].map(x=>x+'/USD');
const ALL=[...FX.map(k=>({k,g:'FX'})),...ST.map(k=>({k,g:'Stocks'})),...CM.map(k=>({k,g:'Commodities'})),...CR.map(k=>({k,g:'Crypto'}))];

/* خوارزمية السعر الأساسي (منسوخة بالضبط من مولد الأسعار الأصلي) */
function h(s){let e=0;for(let n=0;n<s.length;n++)e=31*e+s.charCodeAt(n)|0;return Math.abs(e)}
function basePrice(t){
  const e=h('p:'+t);
  if(/^BTC/.test(t))return +(25000+e%45000+e%100/100).toFixed(2);
  if(/^ETH/.test(t))return +(1200+e%4000+e%100/100).toFixed(2);
  if(/^SOL/.test(t))return +(20+e%240+e%100/100).toFixed(2);
  if(/^DOGE/.test(t))return +(0.05+e%3000/10000).toFixed(4);
  if(/^LINK/.test(t))return +(5+e%3000/100).toFixed(2);
  if(/^LTC/.test(t))return +(40+e%20000/100).toFixed(2);
  if(/^XRP/.test(t))return +(0.3+e%2500/1000).toFixed(4);
  if(/^XAU/.test(t))return +(1600+e%1200+e%100/100).toFixed(2);
  if(/^XAG/.test(t))return +(15+e%2000/100).toFixed(2);
  if(/^XTI|^XBR/.test(t))return +(40+e%7000/100).toFixed(2);
  if(/^(HK50|US100|DE40|JP225|US30|US500)$/.test(t))return +(3000+e%35000+e%100/100).toFixed(2);
  if(/\.US$/.test(t))return +(20+e%500+e%100/100).toFixed(2);
  if(/JPY/.test(t))return +(70+e%9000/100).toFixed(3);
  if(/NOK|PLN/.test(t))return +(3+e%9000/1000).toFixed(4);
  return +(0.6+e%170000/100000).toFixed(5);
}
function digits(t){
  if(/DOGE|XRP/.test(t))return 4;
  if(/^BTC|^ETH|^SOL|^LINK|^LTC/.test(t))return 2;
  if(/^XAU|^XAG|^XTI|^XBR/.test(t))return 2;
  if(/^(HK50|US100|DE40|JP225|US30|US500)$/.test(t))return 2;
  if(/\.US$/.test(t))return 2;
  if(/JPY/.test(t))return 3;
  if(/NOK|PLN/.test(t))return 4;
  return 5;
}
const rnd=(a,b)=>a+Math.random()*(b-a);
const rd=(x,d)=>+x.toFixed(d);

function makeCandle(prev,t,pair,bias,volPct){
  const d=digits(pair);
  const o=prev;
  const drift=bias===1?0.15:bias===-1?-0.15:bias===2?0:0;
  const body=(rnd(-1,1)+drift)*volPct/100*o;
  const c=Math.max(o+body,0.0000001);
  const rng=Math.abs(body)+Math.abs(rnd(0.1,1.2)*volPct/100*o);
  const hi=Math.max(o,c)+rnd(0,rng*0.6);
  const lo=Math.min(o,c)-rnd(0,rng*0.6);
  return{t,o:rd(o,d),h:rd(hi,d),l:rd(Math.max(lo,0.0000001),d),c:rd(c,d)};
}

async function lastCandle(pair,tfk){
  try{
    const col=collection(db,'market',PK(pair),'tf_'+tfk);
    const q=query(col,orderBy('t','desc'),limit(1));
    const snap=await getDocs(q);
    let out=null;snap.forEach(d=>out=d.data());return out;
  }catch(e){return null}
}

const gate=$('gate'),appEl=$('app');
$('pwb').onclick=()=>{
  if($('pw').value==='123456'){gate.classList.add('hide');appEl.style.display='block';init()}
  else{$('pwe').textContent='كلمة السر غير صحيحة'}
};
$('pw').addEventListener('keydown',e=>{if(e.key==='Enter')$('pwb').click()});

function log(m,cls){const el=$('log');const s=document.createElement('div');if(cls)s.className=cls;const t=new Date().toLocaleTimeString('en-GB');s.textContent='['+t+'] '+m;el.appendChild(s);el.scrollTop=el.scrollHeight}
$('clr').onclick=()=>$('log').innerHTML='';

const sel=$('pair');
const groups={};ALL.forEach(a=>{(groups[a.g]=groups[a.g]||[]).push(a.k)});
Object.entries(groups).forEach(([g,arr])=>{
  const og=document.createElement('optgroup');og.label=g;
  arr.forEach(k=>{const o=document.createElement('option');o.value=k;o.textContent=k;og.appendChild(o)});
  sel.appendChild(og);
});
sel.value='XAUUSD';

let curTf='1m';
const tfsEl=$('tfs');
TFS.forEach(tf=>{
  const p=document.createElement('span');p.className='pill'+(tf.k===curTf?' on':'');p.textContent=tf.k;
  p.onclick=()=>{curTf=tf.k;[...tfsEl.children].forEach(x=>x.classList.remove('on'));p.classList.add('on');refreshInfo()};
  tfsEl.appendChild(p);
});

async function refreshInfo(){
  const p=sel.value;const last=await lastCandle(p,curTf);
  const b=basePrice(p);
  $('info').innerHTML=last?`آخر شمعة: t=${new Date(last.t).toLocaleString('en-GB')} · c=${last.c}`:`لا يوجد شموع سابقة · سعر أساس: ${b}`;
}
sel.onchange=refreshInfo;

onAuthStateChanged(auth,u=>{
  const d=$('fbdot'),s=$('fbst');
  if(u){d.classList.add('on');s.textContent='متصل';log('Firebase ready · uid='+u.uid.slice(0,8),'ok')}
  else{d.classList.remove('on');s.textContent='...';signInAnonymously(auth).catch(e=>{s.textContent='فشل';log('auth: '+e.message,'er')})}
});

function init(){refreshInfo()}

let stopFlag=false;
$('stp').onclick=()=>{stopFlag=true;log('طلب إيقاف...','mu')};

$('gen').onclick=async()=>{
  const pair=sel.value,tf=TFS.find(x=>x.k===curTf),n=Math.min(2000,Math.max(1,+$('cnt').value||50));
  const bias=+$('bias').value,vol=Math.max(0.01,Math.min(10,+$('vol').value||0.35));
  const stIn=$('st').value.trim();
  const gen=$('gen'),stp=$('stp'),pg=$('pg');
  gen.disabled=true;stp.disabled=false;stopFlag=false;pg.style.width='0%';
  log(`🚀 توليد ${n} شمعة · ${pair} · ${tf.k} · bias=${bias} · vol=${vol}%`,'mu');

  try{
    let prev,startT;
    if(stIn!==''){prev=+stIn}
    else{
      const last=await lastCandle(pair,tf.k);
      if(last){prev=last.c;startT=last.t+tf.ms;log(`بدء من آخر شمعة c=${prev} t=${new Date(last.t).toISOString()}`,'mu')}
      else{prev=basePrice(pair);log(`بدء من سعر أساس ${prev}`,'mu')}
    }
    if(!startT){startT=Math.floor(Date.now()/tf.ms)*tf.ms - (n-1)*tf.ms}

    const key=PK(pair);
    let ok=0,er=0;const B=400;
    for(let i=0;i<n;i+=B){
      if(stopFlag)break;
      const batch=writeBatch(db);
      const end=Math.min(n,i+B);
      let lastC=null;
      for(let j=i;j<end;j++){
        const t=startT+j*tf.ms;
        const cd=makeCandle(prev,t,pair,bias,vol);
        prev=cd.c;lastC=cd;
        batch.set(doc(db,'market',key,'tf_'+tf.k,String(t)),cd);
      }
      try{
        await batch.commit();
        if(lastC)await setDoc(doc(db,'market',key,'live','tf_'+tf.k),lastC);
        ok+=(end-i);
        pg.style.width=(ok*100/n)+'%';
        log(`✔ دفعة ${i+1}..${end} تمت`,'ok');
      }catch(e){er+=(end-i);log(`✖ دفعة ${i+1}..${end}: ${e.message}`,'er')}
    }
    log(`🎯 انتهى — نجاح: ${ok} · فشل: ${er}${stopFlag?' (توقف بطلب)':''}`,'ok');
    refreshInfo();
  }catch(e){log('خطأ عام: '+e.message,'er')}
  finally{gen.disabled=false;stp.disabled=true}
};
</script>
</html>
