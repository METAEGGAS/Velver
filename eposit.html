<script>
(function(){ const PASS='123456',LS='__fxAdmin'; function isA(){try{return sessionStorage.getItem(LS)==='1'}catch(e){return false}} function setA(v){try{sessionStorage.setItem(LS,v?'1':'0')}catch(e){}} const $=id=>document.getElementById(id); const css=` #axG{position:fixed;bottom:8px;left:8px;z-index:9998;width:34px;height:34px;border-radius:50%;background:#141c30;border:1px solid #2a3856;color:#eef5ff;font:600 16px/1 system-ui;display:flex;align-items:center;justify-content:center;cursor:pointer;opacity:.55;box-shadow:0 2px 8px rgba(0,0,0,.4)} #axG:hover{opacity:1} #axOv{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:9999;display:none;align-items:center;justify-content:center;padding:12px} #axOv.on{display:flex} #axP{background:#0f1a34;border:1px solid #2a3856;border-radius:12px;width:100%;max-width:340px;color:#eef5ff;font:500 12px/1.3 system-ui;direction:rtl} .axH{display:flex;justify-content:space-between;align-items:center;padding:10px 12px;border-bottom:1px solid #223252;font-weight:700;font-size:13px} .axX{cursor:pointer;font-size:18px;line-height:1;color:#8ea0c1;padding:0 4px} .axB{padding:10px 12px;display:flex;flex-direction:column;gap:8px;max-height:70vh;overflow:auto} .axR{display:flex;gap:6px;align-items:center} .axR label{flex:0 0 60px;color:#8ea0c1;font-size:11px} .axR input,.axR select{flex:1;background:#0a1329;border:1px solid #2a3856;color:#eef5ff;border-radius:6px;padding:6px 8px;font:500 12px system-ui;min-width:0} .axR .g{display:flex;gap:4px;flex:1} .axR .g input{flex:1} .axBtn{background:#22c55e;border:0;color:#0a1329;font-weight:700;padding:9px;border-radius:8px;cursor:pointer;font-size:13px} .axBtn:disabled{opacity:.5;cursor:not-allowed} .axBtn.s{background:#3b82f6;color:#fff} .axBtn.d{background:#ef4444;color:#fff} .axM{font-size:11px;min-height:14px;color:#8ea0c1;text-align:center} .axM.ok{color:#22c55e}.axM.er{color:#ef4444} .axSeg{display:flex;background:#0a1329;border:1px solid #2a3856;border-radius:6px;padding:2px;flex:1} .axSeg button{flex:1;background:transparent;border:0;color:#8ea0c1;padding:5px;border-radius:4px;cursor:pointer;font:600 11px system-ui} .axSeg button.on{background:#3b82f6;color:#fff} #axLogin input{background:#0a1329;border:1px solid #2a3856;color:#eef5ff;border-radius:6px;padding:8px;font:500 13px system-ui;width:100%;text-align:center;letter-spacing:4px} `; const st=document.createElement('style');st.textContent=css;document.head.appendChild(st); const gate=document.createElement('div');gate.id='axG';gate.textContent='⚙';gate.title='لوحة الأدمن';document.body.appendChild(gate); const ov=document.createElement('div');ov.id='axOv';ov.innerHTML=` <div id=axP> <div class=axH><span id=axT>دخول الأدمن</span><span class=axX id=axCls>✕</span></div> <div class=axB id=axBd></div> </div>`;document.body.appendChild(ov); const bd=$('axBd'),T=$('axT'); $('axCls').onclick=()=>ov.classList.remove('on'); function loginView(){ T.textContent='دخول الأدمن'; bd.innerHTML=`<div id=axLogin><div class=axR style="justify-content:center"><label style="flex:none">كلمة السر</label></div><input id=axPw type=password inputmode=numeric placeholder="●●●●●●" autocomplete=off><div class=axM id=axMsg></div><button class=axBtn id=axIn>دخول</button></div>`; const pw=$('axPw'),msg=$('axMsg');pw.focus(); const go=()=>{ if(pw.value===PASS){setA(true);msg.className='axM ok';msg.textContent='✓ تم منح الصلاحيات';setTimeout(panelView,400)} else{msg.className='axM er';msg.textContent='كلمة سر خاطئة'} }; $('axIn').onclick=go;pw.addEventListener('keydown',e=>{if(e.key==='Enter')go()}); } function tfDefs(){try{return (window.__adminTFS)||[{k:'30s',ms:30000},{k:'1m',ms:60000},{k:'5m',ms:300000},{k:'1h',ms:3600000}]}catch(e){return[]}} function curPair(){try{return window.__fxerFeed.key()}catch(e){return''}} function pairKey(p){return String(p||'').replace(/[\/\\\.#\$\[\]]/g,'_')} function lastClose(tfk){ try{const pk=pairKey(curPair());const arr=(window.__fbCandles&&window.__fbCandles[pk]&&window.__fbCandles[pk][tfk])||[];if(arr.length)return arr[arr.length-1].c}catch(e){} try{return window.__fxerFeed.price(curPair())}catch(e){return 1} } function panelView(){ T.textContent='مولد الشموع — أدمن'; bd.innerHTML=` <div class=axR><label>الزوج</label><input id=axPair value="${curPair()}" readonly></div> <div class=axR><label>الفريم</label><select id=axTf></select></div> <div class=axR><label>النوع</label><div class=axSeg id=axSg><button data-v=up class=on>صاعدة</button><button data-v=dn>هابطة</button><button data-v=doji>دوجي</button><button data-v=man>يدوي</button></div></div> <div class=axR><label>الافتتاح</label><input id=axO type=number step=any></div> <div class=axR><label>الإغلاق</label><input id=axC type=number step=any></div> <div class=axR><label>أعلى</label><input id=axH type=number step=any></div> <div class=axR><label>أدنى</label><input id=axL type=number step=any></div> <div class=axR><label>الحجم</label><input id=axSz type=number step=any value=0.5 title="نسبة تحرك السعر ٪"><span style="color:#8ea0c1;font-size:11px">٪</span></div> <div class=axR><label>عدد</label><input id=axN type=number min=1 max=100 value=1></div> <div class=axR><label>الوقت</label><div class=axSeg id=axTm><button data-v=now class=on>الحالي</button><button data-v=prev>سابقة</button></div></div> <div class=axR><button class=axBtn id=axGo>توليد الشمعة</button></div> <div class=axR><button class=axBtn s id=axInj>حقن سعر مباشر</button><button class=axBtn d id=axOut>خروج</button></div> <div class=axM id=axMsg></div>`; const tfSel=$('axTf');tfDefs().forEach(t=>{const o=document.createElement('option');o.value=t.k;o.textContent=t.k;if(t.k==='1m')o.selected=true;tfSel.appendChild(o)}); let mode='up',tm='now'; const sg=$('axSg'),tmg=$('axTm'); function fill(){ const base=lastClose(tfSel.value)||1;const szP=parseFloat($('axSz').value)||0.5;const d=base*szP/100; const O=$('axO'),C=$('axC'),H=$('axH'),L=$('axL'); if(mode==='man')return; let o,c,h,l; if(mode==='up'){o=base;c=base+d;h=c+d*0.3;l=o-d*0.2} else if(mode==='dn'){o=base;c=base-d;h=o+d*0.2;l=c-d*0.3} else{o=base;c=base+d*0.02;h=base+d*0.5;l=base-d*0.5} const p=priceDp(base); O.value=(+o).toFixed(p);C.value=(+c).toFixed(p);H.value=(+h).toFixed(p);L.value=(+l).toFixed(p); } function priceDp(v){v=Math.abs(v||1);if(v>=100)return 3;if(v>=10)return 4;if(v>=1)return 5;return 6} sg.querySelectorAll('button').forEach(b=>b.onclick=()=>{sg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');mode=b.dataset.v;fill()}); tmg.querySelectorAll('button').forEach(b=>b.onclick=()=>{tmg.querySelectorAll('button').forEach(x=>x.classList.remove('on'));b.classList.add('on');tm=b.dataset.v}); tfSel.onchange=fill;$('axSz').oninput=fill;fill(); $('axOut').onclick=()=>{setA(false);ov.classList.remove('on');loginView()}; $('axInj').onclick=async()=>{ const msg=$('axMsg');const c=parseFloat($('axC').value); if(!isFinite(c)){msg.className='axM er';msg.textContent='أدخل سعر الإغلاق';return} try{ const pk=curPair(),f=window.__fxerFeed; if(f&&f._admin){f._admin.setForce(c)}else if(f){ if(!f._al){f._al=[];const orig=f.onTick.bind(f);f.onTick=cb=>{f._al.push(cb);orig(cb)}} f._al.forEach(cb=>{try{cb({t:Date.now(),p:c},pk)}catch(e){}}); } window.__fxerRemotePrice=c; msg.className='axM ok';msg.textContent='✓ تم حقن السعر '+c; }catch(e){msg.className='axM er';msg.textContent='خطأ: '+e.message} }; $('axGo').onclick=async()=>{ const msg=$('axMsg');msg.className='axM';msg.textContent='...جاري'; try{ const tfk=tfSel.value,tf=tfDefs().find(x=>x.k===tfk); const o=parseFloat($('axO').value),c=parseFloat($('axC').value),h=parseFloat($('axH').value),l=parseFloat($('axL').value); const n=Math.max(1,Math.min(100,parseInt($('axN').value)||1)); if(![o,c,h,l].every(isFinite)){msg.className='axM er';msg.textContent='قيم غير صحيحة';return} const H=Math.max(o,c,h,l),L=Math.min(o,c,h,l); const pk=pairKey(curPair()); const now=Date.now(); const curBk=Math.floor(now/tf.ms)*tf.ms; for(let i=0;i<n;i++){ let t;if(tm==='now')t=curBk-i*tf.ms;else t=curBk-(i+1)*tf.ms; const cd={t,o:+o,h:+H,l:+L,c:+c}; if(window.__adminWriteCandle){await window.__adminWriteCandle(pk,tfk,cd)} try{ window.__fbCandles=window.__fbCandles||{};window.__fbCandles[pk]=window.__fbCandles[pk]||{}; const arr=window.__fbCandles[pk][tfk]=window.__fbCandles[pk][tfk]||[]; const ix=arr.findIndex(x=>x.t===t);if(ix>=0)arr[ix]=cd;else arr.push(cd);arr.sort((a,b)=>a.t-b.t); }catch(e){} try{const dm=(window.FBLayer||{}).dataMgr;if(dm&&dm.engines&&dm.engines[tfk]){const e=dm.engines[tfk];const ix=e.closed.findIndex(x=>x.t===t);if(ix>=0)e.closed[ix]=cd;else e.closed.push(cd);e.closed.sort((a,b)=>a.t-b.t)}}catch(e){} } try{const f=window.__fxerFeed;if(f&&f._al){f._al.forEach(cb=>{try{cb({t:Date.now(),p:+c},pk)}catch(e){}})}window.__fxerRemotePrice=+c}catch(e){} try{window.__reloadChart&&window.__reloadChart()}catch(e){} msg.className='axM ok';msg.textContent='✓ تم توليد '+n+' شمعة'; $('axO').value='';fill(); }catch(e){msg.className='axM er';msg.textContent='خطأ: '+(e.message||e)} }; } gate.onclick=()=>{ov.classList.add('on');if(isA())panelView();else loginView()}; try{const b=$('fbRoleBadge');if(b){let cn=0,tm;b.style.pointerEvents='auto';b.addEventListener('click',()=>{cn++;clearTimeout(tm);tm=setTimeout(()=>cn=0,600);if(cn>=3){cn=0;ov.classList.add('on');if(isA())panelView();else loginView()}})}}catch(e){} window.__adminWriteCandle=async function(pk,tfk,cd){ try{return await setDoc(doc(db,'market',pk,'tf_'+tfk,String(cd.t)),cd)}catch(e){throw e} }; window.__adminTFS=TFS; try{const f=window.__fxerFeed;if(f&&!f._al){f._al=[];const orig=f.onTick.bind(f);f.onTick=cb=>{f._al.push(cb);orig(cb)}}}catch(e){} })();
</script>
