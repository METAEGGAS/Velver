const s=document.getElementById("CH"),c=document.getElementById("cv"),U=c.getContext("2d"),D=document,

/* --- محرك الزوم (Time-anchored) ---

function selCol(col,v){let h=IH,t=Math.round((col.scrollTop+(col.clientHeight-h)/2)/h);t=F0(t,0,col.children.length-3);[...col.children].forEach((x,i)=>x.classList.toggle("s",i===t+1));v.k=="d"?TV.d=COL.d[t]:v.k=="h"?TV.h=COL.h[t]:v.k=="m"?TV.m=COL.m[t]:TV.s=COL.s[t];sync()}

/* ===== توليد الشموع ===== */
function gauss(){let a=0,b=0;while(!a)a=Math.random();while(!b)b=Math.random();return Math.sqrt(-2*Math.log(a))*Math.cos(2*Math.PI*b)}
function genC(prev,v,tr){let o=prev,dr=tr*v*.15,mag=v*(.7+.6*Math.random()),cl=o*(1+dr+gauss()*mag*.5),hi=Math.max(o,cl),lo=Math.min(o,cl),wick=(hi-lo)*(.3+.7*Math.random())+o*v*.1;return{o,h:hi+Math.random()*wick*.5,l:lo-Math.random()*wick*.5,c:cl}}
function genPath(cd,openV,closeV,hi,lo){let N=180,p=[],iH=Math.max(2,Math.min(N-3,N*(.18+.18*Math.random())|0)),iL=Math.max(3,Math.min(N-2,N*(.42+.24*Math.random())|0)),amp=openV*vol;for(let x=0;x<N;x++){let g=x/(N-1),ease=g<.5?2*g*g:1-Math.pow(-2*g+2,2)/2,sn=Math.sin(g*Math.PI*(2.3+1.2*Math.random())+2*Math.random())*amp*(.22*(1-g)+.02),nz=gauss()*amp*(.07*(1-g)+.006);p.push(F0(openV+(closeV-openV)*ease+sn+nz,.9998*lo,1.0002*hi))}p[0]=openV;p[N-1]=closeV;p[iH]=hi;p[iL]=lo;for(let k=0;k<3;k++)for(let x=1;x<N-1;x++)x!=iH&&x!=iL&&(p[x]=(p[x-1]+2*p[x]+p[x+1])/4);p[iH]=hi;p[iL]=lo;return p}
function seed(){let n0=Math.floor(Date.now()/X)*X,lc=lastP;for(let k=359;k>=1;k--){Math.random()<.05?trend=2*(Math.random()-.5):trend*=.98;let cc=genC(lc,vol,trend);Y.push({o:cc.o,c:cc.c,h:cc.h,l:cc.l,t:n0-k*X});lc=cc.c}Y.push({o:lc,c:lc,h:lc,l:lc,t:n0});baseT=n0;liveVal=lc;lastP=lc}
function prepend(n=240){let f=Y[0],pc=f.o,t=f.t,A=[];for(let k=0;k<n;k++){Math.random()<.05?trend=2*(Math.random()-.5):trend*=.98;let cc=genC(pc,vol,trend);A.push({o:cc.o,c:cc.c,h:cc.h,l:cc.l,t:t-X});pc=cc.o;t-=X}Y=A.reverse().concat(Y)}

/* ========================================================
   ========== محرك الزوم الاحترافي (Time-anchored) =========
   ======================================================== */

/* حدود barSpacing المسموحة (لتقييد المستخدم لا لتغيير حجم الشموع). */
function clampBS(v){return F0(v,MIN_BS,MAX_BS)}

/* عرض جسم الشمعة كنسبة من barSpacing، مع حد أدنى/أعلى. */
function barWidth(bs){return F0(Math.round(bs*.72),MINBW,MAXBW)}

/* المحور الأيمن للرسم (قبل شريط السعر). */
function axisRight(){return PAD+(W-PAD-6)/2 + (W-PAD-6)/2}  /* = W - 6 */
function plotRight(){return W-6}
function plotWidth(){return W-6-PAD}

/* أقصى إزاحة يسارية مسموحة (لا نسمح بالخروج من الشموع). */
function maxScroll(){let bs=barSpacingR||barSpacing;let visible=plotWidth()/bs;return Math.max(0,Y.length-1-2)+Math.max(0,visible-8)}

/* تحويل: index شمعة → x على الشاشة (باستخدام القيم المعروضة). */
function idxToX(i){let last=Y.length-1;return plotRight() - (last + scrollOffsetR - i)*barSpacingR}

/* تحويل عكسي: x شاشة → index شمعة (قد يكون خارج المصفوفة). */
function xToIdx(x){let last=Y.length-1;return last + scrollOffsetR - (plotRight()-x)/barSpacingR}

/* تحويل idx → time (خطي، حتى للـ idx خارج المصفوفة). */
function idxToTime(i){let last=Y.length-1;return Y[last].t + (i-last)*X}
function timeToIdx(t){let last=Y.length-1;return last + (t-Y[last].t)/X}

/* ⭐ قلب المحرك:
   zoomAt(pivotX, newBS): اضبط barSpacing إلى newBS بحيث تبقى النقطة تحت pivotX
   على نفس x بالضبط. نستخدم time-anchor لضمان ثبات مطلق حتى مع إضافة شموع. */
function zoomAt(pivotX,newBS){
  newBS=clampBS(newBS);
  /* التقط الوقت تحت المؤشر بالقيم الحالية المعروضة */
  const anchorIdx = xToIdx(pivotX);
  const anchorTime = idxToTime(anchorIdx);
  /* عدّل الهدف */
  barSpacing = newBS;
  /* أعد حساب scrollOffset المطلوب بحيث screenX(anchorTime)==pivotX عند barSpacing الجديد.
     نجعل barSpacingR = newBS مباشرةً (فرض القيمة المعروضة أيضًا) لضمان ثبات فوري بلا انزياح. */
  barSpacingR = newBS;
  const last = Y.length-1;
  const idxAtNewBS = timeToIdx(anchorTime);
  /* من idxToX: pivotX = plotRight - (last + newOff - idxAtNewBS)*newBS
     => newOff = idxAtNewBS - last + (plotRight - pivotX)/newBS  */
  const newOff = idxAtNewBS - last + (plotRight()-pivotX)/newBS;
  scrollOffset = F0(newOff,-8, maxScroll());
  scrollOffsetR = scrollOffset;
}

/* لبدء pinch: خزّن نقطة الارتكاز كوقت، ونحدثها بلا تراكم أخطاء. */
function pinchBegin(t){
  let a=t.touches[0],b=t.touches[1],r=s.getBoundingClientRect();
  pinchStartDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
  pinchStartBS=barSpacing;
  pinchAnchorPx=F0((a.clientX+b.clientX)/2-r.left,PAD,W-6);
  pinchAnchorTime=idxToTime(xToIdx(pinchAnchorPx));
  pinchActive=1;panActive=0;chOn=0;
}
function pinchMove(t){
  let a=t.touches[0],b=t.touches[1];
  let d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);
  let ratio=d/pinchStartDist;
  let newBS=clampBS(pinchStartBS*ratio);
  /* نطبق zoom عند نفس نقطة الشاشة المخزنة مع الوقت الأصلي */
  barSpacing=newBS;barSpacingR=newBS;
  const last=Y.length-1;
  const idxAtNewBS = timeToIdx(pinchAnchorTime);
  scrollOffset = idxAtNewBS - last + (plotRight()-pinchAnchorPx)/newBS;
  scrollOffset = F0(scrollOffset,-8,maxScroll());
  scrollOffsetR=scrollOffset;
}

/* ===== Pan (بالوقت أيضًا لضمان الاتساق مع الزوم) ===== */
function evX(e){let r=s.getBoundingClientRect();return(e.touches?e.touches[0].clientX:e.clientX)-r.left}
function evY(e){let r=s.getBoundingClientRect();return(e.touches?e.touches[0].clientY:e.clientY)-r.top}
function panStart(e){if(pinchActive)return;panActive=1;panStartX=evX(e);panStartOff=scrollOffset;panLastX=panStartX;panLastT=performance.now();panVel=0;chOn=0}
function panMove(e){
  if(pinchActive)return;
  if(panActive){
    let x=evX(e),dx=x-panStartX;
    /* dx بالبكسل → تحويل إلى عدد شموع بحسب barSpacingR */
    scrollOffset=F0(panStartOff + dx/barSpacingR, -8, maxScroll());
    let now=performance.now(),dt=now-panLastT;
    if(dt>0){panVel=(x-panLastX)/dt/barSpacingR*16;panLastX=x;panLastT=now}
  }else{chOn=1;chX=evX(e);chY=evY(e)}
}
function panEnd(){
  if(!panActive)return;
  panActive=0;
  /* inertia خفيف */
  scrollOffset=F0(scrollOffset + panVel*6, -8, maxScroll());
  panVel*=.5;
}

/* ===== Resize ===== */
function resize(){let r=s.getBoundingClientRect();W=r.width;H=r.height;DPR=devicePixelRatio||1;c.width=W*DPR;c.height=H*DPR;c.style.width=W+"px";c.style.height=H+"px";U.setTransform(DPR,0,0,DPR,0,0)}

/* ===== نطاق السعر مع smoothing ===== */
function smoothPrice(hi,lo,force){let mid=(hi+lo)/2,sp=Math.max(5e-6,hi-lo);if(force||priceHiR==null){priceHiR=hi;priceLoR=lo;return}let midR=(priceHiR+priceLoR)/2,spR=priceHiR-priceLoR;spR+=(sp-spR)*.12;midR+=(mid-midR)*.12;priceHiR=midR+spR/2;priceLoR=midR-spR/2}

/* ===== رسم مساعد ===== */
function roundRect(x,y,w,h,r,fill){U.fillStyle=fill;U.beginPath();U.moveTo(x+r,y);U.arcTo(x+w,y,x+w,y+h,r);U.arcTo(x+w,y+h,x,y+h,r);U.arcTo(x,y+h,x,y,r);U.arcTo(x,y,x+w,y,r);U.closePath();U.fill()}

/* ===== الحلقة الرئيسية ===== */
let forcePrice=1;
function frame(){
  resize();
  tickLive();

  /* ⭐ Smooth interpolation للـ barSpacing و scrollOffset */
  barSpacingR += (barSpacing - barSpacingR) * .22;
  if(Math.abs(barSpacing - barSpacingR) < .003) barSpacingR = barSpacing;
  scrollOffsetR += (scrollOffset - scrollOffsetR) * .28;
  if(Math.abs(scrollOffset - scrollOffsetR) < .01) scrollOffsetR = scrollOffset;

  /* شمعة جديدة كل X */
  if(Date.now()-baseT>=X)newCandle();

  /* prepend عند الاقتراب من اليسار */
  for(let g=0;g<4;g++){
    let leftIdx = Y.length-1 + scrollOffsetR - (plotRight()-PAD)/barSpacingR;
    if(leftIdx<40)prepend(240);else break;
  }

  const pw=plotWidth(),ph=H-8-BM,axR=plotRight();
  const last=Y.length-1;

  /* نطاق العرض بالمؤشرات */
  const iL = Math.max(0, Math.floor(last + scrollOffsetR - pw/barSpacingR) - 2);
  const iR = Math.min(last, Math.ceil(last + scrollOffsetR) + 2);

  /* حساب نطاق السعر من الشموع المرئية */
  let hi=-Infinity,lo=Infinity;
  for(let i=iL;i<=iR;i++){let k=Y[i];if(k.h>hi)hi=k.h;if(k.l<lo)lo=k.l}
  if(!isFinite(hi)){hi=lastP*1.001;lo=lastP*.999}
  const pad=.05*Math.max(5e-4,hi-lo);
  smoothPrice(hi+pad,lo-pad,forcePrice);forcePrice=0;
  const rng=priceHiR-priceLoR;
  const p2y=p=>8+(priceHiR-p)*ph/rng;

  /* خلفية */
  U.clearRect(0,0,W,H);U.fillStyle="#0d1730";U.fillRect(0,0,W,H);

  /* خطوط الشبكة */
  U.save();U.beginPath();U.rect(PAD,8,pw,ph);U.clip();
  U.strokeStyle="#1a2433";U.lineWidth=1;

  /* شبكة زمنية: كل D شمعة */
  let stepD=5,minGap=30;while((iR-iL+12)/stepD>minGap)stepD*=2;
  const lQ = last + scrollOffsetR - pw/barSpacingR;
  const rQ = last + scrollOffsetR;
  for(let t=Math.ceil(lQ/stepD)*stepD;t<=rQ+stepD;t+=stepD){
    const x=idxToX(t);
    if(x<PAD-barSpacingR||x>W+barSpacingR)continue;
    U.beginPath();U.moveTo(x,8);U.lineTo(x,H-BM);U.stroke();
  }
  /* شبكة سعرية */
  const stepP=(t=>{let e=10**Math.floor(Math.log10(t)),a=t/e;return(a<=1?1:a<=2?2:a<=5?5:10)*e})(rng/Math.max(2,Math.floor(ph/60)));
  for(let p=Math.floor(priceLoR/stepP)*stepP;p<=priceHiR+stepP;p+=stepP){
    const y=p2y(p);U.beginPath();U.moveTo(PAD,y);U.lineTo(W,y);U.stroke();
  }

  /* خطوط زمن الصفقة */
  const nowIdx=last, expIdx=nowIdx + 3; /* توضيحي */
  U.setLineDash([5,5]);U.strokeStyle="rgba(255,255,255,.45)";
  const xNow=idxToX(nowIdx)+barSpacingR/2, xExp=idxToX(expIdx)+barSpacingR/2;
  if(xNow>=PAD&&xNow<=W){U.beginPath();U.moveTo(xNow,8);U.lineTo(xNow,H-BM);U.stroke()}
  if(xExp>=PAD&&xExp<=W){U.beginPath();U.moveTo(xExp,8);U.lineTo(xExp,H-BM);U.stroke()}
  U.strokeStyle="rgba(255,255,255,.8)";
  const yPr=p2y(Y[last].c);
  U.beginPath();U.moveTo(PAD,yPr);U.lineTo(W,yPr);U.stroke();
  U.setLineDash([]);

  /* ⭐ رسم الشموع — الحجم والموضع محسوبان من barSpacingR فقط */
  const bw = barWidth(barSpacingR);
  for(let i=iL;i<=iR;i++){
    const k=Y[i],x=idxToX(i);
    if(x<PAD-bw||x>W+bw)continue;
    const yO=p2y(k.o),yC=p2y(k.c),yH=p2y(k.h),yL=p2y(k.l),up=k.c>=k.o;
    U.strokeStyle=U.fillStyle=up?"#26a69a":"#ef5350";U.lineWidth=1;
    U.beginPath();U.moveTo(.5+(0|x),yH);U.lineTo(.5+(0|x),yL);U.stroke();
    U.fillRect(Math.round(x-bw/2),Math.min(yO,yC),bw,Math.max(1,Math.abs(yC-yO)));
  }

  /* Crosshair */
  if(chOn&&chX>=PAD&&chX<=W&&chY>=8&&chY<=H-BM){
    U.setLineDash([4,4]);U.strokeStyle="rgba(195,188,219,.55)";
    U.beginPath();U.moveTo(chX,8);U.lineTo(chX,H-BM);U.stroke();
    U.beginPath();U.moveTo(PAD,chY);U.lineTo(W,chY);U.stroke();
    U.setLineDash([]);
  }
  U.restore();

  /* تسميات المحور الزمني */
  U.fillStyle="#fff";U.font="10px Arial";U.textAlign="center";
  let labelPx=42,stepL=stepD;while(stepL*barSpacingR<labelPx)stepL+=stepD;
  for(let t=Math.ceil(lQ/stepL)*stepL;t<=rQ;t+=stepL){
    const x=idxToX(t);if(x<PAD||x>W)continue;
    U.fillText(ne(Y[last].t+(t-last)*X),x,H-7);
  }

  /* تسميات السعر */
  U.textAlign="right";
  for(let p=Math.floor(priceLoR/stepP)*stepP;p<=priceHiR+stepP;p+=stepP){
    const y=p2y(p);if(y<8||y>H-BM)continue;
    roundRect(W-RM,y-8,50,16,4,"rgba(14,21,33,.85)");
    U.fillStyle="#a5b7d6";U.fillText(F(p),W-8,y+4);
  }

  /* شارة السعر الحالي + نقطة نبض */
  const lk=Y[last],py=p2y(lk.c),px=idxToX(last),pulse=.5+.5*Math.sin(performance.now()/120);
  const ri=3.25+.25*pulse,ro=4.8+.8*pulse;
  roundRect(W-RM,py-11,50,22,10,"#1b2b4b");
  U.strokeStyle="#3e5f9b";U.lineWidth=1;U.strokeRect(W-RM+.5,py-10.5,49,21);
  U.fillStyle="#fff";U.font="bold 11px Arial";U.textAlign="center";
  U.fillText(F(lk.c),W-RM+25,py+4);
  U.fillStyle="#3c6cff";U.globalAlpha=.22+.2*pulse;
  U.beginPath();U.arc(px,py,ro+1.5*pulse,0,7);U.fill();U.globalAlpha=1;
  U.beginPath();U.arc(px,py,ri,0,7);U.fill();
  U.strokeStyle="#d7ecff";U.lineWidth=1.6;U.globalAlpha=.85+.15*pulse;
  U.beginPath();U.arc(px,py,ro,0,7);U.stroke();U.globalAlpha=1;

  requestAnimationFrame(frame);
}

/* ===== ربط الأحداث ===== */
addEventListener("resize",resize);
seed();resize();buildTime();sync();
requestAnimationFrame(frame);

/* Mouse */
s.addEventListener("mousedown",panStart);
s.addEventListener("mousemove",panMove);
addEventListener("mouseup",panEnd);
s.addEventListener("mouseleave",()=>chOn=0);

/* Wheel = zoom */
s.addEventListener("wheel",e=>{
  e.preventDefault();
  const px=evX(e);
  const factor=e.deltaY>0 ? 1/1.12 : 1.12;
  zoomAt(px, barSpacing*factor);
},{passive:!1});

/* Touch */
let lastTap=0;
s.addEventListener("touchstart",e=>{
  const now=Date.now();
  if(e.touches.length===2){pinchBegin(e);lastTap=0;return}
  if(e.touches.length===1){
    if(now-lastTap<320){/* double-tap → reset */
      barSpacing=8;barSpacingR=8;scrollOffset=0;scrollOffsetR=0;panVel=0;chOn=0;lastTap=0;return;
    }
    lastTap=now;panStart(e);
  }
},{passive:!0});
s.addEventListener("touchmove",e=>{
  if(e.touches.length===2){if(!pinchActive)pinchBegin(e);else pinchMove(e);return}
  if(!pinchActive)panMove(e);
},{passive:!0});
s.addEventListener("touchend",e=>{
  if(pinchActive&&e.touches.length<2){pinchActive=0;panActive=0;if(e.touches.length===1)panStart(e);else chOn=0}
  if(!e.touches.length)panEnd();
},{passive:!0});

/* Nav & popups */
GA("#nv .ni").forEach(n=>n.addEventListener("click",()=>{GA("#nv .ni").forEach(x=>x.classList.remove("a"));n.classList.add("a")}));
G("#aOpen").onclick=openA;G("#tOpen").onclick=()=>openT();
G("#aok").onclick=()=>closeA(1);G("#acl").onclick=()=>{LOCK=0;fillAmt();sync()};G("#tok").onclick=closeT;
G("#ap").onclick=e=>e.target.id=="ap"&&closeA();G("#tp").onclick=e=>e.target.id=="tp"&&closeT();
G("#amM").onclick=e=>{e.stopPropagation();A=Math.max(0,A-1);sync()};
G("#amP").onclick=e=>{e.stopPropagation();A++;sync()};
G("#tmM").onclick=()=>{T=Math.max(1,T-1);TV={d:T/86400|0,h:T%86400/3600|0,m:T%3600/60|0,s:T%60};sync()};
G("#tmP").onclick=()=>{T++;TV={d:T/86400|0,h:T%86400/3600|0,m:T%3600/60|0,s:T%60};sync()};
})();</script></html>
