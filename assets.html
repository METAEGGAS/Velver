ortfolio-real.png><span>المحفظة</span></div><div class=ni><img src=https://www.babaoption.com/mwebterminal/mobile-assets/images/icon-history-real.png><span>السجل</span></div><div class=ni><img src=https://www.babaoption.com/mwebterminal/mobile-assets/images/icon-more-real.png><span>المزيد</span></div></div></div><div class="pop amt" id=ap><div class=sh><div class=hd><div class=ttl>المبلغ</div><div class=ipt><em>$</em><span id=apv>2,000</span></div></div><div class=line></div><div class=ag><div class=ql id=ql></div><div class=kg id=kg></div></div><div class=ab><button class=clb id=acl>مسح</button><button class=okb id=aok>تم</button></div></div></div><div class="pop time" id=tp><div class=sh><div class=tps id=tps></div><div class=wh><div class=sel></div><div class=wrs><div class="col day" id=cd></div><div class=col id=chh></div><div class=col id=cmm></div><div class=col id=css></div></div></div><button class=done id=tok>تم</button></div></div><script>(()=>{
/* ============================================================
   FXER — Professional Timeframe Engine (Quotex/Pocket-Option style)
   Architecture:
   [TickEngine] → produces ticks {t,p} (single source of truth)
        ↓
   [CandleStore] → routes every tick to ALL timeframes
        ↓ per-TF Map<bucketStart, {o,h,l,c,t,v}>
   [Renderer] → reads active TF only, pure view layer
   ============================================================ */
const D=document,G=(q,p=D)=>p.querySelector(q),GA=(q,p=D)=>[...p.querySelectorAll(q)];
const F0=(v,a,b)=>v<a?a:v>b?b:v,F=(t,d=4)=>t.toFixed(d),Q0=t=>("0"+t).slice(-2);
const ne=t=>{const e=new Date(t);return Q0(e.getHours())+":"+Q0(e.getMinutes())};
const nes=t=>{const e=new Date(t);return Q0(e.getHours())+":"+Q0(e.getMinutes())+":"+Q0(e.getSeconds())};
const fmt=n=>"$ "+(+n).toLocaleString("en-US"),R2=n=>"$ "+(Math.round(n*93)/100).toFixed(2);

/* ---------- Timeframes registry (add new one in ONE line) ---------- */
const TFS=[
 {k:"1s",  ms:1e3,      lb:"1 s"},
 {k:"5s",  ms:5e3,      lb:"5 s"},
 {k:"15s", ms:15e3,     lb:"15 s"},
 {k:"30s", ms:30e3,     lb:"30 s"},
 {k:"1m",  ms:60e3,     lb:"1 m"},
 {k:"5m",  ms:300e3,    lb:"5 m"},
 {k:"15m", ms:900e3,    lb:"15 m"},
 {k:"30m", ms:1800e3,   lb:"30 m"},
 {k:"1h",  ms:3600e3,   lb:"1 h"}
];
const TFMAP=Object.fromEntries(TFS.map(t=>[t.k,t]));

/* ============================================================
   TickEngine — one authoritative price stream (~4 ticks/sec)
   ============================================================ */
const TickEngine=(()=>{
 const TICK_MS=250, HIST_MS=6*3600e3; // 6h of ticks kept in RAM
 let price=113.646, vol=8e-5, trend=0, ticks=[], subs=[], timer=0;
 const gauss=()=>{let a=0,b=0;while(!a)a=Math.random();while(!b)b=Math.random();return Math.sqrt(-2*Math.log(a))*Math.cos(2*Math.PI*b)};
 const step=(prev,dt)=>{
  if(Math.random()<0.02)trend=2*(Math.random()-.5);else trend*=.985;
  const drift=trend*vol*.15, shock=gauss()*vol*Math.sqrt(dt/TICK_MS);
  return prev*(1+drift+shock);
 };
 // seed historical ticks so all TFs have real data at boot
 const seed=()=>{
  const now=Date.now(), start=now-HIST_MS;
  let p=price, t=start;
  while(t<=now){p=step(p,TICK_MS); ticks.push({t,p}); t+=TICK_MS;}
  price=p;
 };
 const emit=tk=>{ticks.push(tk); if(ticks.length>HIST_MS/TICK_MS+50)ticks.splice(0,ticks.length-(HIST_MS/TICK_MS|0)); subs.forEach(f=>f(tk))};
 return{
  init(){seed(); timer=setInterval(()=>{price=step(price,TICK_MS); emit({t:Date.now(),p:price})},TICK_MS)},
  onTick(fn){subs.push(fn)},
  history(){return ticks},          // full tick history (used to build any TF on demand)
  last(){return ticks[ticks.length-1]}
 };
})();

/* ============================================================
   CandleStore — aggregates ticks into ALL timeframes
   Each TF: Map keyed by bucketStart(ms) → OHLC candle
   - Truth invariant: bucket = floor(t / tf.ms) * tf.ms
   - Live candle = the bucket containing the newest tick
   ============================================================ */
const CandleStore=(()=>{
 const store={}; // {tfKey:{map:Map, arr:[]}}
 const bucket=(t,ms)=>Math.floor(t/ms)*ms;
 const ensure=k=>{if(!store[k])store[k]={map:new Map(),arr:[]};return store[k]};
 // apply one tick to one TF (creates or updates the live candle; closes previous automatically)
 const apply=(tf,tk)=>{
  const s=ensure(tf.k), bs=bucket(tk.t,tf.ms), cur=s.map.get(bs);
  if(!cur){
   const c={t:bs,o:tk.p,h:tk.p,l:tk.p,c:tk.p,v:1};
   s.map.set(bs,c); s.arr.push(c);
   // keep arr sorted; ticks arrive monotonically so push is fine
  }else{
   if(tk.p>cur.h)cur.h=tk.p;
   if(tk.p<cur.l)cur.l=tk.p;
   cur.c=tk.p; cur.v++;
  }
 };
 // full rebuild of one TF from tick history (used first time a TF is queried)
 const rebuild=tf=>{
  const s=ensure(tf.k); s.map.clear(); s.arr.length=0;
  const H=TickEngine.history();
  for(let i=0;i<H.length;i++)apply(tf,H[i]);
 };
 return{
  init(){TFS.forEach(rebuild); TickEngine.onTick(tk=>TFS.forEach(tf=>apply(tf,tk)))},
  // O(1) access — no rebuild on TF switch
  get(k){const tf=TFMAP[k]; const s=ensure(k); if(!s.arr.length)rebuild(tf); return s.arr},
  live(k){const a=this.get(k);return a[a.length-1]},
  tf(k){return TFMAP[k]}
 };
})();

/* ============================================================
   Renderer — pure view (never mutates data)
   ============================================================ */
const s=G("#CH"),c=G("#cv"),U=c.getContext("2d");
const RM=53,BM=22,PAD=6,RIGHT=8,MINBW=2,MAXBW=28;
let W=0,H=0,DPR=1,barSpacing=8,barSpacingR=8,scrollX=0,scrollXR=0;
let priceHiR=null,priceLoR=null;
let pan=0,panStartX=0,panStartScroll=0,panVel=0,panLastX=0,panLastT=0;
let pinch=0,pinchStartDist=0,pinchStartBS=8,pinchAnchorTime=0,pinchAnchorPx=0;
let chOn=0,chX=0,chY=0;
let curTF="5s"; // active timeframe

/* order-panel state (unchanged from original) */
let A=23,T=1,TV={d:0,h:0,m:0,s:1},LOCK=0;
const AM=[10,50,100,500,1000,1500,2000];
const PS=[["ث1",{d:0,h:0,m:0,s:1}],["د1",{d:0,h:0,m:1,s:0}],["2س",{d:0,h:2,m:0,s:0}],["ي1",{d:1,h:0,m:0,s:0}]];
const COL={d:[...Array(8)].map((_,i)=>i),h:[...Array(24)].map((_,i)=>i),m:[...Array(60)].map((_,i)=>i),s:[...Array(60)].map((_,i)=>i)};
const IH=26;

function sync(){G("#aVal").textContent=fmt(A);G("#p1").textContent=G("#p2").textContent=R2(A);G("#apv").textContent=(LOCK||A).toLocaleString("en-US");G("#tVal").textContent=`${TV.d} ${Q0(TV.h)}:${Q0(TV.m)}:${Q0(TV.s)} ي`}
function mk(t,cl,tx,p){const e=D.createElement(t);cl&&(e.className=cl);tx!=null&&(e.textContent=tx);p&&p.appendChild(e);return e}
function fillAmt(){const ql=G("#ql"),kg=G("#kg");ql.innerHTML=kg.innerHTML="";AM.slice(0,6).forEach(v=>{const b=mk("button","qb"+(v===LOCK?" a":""),fmt(v),ql);b.onclick=()=>{LOCK=v;fillAmt();sync()}});[1,2,3,4,5,6,7,8,9].forEach(v=>{const b=mk("button","kb",v,kg);b.onclick=()=>{LOCK=+(String(LOCK||"")+v).replace(/^0+/,"")||0;LOCK>999999999&&(LOCK=999999999);fillAmt();sync()}});const z=mk("button","kb z",0,kg);z.onclick=()=>{LOCK=+(String(LOCK||"")+0).replace(/^0+/,"")||0;LOCK>999999999&&(LOCK=999999999);fillAmt();sync()};const d=mk("button","db","del",kg);d.onclick=()=>{LOCK=+String(LOCK||"").slice(0,-1)||0;fillAmt();sync()}}
function selCol(col,v){const h=IH,t=F0(Math.round((col.scrollTop+(col.clientHeight-h)/2)/h),0,col.children.length-3);[...col.children].forEach((x,i)=>x.classList.toggle("s",i===t+1));v.k=="d"?TV.d=COL.d[t]:v.k=="h"?TV.h=COL.h[t]:v.k=="m"?TV.m=COL.m[t]:TV.s=COL.s[t];sync()}
function buildTime(){G("#tps").innerHTML="";[["#cd","d"],["#chh","h"],["#cmm","m"],["#css","s"]].forEach(([id,k])=>{const col=G(id);col.innerHTML="";const pad=mk("div","",null,col);pad.style.height="calc(50% - 13px)";COL[k].forEach(v=>{const it=mk("div","it",null,col);k=="d"?it.innerHTML=`<span>${v}</span><span>ي</span>`:it.textContent=Q0(v)});const pad2=mk("div","",null,col);pad2.style.height="calc(50% - 13px)";col.onscroll=()=>{clearTimeout(col._t);col._t=setTimeout(()=>selCol(col,{k}),60)}});PS.forEach(([lb,v])=>{const b=mk("button","tp",lb,G("#tps"));b.onclick=()=>{TV={...v};openT(1)}})}
function openA(){LOCK=A;fillAmt();sync();G("#ap").classList.add("s")}
function closeA(ok){ok&&LOCK>=0&&(A=LOCK||0);LOCK=0;sync();G("#ap").classList.remove("s")}
function openT(re){G("#tp").classList.add("s");requestAnimationFrame(()=>{[[G("#cd"),TV.d],[G("#chh"),TV.h],[G("#cmm"),TV.m],[G("#css"),TV.s]].forEach(([c,v])=>{c.scrollTop=v*IH-(c.clientHeight-IH)/2});setTimeout(()=>[["#cd","d"],["#chh","h"],["#cmm","m"],["#css","s"]].forEach(([id,k])=>selCol(G(id),{k})),re?20:80)})}
function closeT(){T=TV.d*86400+TV.h*3600+TV.m*60+TV.s;sync();G("#tp").classList.remove("s")}

/* ---------- Timeframe picker ---------- */
function buildTFPicker(){
 const p=G("#tfp"); p.innerHTML="";
 TFS.forEach(tf=>{
  const b=mk("button",tf.k===curTF?"on":"",tf.lb,p);
  b.onclick=()=>{
   curTF=tf.k;
   G("#tfBtn").textContent=tf.lb;
   GA("button",p).forEach(x=>x.classList.remove("on"));
   b.classList.add("on");
   // reset view to latest for the new TF (like Quotex behavior)
   scrollX=scrollXR=0;
   priceHiR=priceLoR=null; // recompute price scale for new TF
   p.classList.remove("s");
  };
 });
}
G("#tfBtn").onclick=e=>{e.stopPropagation();G("#tfp").classList.toggle("s")};
D.addEventListener("click",e=>{if(!e.target.closest("#tfp")&&e.target.id!=="tfBtn")G("#tfp").classList.remove("s")});

/* ---------- Geometry helpers (view only) ---------- */
const plotRight=()=>W-6, plotWidth=()=>W-6-PAD;
const zMin=()=>plotWidth()/(Math.max(3,16*3.704)+8);
const zMax=()=>plotWidth()/(Math.max(3,16*.207)+8);
const clampBS=v=>F0(v,zMin(),zMax());
const barWidth=bs=>F0(Math.round(bs*.72),MINBW,MAXBW);

function candles(){return CandleStore.get(curTF)}
function maxScrollX(){return Math.max(0,(candles().length-2)*barSpacingR)}
function idxToX(i){const last=candles().length-1;return plotRight()+scrollXR-((last+RIGHT)-i)*barSpacingR}
function xToIdx(x){const last=candles().length-1;return last+RIGHT-(plotRight()+scrollXR-x)/barSpacingR}
function idxToTime(i){const arr=candles(),last=arr.length-1,tfMs=CandleStore.tf(curTF).ms;return arr[last].t+(i-last)*tfMs}
function timeToIdx(t){const arr=candles(),last=arr.length-1,tfMs=CandleStore.tf(curTF).ms;return last+(t-arr[last].t)/tfMs}

function zoomAt(px,newBS){
 newBS=clampBS(newBS);
 const anchorTime=idxToTime(xToIdx(px));
 barSpacing=barSpacingR=newBS;
 const arr=candles(),last=arr.length-1,idx=timeToIdx(anchorTime);
 scrollX=scrollXR=F0(px-plotRight()+(last+RIGHT-idx)*newBS,0,maxScrollX());
}

/* ---------- Pointer / touch ---------- */
function pinchBegin(t){const a=t.touches[0],b=t.touches[1],r=s.getBoundingClientRect();pinchStartDist=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY);pinchStartBS=barSpacing;pinchAnchorPx=F0((a.clientX+b.clientX)/2-r.left,PAD,W-6);pinchAnchorTime=idxToTime(xToIdx(pinchAnchorPx));pinch=1;pan=0;chOn=0}
function pinchMove(t){const a=t.touches[0],b=t.touches[1],d=Math.hypot(a.clientX-b.clientX,a.clientY-b.clientY),newBS=clampBS(pinchStartBS*(d/pinchStartDist));barSpacing=barSpacingR=newBS;const arr=candles(),last=arr.length-1,idx=timeToIdx(pinchAnchorTime);scrollX=scrollXR=F0(pinchAnchorPx-plotRight()+(last+RIGHT-idx)*newBS,0,maxScrollX())}
const evX=e=>{const r=s.getBoundingClientRect();return(e.touches?e.touches[0].clientX:e.clientX)-r.left};
const evY=e=>{const r=s.getBoundingClientRect();return(e.touches?e.touches[0].clientY:e.clientY)-r.top};
function panStartFn(e){if(pinch)return;pan=1;panStartX=evX(e);panStartScroll=scrollX;panLastX=panStartX;panLastT=Date.now();panVel=0;chOn=0}
function panMoveFn(e){if(pinch)return;if(pan){const x=evX(e),dx=x-panStartX;scrollX=F0(panStartScroll+dx,0,maxScrollX());const now=Date.now(),dt=now-panLastT;dt>0&&(panVel=(x-panLastX)/dt*8,panLastX=x,panLastT=now)}else chOn=1,chX=evX(e),chY=evY(e)}
function panEndFn(){if(!pan)return;pan=0;scrollX=F0(scrollX+8*panVel,0,maxScrollX());panVel*=.5}

function resize(){const r=s.getBoundingClientRect();W=r.width;H=r.height;DPR=devicePixelRatio||1;c.width=W*DPR;c.height=H*DPR;c.style.width=W+"px";c.style.height=H+"px";U.setTransform(DPR,0,0,DPR,0,0);barSpacing=clampBS(barSpacing);barSpacingR=clampBS(barSpacingR);scrollX=F0(scrollX,0,maxScrollX());scrollXR=F0(scrollXR,0,maxScrollX())}
function smoothPrice(hi,lo){const mid=(hi+lo)/2,sp=Math.max(5e-6,hi-lo);if(priceHiR==null){priceHiR=hi;priceLoR=lo;return}let midR=(priceHiR+priceLoR)/2,spR=priceHiR-priceLoR;spR+=(sp-spR)*.12;midR+=(mid-midR)*.12;priceHiR=midR+spR/2;priceLoR=midR-spR/2}
function roundRect(x,y,w,h,r,fill){U.fillStyle=fill;U.beginPath();U.moveTo(x+r,y);U.arcTo(x+w,y,x+w,y+h,r);U.arcTo(x+w,y+h,x,y+h,r);U.arcTo(x,y+h,x,y,r);U.arcTo(x,y,x+w,y,r);U.closePath();U.fill()}
const tfLabel=t=>{const tf=CandleStore.tf(curTF); return tf.ms>=3600e3?ne(t):tf.ms>=60e3?ne(t):nes(t)};

function frame(){
 resize();
 barSpacingR+=(barSpacing-barSpacingR)*.22; if(Math.abs(barSpacing-barSpacingR)<.003)barSpacingR=barSpacing;
 scrollXR+=(scrollX-scrollXR)*.22; if(Math.abs(scrollX-scrollXR)<.05)scrollXR=scrollX;

 const arr=candles(), tfMs=CandleStore.tf(curTF).ms;
 const pw=plotWidth(),ph=H-8-BM,last=arr.length-1;
 const iL=Math.max(0,Math.floor(xToIdx(PAD))-2),iR=Math.min(last,Math.ceil(xToIdx(plotRight()))+2);
 let hi=-Infinity,lo=Infinity;
 for(let i=iL;i<=iR;i++){const k=arr[i]; if(k.h>hi)hi=k.h; if(k.l<lo)lo=k.l}
 if(!isFinite(hi)){hi=arr[last].c*1.001;lo=arr[last].c*.999}
 const pad=.05*Math.max(5e-4,hi-lo);
 smoothPrice(hi+pad,lo-pad);
 const rng=priceHiR-priceLoR, p2y=p=>8+(priceHiR-p)*ph/rng;
 const lQ=xToIdx(PAD),rQ=xToIdx(plotRight());

 U.clearRect(0,0,W,H); U.fillStyle="#0d1730"; U.fillRect(0,0,W,H);
 U.save(); U.beginPath(); U.rect(PAD,8,pw,ph); U.clip();
 U.strokeStyle="#1a2433"; U.lineWidth=1;

 // vertical grid
 let stepD=5,minGap=30; while((iR-iL+12)/stepD>minGap)stepD*=2;
 for(let t=Math.ceil(lQ/stepD)*stepD;t<=rQ+stepD;t+=stepD){const x=idxToX(t); if(x<PAD-barSpacingR||x>W+barSpacingR)continue; U.beginPath(); U.moveTo(x,8); U.lineTo(x,H-BM); U.stroke()}

 // horizontal price grid
 const stepP=(t=>{const e=10**Math.floor(Math.log10(t)),a=t/e;return(a<=1?1:a<=2?2:a<=5?5:10)*e})(rng/Math.max(2,Math.floor(ph/60)));
 for(let p=Math.floor(priceLoR/stepP)*stepP;p<=priceHiR+stepP;p+=stepP){const y=p2y(p); U.beginPath(); U.moveTo(PAD,y); U.lineTo(W,y); U.stroke()}

 // crosshair on current + expiry
 const xNow=idxToX(last)+barSpacingR/2, xExp=idxToX(last+3)+barSpacingR/2, yPr=p2y(arr[last].c);
 U.setLineDash([5,5]); U.strokeStyle="rgba(255,255,255,.45)";
 if(xNow>=PAD&&xNow<=W){U.beginPath();U.moveTo(xNow,8);U.lineTo(xNow,H-BM);U.stroke()}
 if(xExp>=PAD&&xExp<=W){U.beginPath();U.moveTo(xExp,8);U.lineTo(xExp,H-BM);U.stroke()}
 U.strokeStyle="rgba(255,255,255,.8)"; U.beginPath(); U.moveTo(PAD,yPr); U.lineTo(W,yPr); U.stroke();
 U.setLineDash([]);

 // candles
 const bw=barWidth(barSpacingR);
 for(let i=iL;i<=iR;i++){
  const k=arr[i],x=idxToX(i); if(x<PAD-bw||x>W+bw)continue;
  const yO=p2y(k.o),yC=p2y(k.c),yH=p2y(k.h),yL=p2y(k.l),up=k.c>=k.o;
  U.strokeStyle=U.fillStyle=up?"#26a69a":"#ef5350"; U.lineWidth=1;
  U.beginPath(); U.moveTo(.5+(0|x),yH); U.lineTo(.5+(0|x),yL); U.stroke();
  U.fillRect(Math.round(x-bw/2),Math.min(yO,yC),bw,Math.max(1,Math.abs(yC-yO)));
 }

 // hover crosshair
 if(chOn&&chX>=PAD&&chX<=W&&chY>=8&&chY<=H-BM){U.setLineDash([4,4]);U.strokeStyle="rgba(195,188,219,.55)";U.beginPath();U.moveTo(chX,8);U.lineTo(chX,H-BM);U.stroke();U.beginPath();U.moveTo(PAD,chY);U.lineTo(W,chY);U.stroke();U.setLineDash([])}
 U.restore();

 // time axis labels
 U.fillStyle="#fff"; U.font="10px Arial"; U.textAlign="center";
 let labelPx=42,stepL=stepD; while(stepL*barSpacingR<labelPx)stepL+=stepD;
 for(let t=Math.ceil(lQ/stepL)*stepL;t<=rQ;t+=stepL){const x=idxToX(t); if(x<PAD||x>W)continue; U.fillText(tfLabel(arr[last].t+(t-last)*tfMs),x,H-7)}

 // price axis labels
 U.textAlign="right";
 for(let p=Math.floor(priceLoR/stepP)*stepP;p<=priceHiR+stepP;p+=stepP){const y=p2y(p); if(y<8||y>H-BM)continue; roundRect(W-RM,y-8,50,16,4,"rgba(14,21,33,.85)"); U.fillStyle="#a5b7d6"; U.fillText(F(p),W-8,y+4)}

 // live price pill + pulsing dot
 const lk=arr[last],py=p2y(lk.c),px=idxToX(last),pulse=.5+.5*Math.sin(performance.now()/120),ri=3.25+.25*pulse,ro=4.8+.8*pulse;
 roundRect(W-RM,py-11,50,22,10,"#1b2b4b");
 U.strokeStyle="#3e5f9b"; U.lineWidth=1; U.strokeRect(W-RM+.5,py-10.5,49,21);
 U.fillStyle="#fff"; U.font="bold 11px Arial"; U.textAlign="center"; U.fillText(F(lk.c),W-RM+25,py+4);
 U.fillStyle="#3c6cff"; U.globalAlpha=.22+.2*pulse; U.beginPath(); U.arc(px,py,ro+1.5*pulse,0,7); U.fill();
 U.globalAlpha=1; U.beginPath(); U.arc(px,py,ri,0,7); U.fill();
 U.strokeStyle="#d7ecff"; U.lineWidth=1.6; U.globalAlpha=.85+.15*pulse; U.beginPath(); U.arc(px,py,ro,0,7); U.stroke();
 U.globalAlpha=1;

 requestAnimationFrame(frame);
}

/* ---------- Boot ---------- */
TickEngine.init();
CandleStore.init();
addEventListener("resize",resize);
resize(); buildTime(); buildTFPicker(); sync();
requestAnimationFrame(frame);

/* ---------- Interactions ---------- */
s.addEventListener("mousedown",panStartFn);
s.addEventListener("mousemove",panMoveFn);
addEventListener("mouseup",panEndFn);
s.addEventListener("mouseleave",()=>chOn=0);
s.addEventListener("wheel",e=>{e.preventDefault();zoomAt(evX(e),barSpacing*(e.deltaY>0?1/1.08:1.08))},{passive:!1});
let lastTap=0;
s.addEventListener("touchstart",e=>{const now=Date.now();if(e.touches.length===2){pinchBegin(e);lastTap=0;return}if(e.touches.length===1){if(now-lastTap<320){barSpacing=barSpacingR=8;scrollX=scrollXR=0;panVel=0;chOn=0;lastTap=0;pan=pinch=0;return}lastTap=now;panStartFn(e)}},{passive:!0});
s.addEventListener("touchmove",e=>{if(e.touches.length===2){if(!pinch)pinchBegin(e);pinchMove(e)}else if(!pinch)panMoveFn(e)},{passive:!0});
s.addEventListener("touchend",e=>{if(pinch&&e.touches.length<2){pinch=0;pan=0;if(e.touches.length===1)panStartFn(e);else chOn=0}if(!e.touches.length)panEndFn()},{passive:!0});
GA("#nv .ni").forEach(n=>n.addEventListener("click",()=>{GA("#nv .ni").forEach(x=>x.classList.remove("a"));n.classList.add("a")}));
G("#aOpen").onclick=openA; G("#tOpen").onclick=()=>openT();
G("#aok").onclick=()=>closeA(1); G("#acl").onclick=()=>{LOCK=0;fillAmt();sync()};
G("#tok").onclick=closeT;
G("#ap").onclick=e=>e.target.id=="ap"&&closeA();
G("#tp").onclick=e=>e.target.id=="tp"&&closeT();
G("#amM").onclick=e=>{e.stopPropagation();A=Math.max(0,A-1);sync()};
G("#amP").onclick=e=>{e.stopPropagation();A++;sync()};
G("#tmM").onclick=()=>{T=Math.max(1,T-1);TV={d:T/86400|0,h:T%86400/3600|0,m:T%3600/60|0,s:T%60};sync()};
G("#tmP").onclick=()=>{T++;TV={d:T/86400|0,h:T%86400/3600|0,m:T%3600/60|0,s:T%60};sync()};
})();</script></html>
