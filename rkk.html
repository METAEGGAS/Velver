<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">

<style>
body {
  margin: 0;
  background: #0f172a;
  color: white;
  font-family: sans-serif;
}

#content {
  padding: 20px;
  padding-bottom: 100px;
}

#bottom-bar {
  position: fixed;
  bottom: 0;
  width: 100%;
  height: 80px;
  background: #111;
  display: flex;
  justify-content: space-around;
  align-items: center;
}

.btn {
  text-align: center;
  color: #aaa;
}
</style>
</head>

<body>

<div id="content">
  <h2>الرئيسية</h2>
</div>

<div id="bottom-bar">
  <div class="btn" onclick="loadJS('traders.js')">Traders</div>
  <div class="btn" onclick="loadJS('assets.js')">Assets</div>
  <div class="btn" onclick="loadJS('deposit.js')">Deposit</div>
</div>

<script>
function loadJS(file) {

  // حذف السكربت القديم
  let old = document.getElementById("page-script");
  if (old) old.remove();

  // تحميل سكربت جديد
  let script = document.createElement("script");
  script.src = file;
  script.id = "page-script";

  document.body.appendChild(script);
}
</script>

</body>
</html>
