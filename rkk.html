<div id="app">

  <div id="content">الرئيسية</div>

  <div id="bottom-bar">
    <button onclick="loadScript('traders.js')">Traders</button>
    <button onclick="loadScript('assets.js')">Assets</button>
    <button onclick="loadScript('deposit.js')">Deposit</button>
  </div>

</div>

<script>
function loadScript(file) {
  // نحذف السكربت القديم
  let old = document.getElementById("dynamic-script");
  if (old) old.remove();

  // ننشئ سكربت جديد
  let script = document.createElement("script");
  script.src = file;
  script.id = "dynamic-script";

  document.body.appendChild(script);
}
</script>
