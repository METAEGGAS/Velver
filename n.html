<!doctype html><html lang=ar dir=rtl><meta charset=UTF-8><meta name=viewport content="width=device-width,initial-scale=1"><meta name=theme-color content="#0e1521"><title>لوحة توليد الشموع</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:'Noto Sans Arabic',-apple-system,Segoe UI,Roboto,Arial,sans-serif}html,body{background:#0e1521;color:#fff;min-height:100vh}body{padding:14px;max-width:720px;margin:0 auto}h1{font-size:18px;margin-bottom:12px;text-align:center;color:#12b062}.card{background:#141c2b;border:1px solid #263246;border-radius:12px;padding:14px;margin-bottom:12px}label{display:block;font-size:12px;color:#9fb0c6;margin-bottom:5px;font-weight:700}input,select,button{width:100%;padding:10px 12px;border-radius:8px;border:1px solid #263246;background:#0e1521;color:#fff;font-size:14px;font-weight:700;margin-bottom:10px;font-family:inherit}input:focus,select:focus{outline:none;border-color:#12b062}button{background:#12b062;border:none;cursor:pointer;transition:.2s}button:hover{background:#0f9754}button:disabled{background:#333;cursor:not-allowed}button.warn{background:#df4a3b}button.warn:hover{background:#b53a2e}.row{display:flex;gap:8px}.row>*{flex:1}.st{padding:8px;border-radius:6px;background:#0e1521;border:1px solid #263246;font-size:12px;color:#9fb0c6;margin-bottom:8px;min-height:34px;line-height:1.6}.st.ok{color:#12b062;border-color:#12b062}.st.err{color:#df4a3b;border-color:#df4a3b}.info{display:grid;grid-template-columns:1fr 1fr;gap:6px;font-size:12px}.info div{background:#0e1521;padding:6px 8px;border-radius:6px;border:1px solid #263246}.info b{color:#12b062;display:block;font-size:11px;margin-bottom:2px}.lock{position:fixed;inset:0;background:rgba(14,21,33,.98);display:flex;align-items:center;justify-content:center;z-index:100;padding:20px}.lock.h{display:none}.lock-box{background:#141c2b;border:1px solid #263246;border-radius:14px;padding:22px;max-width:340px;width:100%;text-align:center}.lock-box h2{color:#12b062;margin-bottom:14px;font-size:16px}.lock-box input{text-align:center;letter-spacing:4px;font-size:18px}.log{max-height:180px;overflow:auto;background:#0e1521;border:1px solid #263246;border-radius:6px;padding:8px;font-size:11px;line-height:1.7;color:#9fb0c6}.log div{border-bottom:1px solid #1a2433;padding:2px 0}.badge{display:inline-block;background:#12b062;padding:2px 8px;border-radius:4px;font-size:11px;margin-right:6px}</style><div class=lock id=lk><div class=lock-box><h2>🔐 لوحة توليد الشموع</h2><label>الرمز السري</label><input type=password id=pw placeholder=•••••• maxlength=20 inputmode=numeric><button onclick=lg()>دخول</button><div class=st id=lst>أدخل الرمز السري للمتابعة</div></div></div><h1>⚡ لوحة توليد الشموع - ADMIN</h1><div class=card><label>الزوج (Pair)</label><input id=pr value=USD/CAD placeholder="USD/CAD"><label>عدد الشموع المراد توليدها</label><input id=cnt type=number value=100 min=1 max=5000><label>القاعدة (السعر الأساسي) - اختياري</label><input id=bs type=number step=0.0001 placeholder="تلقائي من آخر إغلاق"><div class=row><button onclick=gn()>🚀 توليد الشموع</button><button class=warn onclick=cl()>🗑 مسح شموع الزوج</button></div><div class=st id=stt>جاهز</div></div><div class=card><label>معلومات الزوج الحالي</label><div class=info><div><b>الزوج</b><span id=iPr>-</span></div><div><b>المفتاح</b><span id=iKy>-</span></div><div><b>عدد الشموع</b><span id=iCn>-</span></div><div><b>آخر إغلاق</b><span id=iLc>-</span></div><div><b>الاتجاه</b><span id=iTr>-</span></div><div><b>Base</b><span id=iBs>-</span></div></div><button onclick=ld() style=margin-top:10px>🔄 تحديث المعلومات</button></div><div class=card><label>سجل العمليات</label><div class=log id=lg></div></div><script type=module>import{initializeApp}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";import{getAuth,signInAnonymously,onAuthStateChanged}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";import{getFirestore,doc,collection,setDoc,getDoc,getDocs,writeBatch,serverTimestamp,query,orderBy,limit}from"https://www.gstatic.com/firebasejs/12.15.0/firebase-firestore.js";const cfg={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};const PWD="123456",STEP=60000,BASE=1.155,VP=0.0008;const $=id=>document.getElementById(id);let app,db,au,uid=null,ready=0;const key=p=>(p||"USD/CAD").toLowerCase().replace(/[^a-z0-9]+/g,"_").replace(/^_+|_+$/g,"")||"usd_cad";const rng=()=>2*Math.random()-1;function gen(prev,vp,tr){const o=prev,dr=tr*vp*.15,vo=vp*(.7+.6*Math.random()),c=o*(1+dr+rng()*vo*.5),hi=Math.max(o,c),lo=Math.min(o,c),wk=(hi-lo)*(.3+.7*Math.random())+o*vp*.1;return{o,h:hi+Math.random()*wk*.5,l:lo-Math.random()*wk*.5,c}}function log(m,t){const d=document.createElement("div");d.innerHTML='<span class=badge>'+new Date().toLocaleTimeString("en-US",{hour12:!1})+'</span>'+m;if(t)d.style.color=t;$("lg").prepend(d)}function st(m,c){const e=$("stt");e.textContent=m;e.className="st "+(c||"")}window.lg=function(){const v=$("pw").value.trim();if(v===PWD){$("lk").classList.add("h");log("✅ تم الدخول كـ ADMIN","#12b062");init()}else{$("lst").textContent="❌ رمز خاطئ";$("lst").className="st err"}};$("pw").addEventListener("keydown",e=>{if(e.key==="Enter")lg()});async function init(){try{app=initializeApp(cfg);db=getFirestore(app);au=getAuth(app);st("جاري تسجيل الدخول...");await signInAnonymously(au);onAuthStateChanged(au,u=>{if(u){uid=u.uid;ready=1;st("متصل ✔ UID: "+uid.slice(0,8),"ok");log("🔗 متصل بـ Firebase");ld()}})}catch(e){st("خطأ اتصال: "+e.message,"err");log("❌ "+e.message,"#df4a3b")}}window.ld=async function(){if(!ready)return;const p=$("pr").value.trim()||"USD/CAD",k=key(p);try{const ref=doc(db,"publicCharts",k),s=await getDoc(ref),d=s.exists()?s.data():{};$("iPr").textContent=d.pair||p;$("iKy").textContent=k;$("iLc").textContent=d.lastClose?(+d.lastClose).toFixed(5):"-";$("iTr").textContent=d.trend!=null?(+d.trend).toFixed(3):"-";$("iBs").textContent=d.base||BASE;const all=await getDocs(collection(ref,"candles"));$("iCn").textContent=all.size;log("📊 "+p+": "+all.size+" شمعة")}catch(e){log("❌ "+e.message,"#df4a3b")}};window.gn=async function(){if(!ready){alert("لم يكتمل الاتصال");return}const p=$("pr").value.trim()||"USD/CAD",k=key(p),n=Math.max(1,Math.min(5000,+$("cnt").value||100)),bIn=+$("bs").value;st("جاري التوليد...");try{const ref=doc(db,"publicCharts",k);const snap=await getDoc(ref),cur=snap.exists()?snap.data():{};const base=bIn>0?bIn:BASE;await setDoc(ref,{pair:p,key:k,step:STEP,base:base,vp:VP,seedDone:1,seedLock:null,managerUid:null,managerBeat:0,active:null,updatedAt:serverTimestamp()},{merge:!0});const now=Date.now(),tEnd=Math.floor(now/STEP)*STEP;let last=+(cur.lastClose)||base,tr=+(cur.trend)||0;const CHK=400;let done=0;for(let off=0;off<n;off+=CHK){const b=writeBatch(db),lim=Math.min(CHK,n-off);for(let i=0;i<lim;i++){const idx=n-off-i;Math.random()<.05?tr=2*(Math.random()-.5):tr*=.98;const cd=gen(last,VP,tr),ts=tEnd-idx*STEP;b.set(doc(collection(ref,"candles"),String(ts)),{o:cd.o,h:cd.h,l:cd.l,c:cd.c,t:ts,closedAt:now});last=cd.c;done++}await b.commit();st("تم توليد "+done+" / "+n+" ...")}await setDoc(ref,{lastClose:last,lastClosedTs:tEnd-STEP,trend:tr,active:null,managerUid:null,managerBeat:0,updatedAt:serverTimestamp()},{merge:!0});st("✅ تم توليد "+n+" شمعة للزوج "+p,"ok");log("✅ "+p+": +"+n+" شمعة (آخر إغلاق "+last.toFixed(5)+")","#12b062");ld()}catch(e){st("❌ "+e.message,"err");log("❌ "+e.message,"#df4a3b")}};window.cl=async function(){const p=$("pr").value.trim()||"USD/CAD",k=key(p);if(!confirm("مسح كل شموع "+p+" ؟"))return;if(!ready)return;st("جاري المسح...");try{const ref=doc(db,"publicCharts",k),cs=await getDocs(collection(ref,"candles"));let n=0;const CHK=400;const docs=cs.docs;for(let off=0;off<docs.length;off+=CHK){const b=writeBatch(db),lim=Math.min(CHK,docs.length-off);for(let i=0;i<lim;i++){b.delete(docs[off+i].ref);n++}await b.commit()}await setDoc(ref,{seedDone:0,lastClose:null,lastClosedTs:0,trend:0,active:null,managerUid:null,managerBeat:0,updatedAt:serverTimestamp()},{merge:!0});st("🗑 تم مسح "+n+" شمعة","ok");log("🗑 "+p+": حذف "+n+" شمعة","#df4a3b");ld()}catch(e){st("❌ "+e.message,"err");log("❌ "+e.message,"#df4a3b")}};</script>
