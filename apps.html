<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#0f172a;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.card{
    width:350px;
    background:#1e293b;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 20px rgba(0,0,0,.4);
}

h2{
    color:#fff;
    text-align:center;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:8px 0;
    border:none;
    border-radius:8px;
    background:#334155;
    color:white;
    font-size:15px;
}

input::placeholder{
    color:#cbd5e1;
}

button{
    width:100%;
    padding:12px;
    margin-top:15px;
    border:none;
    border-radius:8px;
    background:#2563eb;
    color:white;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#1d4ed8;
}

#result{
    margin-top:15px;
    text-align:center;
    color:#22c55e;
    font-size:14px;
}
</style>
</head>

<body>

<div class="card">

<h2>إنشاء حساب</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">

<input type="password" id="password" placeholder="كلمة المرور">

<button onclick="register()">إنشاء حساب</button>

<div id="result"></div>

</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/12.0.0/firebase-app.js";

import {
getAuth,
createUserWithEmailAndPassword
}
from "https://www.gstatic.com/firebasejs/12.0.0/firebase-auth.js";

const firebaseConfig = {

apiKey: "AIzaSyC97dyFTRix5WNiXSjwoaecEtxQGgxN9Uc",

authDomain: "mofa-sy.firebaseapp.com",

projectId: "mofa-sy",

storageBucket: "mofa-sy.firebasestorage.app",

messagingSenderId: "410865695937",

appId: "1:410865695937:android:51c0f5db24220084fbe840"

};

const app = initializeApp(firebaseConfig);

const auth = getAuth(app);

window.register = function(){

const email=document.getElementById("email").value;

const password=document.getElementById("password").value;

createUserWithEmailAndPassword(auth,email,password)

.then((userCredential)=>{

document.getElementById("result").style.color="#22c55e";

document.getElementById("result").innerHTML="تم إنشاء الحساب بنجاح";

console.log(userCredential.user);

})

.catch((error)=>{

document.getElementById("result").style.color="#ef4444";

document.getElementById("result").innerHTML=error.message;

});

}

</script>

</body>
</html>
