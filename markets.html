<!doctype html>
<html lang="ar" dir="rtl">
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#050807">
<title>binexia</title>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
body{margin:0;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial;background:radial-gradient(120% 90% at 50% 0,#09130e 0,#050807 55%,#040504 100%);color:#fff;padding-bottom:calc(82px + env(safe-area-inset-bottom,0px))}
.w{max-width:430px;margin:0 auto;min-height:100vh;padding:18px 16px 20px}
.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:4px}
#chip,#who{display:none}
.hero{margin:10px 0 8px;height:230px;border-radius:24px;background:url("https://www.maltexma.com/static/images/lexon/full_header_bg.png") top center/contain no-repeat;filter:saturate(1.1) brightness(1.05);border:4px solid rgba(46,240,139,.28)}
.p{position:relative;padding:20px;border-radius:30px;background:linear-gradient(180deg,#060c08,#040705);border:4px solid rgba(46,240,139,.72);box-shadow:0 0 42px rgba(46,240,139,.26),0 0 85px rgba(46,240,139,.08),inset 0 0 0 1.5px rgba(46,240,139,.14)}
.cards{display:flex;gap:14px}
.c{flex:1;min-height:188px;border-radius:22px;padding:20px 14px 16px;background:linear-gradient(170deg,#050a07,#060d08);border:3.5px solid rgba(46,240,139,.88);box-shadow:0 0 28px rgba(46,240,139,.22),0 0 60px rgba(46,240,139,.07)}
.c .img{height:54px;margin-bottom:12px;display:flex;justify-content:center;align-items:center}
.c h3{margin:0 0 7px;font-size:21px;line-height:1.2;font-weight:900;text-align:center;color:#fff}
.c p{margin:0;font-size:16px;line-height:1.5;text-align:center;font-weight:800;color:#d4f5e5}
.c .sm{margin-top:11px;font-size:15.5px;opacity:.96;font-weight:800}
.c .xs{font-size:15.5px;opacity:.96;font-weight:800}
.in{width:100%;height:72px;border-radius:18px;border:3px solid rgba(46,240,139,.42);outline:0;background:#181d1a;color:#e9ecea;padding:0 22px;font-size:18px;font-weight:800;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),0 0 14px rgba(46,240,139,.08);transition:border-color .2s,box-shadow .2s}
.in:focus{border-color:rgba(46,240,139,.82);box-shadow:0 0 26px rgba(46,240,139,.26)}
.in::placeholder{color:#8b8f8d;font-weight:700}
.btn{margin-top:16px;width:100%;height:82px;border:0;border-radius:42px;color:#fff;font-size:24px;font-weight:900;background:linear-gradient(180deg,#3de882,#18b85c);box-shadow:0 16px 38px rgba(0,0,0,.52),0 0 34px rgba(46,240,139,.34),inset 0 2px 0 rgba(255,255,255,.26);cursor:pointer;letter-spacing:.4px;transition:transform .14s,box-shadow .14s}
.btn:active{transform:scale(.97)}
.btn:disabled{opacity:.44;cursor:not-allowed;filter:grayscale(.28)}
#out{position:fixed;width:1px;height:1px;opacity:0;pointer-events:none;visibility:hidden;top:-9999px;left:-9999px}
.toast{position:fixed;left:50%;bottom:calc(92px + env(safe-area-inset-bottom,0px));transform:translateX(-50%);background:rgba(6,14,9,.97);border:2.5px solid rgba(46,240,139,.56);box-shadow:0 12px 36px rgba(0,0,0,.66),0 0 24px rgba(46,240,139,.22);color:#fff;padding:15px 30px;border-radius:20px;font-size:16px;font-weight:900;opacity:0;pointer-events:none;transition:.25s;white-space:nowrap;z-index:9999}
.toast.show{opacity:1}
.bnav{position:fixed;bottom:0;left:0;width:100%;background:#050807;display:flex;border-top:2px solid rgba(46,240,139,.18);z-index:9990;padding:8px 0 calc(12px + env(safe-area-inset-bottom,0px))}
.bnav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:5px;cursor:pointer;padding:5px 0}
.bnav-item img{width:27px;height:27px;opacity:.54;filter:grayscale(1) brightness(.9)}
.bnav-item span{font-size:11px;color:#666;font-weight:700}
.bnav-item.active img{opacity:1;filter:none}
.bnav-item.active span{color:#f5a623;font-weight:900}
</style>
<body>
<div class="w">
<div class="top"><div></div><div id="chip"></div></div>
<div class="hero"></div>
<div class="p" id="main">
<div class="cards">
<div class="c">
<div class="img"><svg width="62" height="42" viewBox="0 0 64 44"><defs><linearGradient id="g" x1="0" y1="0" x2="1" y2="1"><stop stop-color="#2ef08b"></stop><stop offset="1" stop-color="#14b763"></stop></linearGradient></defs><path d="M12 26c6-10 10-14 20-16 10-2 18 3 20 12 2 9-5 16-14 16H20C10 38 6 33 12 26Z" fill="url(#g)" opacity=".25"></path><circle cx="42" cy="18" r="10" fill="none" stroke="#2ef08b" stroke-width="3"></circle><path d="M38 18h8" stroke="#2ef08b" stroke-width="3" stroke-linecap="round"></path><path d="M42 14v8" stroke="#2ef08b" stroke-width="3" stroke-linecap="round"></path></svg></div>
<h3>أوصي أصدقائك</h3><p>بمتابعة الطلبات</p><p class="sm">احصل على عمولات</p><p class="xs">دعوة عالية</p>
</div>
<div class="c">
<div class="img"><svg width="62" height="42" viewBox="0 0 64 44"><circle cx="26" cy="22" r="12" fill="none" stroke="#bfc7c3" stroke-width="3"></circle><path d="M35 31l10 10" stroke="#bfc7c3" stroke-width="3" stroke-linecap="round"></path><circle cx="26" cy="22" r="6" fill="none" stroke="#2ef08b" stroke-width="3"></circle></svg></div>
<h3>أدخل رمز المتابعة</h3><p>للمتابعة السريعة</p><p class="sm">عمولة عالية تُضاف</p><p class="xs">تلقائياً إلى الحساب</p>
</div>
</div>
<div style="margin-top:20px">
<input id="code" class="in" autocomplete="one-time-code" placeholder="يرجى إدخال رمز الطلب">
<button id="go" class="btn">متابعة</button>
</div>
</div>
</div>
<button id="out">تسجيل خروج</button>
<p id="who"></p>
<div id="t" class="toast">تم</div>
<nav class="bnav" id="bnav">
<div class="bnav-item active" data-nav="home"><img src="https://www.maltexma.com/static/images/binance-theme/home.png" alt=""><span>الرئيسية</span></div>
<div class="bnav-item" data-nav="markets"><img src="https://www.maltexma.com/static/images/binance-theme/price.png" alt=""><span>الأسواق</span></div>
<div class="bnav-item" data-nav="trade"><img src="https://www.maltexma.com/static/images/binance-theme/price.png" alt=""><span>التداول</span></div>
<div class="bnav-item" data-nav="fav"><img src="https://www.maltexma.com/static/images/binance-theme/option.png" alt=""><span>التسمية</span></div>
<div class="bnav-item" data-nav="ast"><img src="https://www.maltexma.com/static/images/binance-theme/assets.png" alt=""><span>الرصيد</span></div>
</nav>
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-auth.js";
import{getFirestore,doc,getDoc,setDoc,runTransaction,serverTimestamp}from"https://www.gstatic.com/firebasejs/12.10.0/firebase-firestore.js";
const cfg={apiKey:"AIzaSyBOUqLixfphg3b8hajc4hkwV-VJmldGBVw",authDomain:"randers-c640b.firebaseapp.com",projectId:"randers-c640b",storageBucket:"randers-c640b.firebasestorage.app",messagingSenderId:"391496092929",appId:"1:391496092929:web:58208b4eb3e6f9a8571f00",measurementId:"G-DBDSVVF7PS"};
const app=initializeApp(cfg),auth=getAuth(app),db=getFirestore(app);
const $=i=>document.getElementById(i);
const toast=m=>{const t=$("t");t.textContent=m;t.classList.add("show");clearTimeout(t._x);t._x=setTimeout(()=>t.classList.remove("show"),2200)};
const ROOT="codsaer",META="meta",CODES="codes";
const metaRef=doc(db,ROOT,META);
async function ensure(){const s=await getDoc(metaRef);if(!s.exists())await setDoc(metaRef,{createdAt:serverTimestamp()},{merge:true})}
$("out").onclick=async()=>{await signOut(auth)};
$("go").onclick=async()=>{
const v=($("code").value||"").trim();
if(!v)return toast("اكتب الكود");
const u=auth.currentUser;
if(!u||!u.email||u.isAnonymous)return toast("سجّل دخول بالبريد أولاً");
try{
await ensure();
const codeRef=doc(db,ROOT,META,CODES,v);
const userRef=doc(db,"users",u.uid);
const useRef=doc(db,ROOT,META,CODES,v,"uses",u.uid);
const res=await runTransaction(db,async tx=>{
const cs=await tx.get(codeRef);
if(!cs.exists())return{ok:false,msg:"الكود غير موجود"};
const c=cs.data();
const exp=c.expiresAt?.toMillis?c.expiresAt.toMillis():0;
if(exp&&exp<Date.now())return{ok:false,msg:"الكود منتهي الصلاحية"};
const amt=Number(c.amount||0),cur=c.currency||"";
if(!(amt>0))return{ok:false,msg:"الكود غير صالح"};
const maxUses=Math.max(1,Number(c.maxUses||1));
const maxPer=Math.max(1,Number(c.maxUsesPerUser||1));
const usedCount=Number(c.usedCount||0);
if(usedCount>=maxUses)return{ok:false,msg:"الكود وصل للحد الأقصى"};
const usx=await tx.get(useRef);
const myCount=Number((usx.exists()?usx.data().count:0)||0);
if(myCount>=maxPer)return{ok:false,msg:"أنت وصلت للحد المسموح"};
const us=await tx.get(userRef);
const bal=Number((us.exists()?us.data().balance:0)||0);
const newUsed=usedCount+1,newMy=myCount+1;
tx.set(userRef,{uid:u.uid,email:u.email,balance:bal+amt,updatedAt:serverTimestamp()},{merge:true});
tx.set(useRef,{uid:u.uid,email:u.email,count:newMy,lastUsedAt:serverTimestamp()},{merge:true});
tx.set(codeRef,{usedCount:newUsed,used:(newUsed>=maxUses),lastUsedAt:serverTimestamp()},{merge:true});
return{ok:true,amt,cur};
});
if(!res.ok)return toast(res.msg);
toast(`✅ تم إضافة ${res.amt} ${res.cur}`);
$("code").value="";
}catch(e){toast("خطأ: "+(e.code||e.message||""))}
};
onAuthStateChanged(auth,async()=>{try{await ensure();$("go").disabled=false}catch(e){}});
const NAV={home:"index.html",markets:"markets.html",trade:"traders.html",fav:"friends.html",ast:"assets.html"};
document.getElementById("bnav").addEventListener("click",e=>{
const it=e.target.closest(".bnav-item");
if(!it)return;
[...document.getElementById("bnav").children].forEach(x=>x.classList.remove("active"));
it.classList.add("active");
const url=NAV[it.dataset.nav];
if(url)location.href=url;
});
</script>
</body>
</html>
