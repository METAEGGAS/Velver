<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8" />
<title>EUR/USD Live Chart</title>
<style>
  body {
    margin: 0;
    background: #131722;
    color: #d1d4dc;
    font-family: Arial, sans-serif;
  }
  header {
    background: #1e222d;
    padding: 12px 20px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-bottom: 1px solid #2a2e39;
    flex-wrap: wrap;
    gap: 10px;
  }
  h1 { margin: 0; font-size: 18px; color: #f0f0f0; }
  .price-box { display: flex; gap: 20px; align-items: center; flex-wrap: wrap; }
  .price { font-size: 24px; font-weight: bold; color: #26a69a; }
  .info { font-size: 13px; color: #787b86; }
  #chart { width: 100%; height: calc(100vh - 70px); }
  .status {
    display: inline-block;
    width: 10px; height: 10px;
    background: #26a69a;
    border-radius: 50%;
    animation: pulse 1.5s infinite;
    margin-left: 6px;
  }
  .status.offline { background: #ef5350; }
  @keyframes pulse {
    0%,100% { opacity: 1; }
    50% { opacity: 0.4; }
  }
  #connStatus { font-size: 12px; color: #787b86; }
</style>

<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>

<header>
  <h1>📊 EUR/USD — Live Chart (1M)</h1>
  <div class="price-box">
    <span class="info"><span class="status" id="statusDot"></span> <span id="connStatus">LIVE</span></span>
    <span class="info">Last Price:</span>
    <span class="price" id="livePrice">---</span>
    <span class="info" id="candleCount">Candles: 0</span>
  </div>
</header>

<div id="chart"></div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
  import {
    getFirestore,
    collection,
    onSnapshot,
    query,
    orderBy,
    limit
  } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";

  // ============ إعدادات Firebase ============
  const firebaseConfig = {
    apiKey: "AIzaSyD85Lebi9rKSoDbTAi-IgGxzPC4XjrCscs",
    authDomain: "snsjsjjshs-271bc.firebaseapp.com",
    projectId: "snsjsjjshs-271bc",
    storageBucket: "snsjsjjshs-271bc.firebasestorage.app",
    messagingSenderId: "753273974385",
    appId: "1:753273974385:web:7a3c7049f2d504f87d75d0",
    measurementId: "G-PSGZX896FR"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // ============ إعداد الشارت ============
  const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    layout: {
      background: { color: '#131722' },
      textColor: '#d1d4dc',
    },
    grid: {
      vertLines: { color: '#1e222d' },
      horzLines: { color: '#1e222d' },
    },
    crosshair: { mode: 1 },
    rightPriceScale: {
      borderColor: '#2a2e39',
      autoScale: true,
    },
    timeScale: {
      borderColor: '#2a2e39',
      timeVisible: true,
      secondsVisible: false,
    },
  });

  const candleSeries = chart.addCandlestickSeries({
    upColor: '#26a69a',
    downColor: '#ef5350',
    borderVisible: false,
    wickUpColor: '#26a69a',
    wickDownColor: '#ef5350',
    priceFormat: {
      type: 'price',
      precision: 5,
      minMove: 0.00001,
    },
  });

  // ============ متغيرات إدارة الشموع ============
  const savedCandles = new Map();  // مفتاح: time، قيمة: بيانات الشمعة
  let lastActiveTime = null;       // وقت آخر شمعة نشطة
  let lastPrice = null;

  const priceEl = document.getElementById('livePrice');
  const statusDot = document.getElementById('statusDot');
  const connStatus = document.getElementById('connStatus');
  const candleCountEl = document.getElementById('candleCount');

  // ============ الاستماع المباشر لـ Firestore ============
  // المسار: candles / EURUSD / 1m
  const candlesRef = collection(db, "candles", "EURUSD", "1m");
  const q = query(candlesRef, orderBy("time", "asc"), limit(500));

  onSnapshot(q,
    (snapshot) => {
      statusDot.classList.remove('offline');
      connStatus.textContent = 'LIVE';

      snapshot.docChanges().forEach((change) => {
        const data = change.doc.data();

        // التحقق من صحة البيانات
        if (
          data.time == null ||
          data.open == null ||
          data.high == null ||
          data.low == null ||
          data.close == null
        ) return;

        const candle = {
          time: Number(data.time),
          open: Number(data.open),
          high: Number(data.high),
          low: Number(data.low),
          close: Number(data.close),
          active: data.active === true,
        };

        if (change.type === 'removed') {
          savedCandles.delete(candle.time);
        } else {
          savedCandles.set(candle.time, candle);
        }
      });

      // ترتيب الشموع حسب الوقت
      const sorted = Array.from(savedCandles.values())
        .sort((a, b) => a.time - b.time);

      if (sorted.length === 0) {
        priceEl.textContent = 'لا توجد بيانات';
        return;
      }

      // عرض جميع الشموع على الشارت
      candleSeries.setData(sorted.map(c => ({
        time: c.time,
        open: c.open,
        high: c.high,
        low: c.low,
        close: c.close,
      })));

      // تحديث آخر سعر ومعلومات الواجهة
      const latest = sorted[sorted.length - 1];
      updatePriceDisplay(latest);
      candleCountEl.textContent = `Candles: ${sorted.length}`;

      // احتفظ بمرجع الشمعة النشطة إن وُجدت
      const activeCandle = sorted.find(c => c.active === true);
      lastActiveTime = activeCandle ? activeCandle.time : latest.time;
    },
    (error) => {
      console.error("Firestore error:", error);
      statusDot.classList.add('offline');
      connStatus.textContent = 'OFFLINE';
      priceEl.textContent = 'خطأ في الاتصال';
    }
  );

  // ============ تحديث عرض السعر ============
  function updatePriceDisplay(candle) {
    const price = candle.close;
    priceEl.textContent = price.toFixed(5);

    if (lastPrice !== null) {
      if (price > lastPrice) {
        priceEl.style.color = '#26a69a';
      } else if (price < lastPrice) {
        priceEl.style.color = '#ef5350';
      }
    } else {
      // مقارنة بسعر الافتتاح للشمعة نفسها
      priceEl.style.color = price >= candle.open ? '#26a69a' : '#ef5350';
    }
    lastPrice = price;
  }

  // ============ Resize ============
  window.addEventListener('resize', () => {
    chart.applyOptions({
      width: document.getElementById('chart').clientWidth,
      height: document.getElementById('chart').clientHeight,
    });
  });
</script>

</body>
</html>
