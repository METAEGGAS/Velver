<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Pro Chart</title><style>*{margin:0;padding:0;box-sizing:border-box}html,body{width:100%;height:100%;background:#0d1117;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;overflow:hidden;color:#d1d4dc}#wrap{position:relative;width:100vw;height:100vh;display:flex;flex-direction:column}#bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px;background:#131722;border-bottom:1px solid #1e222d;flex-wrap:wrap;gap:8px;z-index:5}#sym{font-weight:600;font-size:15px;color:#f0f3fa}#info{display:flex;gap:14px;font-size:12px;flex-wrap:wrap}.pill{display:flex;flex-direction:column;gap:2px}.pill span:first-child{color:#787b86;font-size:10px;text-transform:uppercase}.pill span:last-child{font-weight:600}.up{color:#26a69a}.dn{color:#ef5350}#main{flex:1;display:flex;position:relative;min-height:0}#tools{width:44px;background:#131722;border-left:1px solid #1e222d;display:flex;flex-direction:column;padding:6px 4px;gap:2px;z-index:10}.tool{width:36px;height:36px;display:flex;align-items:center;justify-content:center;border-radius:4px;cursor:pointer;color:#b2b5be;transition:all .15s;user-select:none;position:relative}.tool:hover{background:#1e222d;color:#f0f3fa}.tool.active{background:#2962ff;color:#fff}.tool svg{width:18px;height:18px;fill:none;stroke:currentColor;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}.tool .tip{position:absolute;right:44px;top:50%;transform:translateY(-50%);background:#1e222d;color:#f0f3fa;padding:4px 8px;border-radius:3px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .15s;border:1px solid #2a2e39}.tool:hover .tip{opacity:1}.sep{height:1px;background:#1e222d;margin:4px 6px}#chartWrap{flex:1;position:relative;min-width:0}#chart{width:100%;height:100%}#draw{position:absolute;top:0;left:0;pointer-events:none;touch-action:none}#draw.act{pointer-events:auto;cursor:crosshair}#draw.mv{cursor:move}#txtIn{position:absolute;background:#1e222d;color:#f0f3fa;border:1px solid #2962ff;padding:4px 8px;font-size:13px;border-radius:3px;outline:none;display:none;z-index:20;font-family:inherit}#ctx{position:absolute;background:#1e222d;border:1px solid #2a2e39;border-radius:4px;padding:4px;display:none;z-index:30;box-shadow:0 4px 12px rgba(0,0,0,.4)}.ci{padding:6px 14px;font-size:12px;cursor:pointer;color:#d1d4dc;border-radius:3px;display:flex;align-items:center;gap:8px}.ci:hover{background:#2a2e39}.ci.del{color:#ef5350}.sw{display:flex;gap:4px;padding:4px}.sw div{width:18px;height:18px;border-radius:50%;cursor:pointer;border:2px solid transparent}.sw div.on{border-color:#fff}</style></head><body><div id="wrap"><div id="bar"><div id="sym">BTC/USDT · 1m</div><div id="info"><div class="pill"><span>O</span><span id="o">-</span></div><div class="pill"><span>H</span><span id="h">-</span></div><div class="pill"><span>L</span><span id="l">-</span></div><div class="pill"><span>C</span><span id="c">-</span></div><div class="pill"><span>Change</span><span id="ch">-</span></div></div></div><div id="main"><div id="chartWrap"><div id="chart"></div><canvas id="draw"></canvas><input id="txtIn" type="text" placeholder="Text..."><div id="ctx"></div></div><div id="tools">
<div class="tool" data-t="cursor" title="Cursor"><svg viewBox="0 0 24 24"><path d="M5 3l6 18 2-8 8-2z"/></svg><span class="tip">مؤشر</span></div>
<div class="sep"></div>
<div class="tool" data-t="trend"><svg viewBox="0 0 24 24"><path d="M4 20L20 4"/><circle cx="4" cy="20" r="1.5"/><circle cx="20" cy="4" r="1.5"/></svg><span class="tip">خط اتجاه</span></div>

</div></div></div>
<script src="https://unpkg.com/lightweight-charts@5.0.7/dist/lightweight-charts.standalone.production.js"></script><script>
(()=>{const {createChart,CandlestickSeries,CrosshairMode}=LightweightCharts;
const el=document.getElementById('chart');
const chart=createChart(el,{layout:{background:{type:'solid',color:'#0d1117'},textColor:'#d1d4dc',fontSize:12,attributionLogo:false},grid:{vertLines:{color:'#1e222d'},horzLines:{color:'#1e222d'}},crosshair:{mode:CrosshairMode.Normal,vertLine:{color:'#787b86',width:1,style:3,labelBackgroundColor:'#2962ff'},horzLine:{color:'#787b86',width:1,style:3,labelBackgroundColor:'#2962ff'}},rightPriceScale:{borderColor:'#1e222d',scaleMargins:{top:0.1,bottom:0.1}},timeScale:{borderColor:'#1e222d',timeVisible:true,secondsVisible:false,rightOffset:12,barSpacing:8,minBarSpacing:0.5},handleScroll:{mouseWheel:true,pressedMouseMove:true,horzTouchDrag:true,vertTouchDrag:true},handleScale:{axisPressedMouseMove:true,mouseWheel:true,pinch:true},autoSize:true,kineticScroll:{touch:true,mouse:false}});
const series=chart.addSeries(CandlestickSeries,{upColor:'#26a69a',downColor:'#ef5350',borderUpColor:'#26a69a',borderDownColor:'#ef5350',wickUpColor:'#26a69a',wickDownColor:'#ef5350',priceFormat:{type:'price',precision:2,minMove:0.01}});

const Feed={interval:60,price:65000,trend:0,vol:0.0008,bars:[],now(){return Math.floor(Date.now()/1000)},bucket(t){return t-(t%this.interval)},
genHistorical(count){let t=this.bucket(this.now())-count*this.interval;let p=this.price;for(let i=0;i<count;i++){const o=p;if(Math.random()<0.03)this.trend=(Math.random()-0.5)*0.001;const drift=this.trend;const steps=20;let h=o,l=o,c=o;for(let s=0;s<steps;s++){const r=(Math.random()-0.5)*this.vol*2;c=c*(1+r+drift/steps);if(c>h)h=c;if(c<l)l=c}h*=1+Math.random()*this.vol*0.5;l*=1-Math.random()*this.vol*0.5;this.bars.push({time:t,open:o,high:h,low:l,close:c});p=c;t+=this.interval}this.price=p;return this.bars},
tick(){const t=this.now();const b=this.bucket(t);let last=this.bars[this.bars.length-1];if(!last||b>last.time){const openPrice=last?last.close:this.price;last={time:b,open:openPrice,high:openPrice,low:openPrice,close:openPrice};this.bars.push(last);if(Math.random()<0.15)this.trend=(Math.random()-0.5)*0.0008}const r=(Math.random()-0.5)*this.vol*1.2+this.trend*0.3;const newPrice=last.close*(1+r);last.close=newPrice;if(newPrice>last.high)last.high=newPrice;if(newPrice<last.low)last.low=newPrice;this.price=newPrice;return last}};

const $o=document.getElementById('o'),$h=document.getElementById('h'),$l=document.getElementById('l'),$c=document.getElementById('c'),$ch=document.getElementById('ch');
const fmt=n=>n.toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});
function updateInfo(b,prev){$o.textContent=fmt(b.open);$h.textContent=fmt(b.high);$l.textContent=fmt(b.low);$c.textContent=fmt(b.close);const base=prev?prev.close:b.open;const diff=b.close-base;const pct=(diff/base*100);const cls=diff>=0?'up':'dn';const sign=diff>=0?'+':'';$c.className=cls;$ch.className=cls;$ch.textContent=`${sign}${fmt(diff)} (${sign}${pct.toFixed(2)}%)`}

const hist=Feed.genHistorical(500);series.setData(hist);chart.timeScale().scrollToRealTime();updateInfo(hist[hist.length-1],hist[hist.length-2]);
setInterval(()=>{const bar=Feed.tick();series.update(bar);const prev=Feed.bars[Feed.bars.length-2];updateInfo(bar,prev);Draw.render()},1000);
document.addEventListener('gesturestart',e=>e.preventDefault());document.addEventListener('dblclick',e=>e.preventDefault());

/* ============ DRAWING SYSTEM (overlay, لا يمس منطق الشارت) ============ */
const Draw=(()=>{
  const cv=document.getElementById('draw');const cx=cv.getContext('2d');
  const wrap=document.getElementById('chartWrap');
  const txtIn=document.getElementById('txtIn');const ctxMenu=document.getElementById('ctx');
  let tool='cursor';let shapes=[];let sel=null;let drawing=null;let drag=null;let hoverHandle=null;
  const COLOR='#2962ff';const COLOR_SEL='#f0b90b';const HANDLE=5;

  // ---- تحويل الإحداثيات: نخزّن time+price (منطقي) ونحوّل لـ x/y عند الرسم ----
  const ts=chart.timeScale();
  function p2x(time){const x=ts.timeToCoordinate(time);return x!==null?x:null}
  function y2y(price){return series.priceToCoordinate(price)}
  function x2p(x){const t=ts.coordinateToTime(x);return t}
  function y2p(y){return series.coordinateToPrice(y)}
  // للنقاط خارج المدى المرئي: نستخدم logical index + استقراء
  function timeToX(time){let x=ts.timeToCoordinate(time);if(x!==null)return x;const bs=ts.options().barSpacing;const vr=ts.getVisibleLogicalRange();if(!vr)return null;const bars=Feed.bars;if(!bars.length)return null;const first=bars[0].time;const idx=(time-first)/Feed.interval;const cx0=ts.logicalToCoordinate(vr.from);const cx1=ts.logicalToCoordinate(vr.to);if(cx0===null||cx1===null)return null;const px=cx0+(idx-vr.from)*((cx1-cx0)/(vr.to-vr.from));return px}
  function xToTime(x){let t=ts.coordinateToTime(x);if(t!==null)return t;const vr=ts.getVisibleLogicalRange();if(!vr)return null;const cx0=ts.logicalToCoordinate(vr.from);const cx1=ts.logicalToCoordinate(vr.to);if(cx0===null||cx1===null)return null;const logical=vr.from+(x-cx0)/((cx1-cx0)/(vr.to-vr.from));const bars=Feed.bars;if(!bars.length)return null;const first=bars[0].time;return Math.round(first+logical*Feed.interval)}

  function resize(){const r=wrap.getBoundingClientRect();const dpr=window.devicePixelRatio||1;cv.style.width=r.width+'px';cv.style.height=r.height+'px';cv.width=r.width*dpr;cv.height=r.height*dpr;cx.setTransform(dpr,0,0,dpr,0,0);render()}
  new ResizeObserver(resize).observe(wrap);

  // ---- رسم شكل واحد ----
  function pt(s,i){const p=s.pts[i];return{x:timeToX(p.t),y:y2y(p.p)}}
  function drawShape(s){
    const isSel=s===sel;const col=isSel?COLOR_SEL:(s.color||COLOR);
    cx.strokeStyle=col;cx.fillStyle=col;cx.lineWidth=s.w||1.5;cx.setLineDash([]);
    const P=s.pts.map((_,i)=>pt(s,i));
    if(s.type==='trend'){if(P[0].x==null||P[1].x==null)return;cx.beginPath();cx.moveTo(P[0].x,P[0].y);cx.lineTo(P[1].x,P[1].y);cx.stroke()}
    else if(s.type==='hline'){const y=P[0].y;if(y==null)return;cx.beginPath();cx.moveTo(0,y);cx.lineTo(cv.clientWidth,y);cx.stroke();cx.fillStyle='#0d1117';cx.fillRect(cv.clientWidth-70,y-9,68,18);cx.fillStyle=col;cx.font='11px sans-serif';cx.textAlign='right';cx.fillText(fmt(s.pts[0].p),cv.clientWidth-4,y+4)}
    else if(s.type==='vline'){const x=P[0].x;if(x==null)return;cx.beginPath();cx.moveTo(x,0);cx.lineTo(x,cv.clientHeight);cx.stroke()}
    else if(s.type==='rect'){if(P[0].x==null||P[1].x==null)return;const x=Math.min(P[0].x,P[1].x),y=Math.min(P[0].y,P[1].y),w=Math.abs(P[1].x-P[0].x),h=Math.abs(P[1].y-P[0].y);cx.globalAlpha=0.15;cx.fillRect(x,y,w,h);cx.globalAlpha=1;cx.strokeRect(x,y,w,h)}
    else if(s.type==='circle'){if(P[0].x==null||P[1].x==null)return;const cxp=P[0].x,cyp=P[0].y;const r=Math.hypot(P[1].x-cxp,P[1].y-cyp);cx.globalAlpha=0.12;cx.beginPath();cx.arc(cxp,cyp,r,0,Math.PI*2);cx.fill();cx.globalAlpha=1;cx.stroke()}
    else if(s.type==='arrow'){if(P[0].x==null||P[1].x==null)return;cx.beginPath();cx.moveTo(P[0].x,P[0].y);cx.lineTo(P[1].x,P[1].y);cx.stroke();const a=Math.atan2(P[1].y-P[0].y,P[1].x-P[0].x);const sz=10;cx.beginPath();cx.moveTo(P[1].x,P[1].y);cx.lineTo(P[1].x-sz*Math.cos(a-.4),P[1].y-sz*Math.sin(a-.4));cx.lineTo(P[1].x-sz*Math.cos(a+.4),P[1].y-sz*Math.sin(a+.4));cx.closePath();cx.fill()}
    else if(s.type==='fib'){if(P[0].x==null||P[1].x==null)return;const levels=[0,0.236,0.382,0.5,0.618,0.786,1];const p1=s.pts[0].p,p2=s.pts[1].p;const x1=Math.min(P[0].x,P[1].x),x2=Math.max(P[0].x,P[1].x);cx.beginPath();cx.moveTo(P[0].x,P[0].y);cx.lineTo(P[1].x,P[1].y);cx.stroke();cx.font='10px sans-serif';cx.textAlign='left';levels.forEach((lv,i)=>{const price=p1+(p2-p1)*lv;const y=y2y(price);if(y==null)return;const clr=['#787b86','#ef5350','#ff9800','#ffeb3b','#4caf50','#00bcd4','#2962ff'][i];cx.strokeStyle=isSel?COLOR_SEL:clr;cx.globalAlpha=0.8;cx.beginPath();cx.moveTo(x1,y);cx.lineTo(x2,y);cx.stroke();cx.globalAlpha=1;cx.fillStyle=isSel?COLOR_SEL:clr;cx.fillText(lv.toFixed(3)+' ('+fmt(price)+')',x1+4,y-3)})}
    else if(s.type==='measure'){if(P[0].x==null||P[1].x==null)return;const p1=s.pts[0].p,p2=s.pts[1].p;const t1=s.pts[0].t,t2=s.pts[1].t;const diff=p2-p1;const pct=(diff/p1*100);const bars=Math.abs(Math.round((t2-t1)/Feed.interval));const up=diff>=0;const c=up?'#26a69a':'#ef5350';cx.strokeStyle=isSel?COLOR_SEL:c;cx.fillStyle=c;const x=Math.min(P[0].x,P[1].x),y=Math.min(P[0].y,P[1].y),w=Math.abs(P[1].x-P[0].x),h=Math.abs(P[1].y-P[0].y);cx.globalAlpha=0.15;cx.fillRect(x,y,w,h);cx.globalAlpha=1;cx.strokeRect(x,y,w,h);cx.beginPath();cx.moveTo(P[0].x,P[0].y);cx.lineTo(P[1].x,P[1].y);cx.stroke();const mx=(P[0].x+P[1].x)/2,my=(P[0].y+P[1].y)/2;const txt=`${up?'+':''}${fmt(diff)} (${up?'+':''}${pct.toFixed(2)}%) · ${bars} bars`;cx.font='bold 11px sans-serif';const tw=cx.measureText(txt).width;cx.fillStyle='#131722';cx.fillRect(mx-tw/2-6,my-10,tw+12,20);cx.strokeStyle=c;cx.strokeRect(mx-tw/2-6,my-10,tw+12,20);cx.fillStyle=c;cx.textAlign='center';cx.fillText(txt,mx,my+4)}
    else if(s.type==='text'){if(P[0].x==null)return;cx.font='13px sans-serif';cx.textAlign='left';cx.fillStyle=col;const tw=cx.measureText(s.text||'').width;if(isSel){cx.strokeStyle=COLOR_SEL;cx.strokeRect(P[0].x-3,P[0].y-14,tw+6,20)}cx.fillText(s.text||'',P[0].x,P[0].y)}
    // مقابض التحديد
    if(isSel&&s.type!=='text'){P.forEach(p=>{if(p.x==null||p.y==null)return;cx.fillStyle='#fff';cx.strokeStyle=COLOR_SEL;cx.lineWidth=2;cx.beginPath();cx.arc(p.x,p.y,HANDLE,0,Math.PI*2);cx.fill();cx.stroke()})}
  }

  function render(){cx.clearRect(0,0,cv.clientWidth,cv.clientHeight);shapes.forEach(drawShape);if(drawing)drawShape(drawing)}

  // اشتراك بأحداث تغيّر النطاق لإعادة الرسم مع الشارت
  ts.subscribeVisibleTimeRangeChange(render);
  ts.subscribeVisibleLogicalRangeChange(render);
  chart.subscribeCrosshairMove(()=>{});// no-op keep alive

  // ---- Hit testing ----
  function distToSeg(px,py,ax,ay,bx,by){const dx=bx-ax,dy=by-ay;const L=dx*dx+dy*dy;if(!L)return Math.hypot(px-ax,py-ay);let t=((px-ax)*dx+(py-ay)*dy)/L;t=Math.max(0,Math.min(1,t));return Math.hypot(px-(ax+t*dx),py-(ay+t*dy))}
  function hitShape(s,x,y){const P=s.pts.map((_,i)=>pt(s,i));const th=7;
    if(s.type==='trend'||s.type==='arrow'||s.type==='measure'){if(P[0].x==null||P[1].x==null)return false;if(s.type==='measure'){const xa=Math.min(P[0].x,P[1].x),ya=Math.min(P[0].y,P[1].y),w=Math.abs(P[1].x-P[0].x),h=Math.abs(P[1].y-P[0].y);if(x>=xa&&x<=xa+w&&y>=ya&&y<=ya+h)return true}return distToSeg(x,y,P[0].x,P[0].y,P[1].x,P[1].y)<th}
    if(s.type==='hline')return Math.abs(y-P[0].y)<th;
    if(s.type==='vline')return Math.abs(x-P[0].x)<th;
    if(s.type==='rect'){const xa=Math.min(P[0].x,P[1].x),ya=Math.min(P[0].y,P[1].y),w=Math.abs(P[1].x-P[0].x),h=Math.abs(P[1].y-P[0].y);return x>=xa-th&&x<=xa+w+th&&y>=ya-th&&y<=ya+h+th&&(Math.abs(x-xa)<th||Math.abs(x-(xa+w))<th||Math.abs(y-ya)<th||Math.abs(y-(ya+h))<th||(x>=xa&&x<=xa+w&&y>=ya&&y<=ya+h))}
    if(s.type==='circle'){const r=Math.hypot(P[1].x-P[0].x,P[1].y-P[0].y);const d=Math.hypot(x-P[0].x,y-P[0].y);return Math.abs(d-r)<th||d<r}
    if(s.type==='fib'){const p1=s.pts[0].p,p2=s.pts[1].p;const x1=Math.min(P[0].x,P[1].x),x2=Math.max(P[0].x,P[1].x);if(x<x1-th||x>x2+th)return false;return[0,0.236,0.382,0.5,0.618,0.786,1].some(lv=>{const py=y2y(p1+(p2-p1)*lv);return py!=null&&Math.abs(y-py)<th})}
    if(s.type==='text'){if(P[0].x==null)return false;cx.font='13px sans-serif';const tw=cx.measureText(s.text||'').width;return x>=P[0].x-3&&x<=P[0].x+tw+3&&y>=P[0].y-14&&y<=P[0].y+6}
    return false}
  function hitHandle(s,x,y){if(!s)return -1;for(let i=0;i<s.pts.length;i++){const p=pt(s,i);if(p.x==null||p.y==null)continue;if(Math.hypot(x-p.x,y-p.y)<=HANDLE+3)return i}return -1}

  // ---- Mouse/Touch ----
  function getXY(e){const r=cv.getBoundingClientRect();const t=e.touches?e.touches[0]:e;return{x:t.clientX-r.left,y:t.clientY-r.top}}
  function makePt(x,y){const t=xToTime(x);const p=y2p(y);return{t:t,p:p}}

  cv.addEventListener('mousedown',onDown);cv.addEventListener('mousemove',onMove);window.addEventListener('mouseup',onUp);
  cv.addEventListener('touchstart',e=>{e.preventDefault();onDown(e)},{passive:false});
  cv.addEventListener('touchmove',e=>{e.preventDefault();onMove(e)},{passive:false});
  cv.addEventListener('touchend',onUp);
  cv.addEventListener('contextmenu',e=>{e.preventDefault();const{x,y}=getXY(e);const s=findShape(x,y);if(s){sel=s;showCtx(e.clientX,e.clientY,s);render()}});

  function findShape(x,y){for(let i=shapes.length-1;i>=0;i--)if(hitShape(shapes[i],x,y))return shapes[i];return null}

  function onDown(e){const{x,y}=getXY(e);hideCtx();
    if(tool==='text'&&!drawing){const pt0=makePt(x,y);if(pt0.t==null||pt0.p==null)return;const s={type:'text',pts:[pt0],text:'',color:COLOR};showTextInput(x,y,s);return}
    if(tool==='cursor'){const hh=hitHandle(sel,x,y);if(hh>=0){drag={mode:'handle',idx:hh,s:sel};return}const s=findShape(x,y);if(s){sel=s;const p0=pt(s,0);drag={mode:'move',s:s,ox:x,oy:y,orig:s.pts.map(p=>({...p}))}}else{sel=null}render();return}
    // start drawing
    const pt0=makePt(x,y);if(pt0.t==null||pt0.p==null)return;
    if(tool==='hline'||tool==='vline'){shapes.push({type:tool,pts:[pt0],color:COLOR});setTool('cursor');render();return}
    drawing={type:tool==='measure'?'measure':tool,pts:[pt0,pt0],color:COLOR}
  }
  function onMove(e){const{x,y}=getXY(e);
    if(drawing){const p=makePt(x,y);if(p.t!=null&&p.p!=null)drawing.pts[1]=p;render();return}
    if(drag){const p=makePt(x,y);if(p.t==null||p.p==null)return;if(drag.mode==='handle'){drag.s.pts[drag.idx]=p}else if(drag.mode==='move'){const t0=xToTime(drag.ox),p0=y2p(drag.oy);if(t0==null||p0==null)return;const dt=p.t-t0,dp=p.p-p0;drag.s.pts=drag.orig.map(o=>({t:o.t+dt,p:o.p+dp}))}render();return}
    // hover cursor
    if(tool==='cursor'){const hh=hitHandle(sel,x,y);const s=hh>=0?sel:findShape(x,y);cv.classList.toggle('mv',!!s)}
  }
  function onUp(){if(drawing){shapes.push(drawing);sel=drawing;drawing=null;setTool('cursor');render()}drag=null}

  // ---- Text input ----
  function showTextInput(x,y,s){const r=wrap.getBoundingClientRect();txtIn.style.left=(x)+'px';txtIn.style.top=(y-10)+'px';txtIn.style.display='block';txtIn.value='';txtIn.focus();const commit=()=>{if(txtIn.value.trim()){s.text=txtIn.value;shapes.push(s);sel=s}txtIn.style.display='none';txtIn.onblur=null;txtIn.onkeydown=null;setTool('cursor');render()};txtIn.onblur=commit;txtIn.onkeydown=ev=>{if(ev.key==='Enter')commit();else if(ev.key==='Escape'){txtIn.style.display='none';setTool('cursor')}}}

  // ---- Context menu ----
  function showCtx(x,y,s){ctxMenu.innerHTML='';const colors=['#2962ff','#f0b90b','#26a69a','#ef5350','#ab47bc','#ffffff'];const sw=document.createElement('div');sw.className='sw';colors.forEach(c=>{const d=document.createElement('div');d.style.background=c;if(s.color===c)d.className='on';d.onclick=()=>{s.color=c;hideCtx();render()};sw.appendChild(d)});ctxMenu.appendChild(sw);const del=document.createElement('div');del.className='ci del';del.textContent='🗑 حذف';del.onclick=()=>{shapes=shapes.filter(x=>x!==s);sel=null;hideCtx();render()};ctxMenu.appendChild(del);const wr=wrap.getBoundingClientRect();ctxMenu.style.left=(x-wr.left)+'px';ctxMenu.style.top=(y-wr.top)+'px';ctxMenu.style.display='block'}
  function hideCtx(){ctxMenu.style.display='none'}
  document.addEventListener('click',e=>{if(!ctxMenu.contains(e.target))hideCtx()});
  document.addEventListener('keydown',e=>{if((e.key==='Delete'||e.key==='Backspace')&&sel&&document.activeElement!==txtIn){shapes=shapes.filter(x=>x!==sel);sel=null;render()}if(e.key==='Escape'){sel=null;drawing=null;setTool('cursor');render()}});

  // ---- Toolbar ----
  function setTool(t){tool=t;document.querySelectorAll('.tool').forEach(e=>e.classList.toggle('active',e.dataset.t===t));const active=t!=='cursor';cv.classList.toggle('act',active);if(!active)cv.classList.remove('mv')}
  document.querySelectorAll('.tool').forEach(e=>{e.onclick=()=>{const t=e.dataset.t;if(t==='clear'){if(confirm('مسح جميع الرسومات؟')){shapes=[];sel=null;render()}return}setTool(t)}});
  setTool('cursor');resize();

  return{render}
})();
})();
</script></body></html>
