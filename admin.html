<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Pro Trading</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Arial}body{background:#0d1421;color:#d1d4dc;overflow:hidden;height:100vh}#app{display:flex;flex-direction:column;height:100vh}#top{background:#131722;border-bottom:1px solid #2a2e39;padding:8px 12px;display:flex;align-items:center;gap:12px;flex-wrap:wrap}#pairs{display:flex;gap:4px}.pb{background:#1e222d;border:1px solid #2a2e39;color:#d1d4dc;padding:6px 14px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600;transition:.2s}.pb:hover{background:#2a2e39}.pb.a{background:#2962ff;border-color:#2962ff;color:#fff}#info{margin-right:auto;display:flex;gap:16px;align-items:center;font-size:13px}#pr{font-size:22px;font-weight:700;color:#26a69a}#ch{font-size:13px}#user{background:#1e222d;padding:6px 12px;border-radius:4px;font-size:12px}#auth{background:#2962ff;border:none;color:#fff;padding:7px 16px;border-radius:4px;cursor:pointer;font-size:13px;font-weight:600}#auth:hover{background:#1e53e5}#main{flex:1;position:relative;background:#0d1421}canvas{position:absolute;top:0;left:0;display:block}#ov{position:absolute;top:10px;left:10px;background:rgba(19,23,34,.9);padding:8px 12px;border-radius:4px;font-size:11px;line-height:1.6;pointer-events:none;border:1px solid #2a2e39}#st{position:absolute;bottom:10px;left:10px;background:rgba(19,23,34,.9);padding:6px 10px;border-radius:4px;font-size:11px;border:1px solid #2a2e39}.g{color:#26a69a}.r{color:#ef5350}#modal{position:fixed;inset:0;background:rgba(0,0,0,.7);display:none;align-items:center;justify-content:center;z-index:100}#modal.s{display:flex}#box{background:#1e222d;padding:24px;border-radius:8px;width:320px;border:1px solid #2a2e39}#box h3{margin-bottom:16px;color:#fff}#box input{width:100%;padding:10px;margin-bottom:10px;background:#131722;border:1px solid #2a2e39;color:#fff;border-radius:4px;font-size:13px}#box button{width:100%;padding:10px;background:#2962ff;border:none;color:#fff;border-radius:4px;cursor:pointer;font-weight:600;margin-bottom:8px}#box .cl{background:#2a2e39}#err{color:#ef5350;font-size:12px;margin-bottom:8px;min-height:14px}</style></head><body><div id="app"><div id="top"><div id="pairs"></div><div id="info"><span>السعر: <span id="pr">-</span></span><span id="ch">-</span></div><span id="user">ضيف</span><button id="auth">دخول</button></div><div id="main"><canvas id="c"></canvas><div id="ov"></div><div id="st"></div></div></div><div id="modal"><div id="box"><h3>تسجيل الدخول</h3><div id="err"></div><input id="em" type="email" placeholder="البريد"><input id="pw" type="password" placeholder="كلمة المرور"><button id="li">دخول</button><button id="sg">إنشاء حساب</button><button id="cn" class="cl">إلغاء</button></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";import{getAuth,signInWithEmailAndPassword,createUserWithEmailAndPassword,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";import{getFirestore,doc,setDoc,getDoc,collection,addDoc,query,orderBy,limit,getDocs,runTransaction}from"https://www.gstatic.com/firebasejs/12.16.0/firebase-firestore.js";const fc={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"};const app=initializeApp(fc),auth=getAuth(app),db=getFirestore(app);const PAIRS=[{s:"BTC/USD",b:65000,v:.002},{s:"ETH/USD",b:3200,v:.003},{s:"EUR/USD",b:1.085,v:.0008}];let cur=0,candles=[],live=null,user=null,mgr=null,lastMin=-1,anim=0;const cv=document.getElementById("c"),ctx=cv.getContext("2d"),ov=document.getElementById("ov"),st=document.getElementById("st");const pb=document.getElementById("pairs");PAIRS.forEach((p,i)=>{const b=document.createElement("button");b.className="pb"+(i===0?" a":"");b.textContent=p.s;b.onclick=()=>switchPair(i);pb.appendChild(b)});function fit(){const m=document.getElementById("main"),d=window.devicePixelRatio||1;cv.width=m.clientWidth*d;cv.height=m.clientHeight*d;cv.style.width=m.clientWidth+"px";cv.style.height=m.clientHeight+"px";ctx.setTransform(d,0,0,d,0,0)}window.addEventListener("resize",fit);fit();function pid(){return"pair_"+cur}async function loadCandles(){const p=PAIRS[cur];const q=query(collection(db,"charts",pid(),"candles"),orderBy("t","desc"),limit(200));const s=await getDocs(q);candles=s.docs.map(d=>d.data()).reverse();if(candles.length===0){const now=Math.floor(Date.now()/60000)*60000;let pr=p.b;for(let i=50;i>0;i--){const o=pr,cl=pr*(1+(Math.random()-.5)*p.v),h=Math.max(o,cl)*(1+Math.random()*p.v*.5),l=Math.min(o,cl)*(1-Math.random()*p.v*.5);candles.push({t:now-i*60000,o,h,l,c:cl,seed:true});pr=cl}}}async function getState(){const r=doc(db,"charts",pid(),"meta","state");const s=await getDoc(r);return s.exists()?s.data():null}async function claimManager(){if(!user)return false;const r=doc(db,"charts",pid(),"meta","state");try{await runTransaction(db,async tx=>{const s=await tx.get(r);const now=Date.now();if(!s.exists()||!s.data().mgr||(now-(s.data().hb||0)>30000)){tx.set(r,{mgr:user.uid,hb:now,lastMin:s.exists()?s.data().lastMin||-1:-1},{merge:true});mgr=user.uid}else{mgr=s.data().mgr}});return mgr===user.uid}catch(e){return false}}async function heartbeat(){if(!user||mgr!==user.uid)return;try{await setDoc(doc(db,"charts",pid(),"meta","state"),{hb:Date.now()},{merge:true})}catch(e){}}setInterval(heartbeat,10000);async function saveCandle(c){try{await addDoc(collection(db,"charts",pid(),"candles"),c);await setDoc(doc(db,"charts",pid(),"meta","state"),{lastMin:Math.floor(c.t/60000),lastClose:c.c},{merge:true})}catch(e){}}function startLive(){const p=PAIRS[cur];const now=Date.now();const minStart=Math.floor(now/60000)*60000;const base=candles.length?candles[candles.length-1].c:p.b;live={t:minStart,o:base,h:base,l:base,c:base};lastMin=Math.floor(minStart/60000)}function tick(){if(!live)return;const p=PAIRS[cur];const now=Date.now();const cm=Math.floor(now/60000);if(cm>lastMin){const closed={...live};candles.push(closed);if(candles.length>200)candles.shift();if(user&&mgr===user.uid)saveCandle(closed);const ms=cm*60000;live={t:ms,o:closed.c,h:closed.c,l:closed.c,c:closed.c};lastMin=cm}else{const drift=(Math.random()-.5)*p.v*live.c*.15;live.c=Math.max(.0001,live.c+drift);live.h=Math.max(live.h,live.c);live.l=Math.min(live.l,live.c)}}setInterval(()=>{if(user&&mgr===user.uid&&live)tick()},200);async function syncLive(){if(user&&mgr===user.uid)return;const s=await getState();if(!s)return;const q=query(collection(db,"charts",pid(),"candles"),orderBy("t","desc"),limit(1));const snap=await getDocs(q);if(!snap.empty){const last=snap.docs[0].data();if(!candles.length||candles[candles.length-1].t<last.t){candles.push(last);if(candles.length>200)candles.shift()}}}setInterval(syncLive,3000);function draw(){const w=cv.clientWidth,h=cv.clientHeight;ctx.fillStyle="#0d1421";ctx.fillRect(0,0,w,h);const pl=60,pr=10,pt=20,pbt=30;const cw=w-pl-pr,ch=h-pt-pbt;const all=[...candles];if(live)all.push(live);if(!all.length)return;const vis=all.slice(-80);let mn=Infinity,mx=-Infinity;vis.forEach(c=>{mn=Math.min(mn,c.l);mx=Math.max(mx,c.h)});const pad=(mx-mn)*.1;mn-=pad;mx+=pad;const yp=v=>pt+(mx-v)/(mx-mn)*ch;const bw=cw/vis.length*.7;const sp=cw/vis.length;ctx.strokeStyle="#1e222d";ctx.lineWidth=1;ctx.font="11px Arial";ctx.fillStyle="#787b86";for(let i=0;i<=5;i++){const y=pt+ch*i/5;const v=mx-(mx-mn)*i/5;ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(w-pr,y);ctx.stroke();ctx.fillText(v.toFixed(v<10?4:2),5,y+4)}vis.forEach((c,i)=>{const x=pl+i*sp+sp/2;const up=c.c>=c.o;const isLive=live&&c.t===live.t;let col=up?"#26a69a":"#ef5350";if(!live&&i===vis.length-1){col="#ffb74d";const puls=Math.sin(anim*.05)*.3+.7;ctx.globalAlpha=puls}ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(x,yp(c.h));ctx.lineTo(x,yp(c.l));ctx.stroke();const bt=yp(Math.max(c.o,c.c)),bb=yp(Math.min(c.o,c.c));const bh=Math.max(1,bb-bt);ctx.fillRect(x-bw/2,bt,bw,bh);ctx.globalAlpha=1;if(isLive){ctx.strokeStyle="#fff";ctx.lineWidth=.5;ctx.strokeRect(x-bw/2,bt,bw,bh)}});if(all.length){const lc=all[all.length-1];const y=yp(lc.c);ctx.strokeStyle=live?"#2962ff":"#ffb74d";ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(pl,y);ctx.lineTo(w-pr,y);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle=live?"#2962ff":"#ffb74d";ctx.fillRect(w-pr-55,y-10,55,20);ctx.fillStyle="#fff";ctx.font="bold 11px Arial";ctx.textAlign="center";ctx.fillText(lc.c.toFixed(lc.c<10?4:2),w-pr-27,y+4);ctx.textAlign="left"}ctx.fillStyle="#787b86";ctx.font="10px Arial";const step=Math.ceil(vis.length/8);vis.forEach((c,i)=>{if(i%step===0){const x=pl+i*sp+sp/2;const d=new Date(c.t);ctx.fillText(d.getHours().toString().padStart(2,"0")+":"+d.getMinutes().toString().padStart(2,"0"),x-15,h-10)}});const lastC=all[all.length-1];const first=vis[0];const chg=lastC.c-first.o;const chp=chg/first.o*100;document.getElementById("pr").textContent=lastC.c.toFixed(lastC.c<10?4:2);document.getElementById("pr").className=chg>=0?"g":"r";const chE=document.getElementById("ch");chE.textContent=(chg>=0?"+":"")+chg.toFixed(4)+" ("+(chg>=0?"+":"")+chp.toFixed(2)+"%)";chE.className=chg>=0?"g":"r";ov.innerHTML="<b>"+PAIRS[cur].s+"</b><br>O: "+lastC.o.toFixed(4)+"<br>H: "+lastC.h.toFixed(4)+"<br>L: "+lastC.l.toFixed(4)+"<br>C: "+lastC.c.toFixed(4);let stt="";if(!user)stt="🔒 غير مسجل - شمعة متوقفة";else if(mgr===user.uid)stt="🟢 مدير الشارت - شموع مباشرة";else stt="👁 مشاهد - مزامنة من السحابة";st.textContent=stt;anim++}function loop(){draw();requestAnimationFrame(loop)}loop();async function switchPair(i){cur=i;document.querySelectorAll(".pb").forEach((b,j)=>b.classList.toggle("a",i===j));live=null;mgr=null;await loadCandles();if(user){const ok=await claimManager();if(ok)startLive();else{const s=await getState();if(s&&s.mgr)startLive()}}}onAuthStateChanged(auth,async u=>{user=u;document.getElementById("user").textContent=u?u.email:"ضيف";document.getElementById("auth").textContent=u?"خروج":"دخول";await loadCandles();if(u){const ok=await claimManager();if(ok)startLive();else{const s=await getState();if(s&&s.mgr)startLive()}}else{live=null;mgr=null}});document.getElementById("auth").onclick=()=>{if(user)signOut(auth);else document.getElementById("modal").classList.add("s")};document.getElementById("cn").onclick=()=>document.getElementById("modal").classList.remove("s");document.getElementById("li").onclick=async()=>{const e=document.getElementById("em").value,p=document.getElementById("pw").value;try{await signInWithEmailAndPassword(auth,e,p);document.getElementById("modal").classList.remove("s");document.getElementById("err").textContent=""}catch(x){document.getElementById("err").textContent=x.message}};document.getElementById("sg").onclick=async()=>{const e=document.getElementById("em").value,p=document.getElementById("pw").value;try{await createUserWithEmailAndPassword(auth,e,p);document.getElementById("modal").classList.remove("s");document.getElementById("err").textContent=""}catch(x){document.getElementById("err").textContent=x.message}};</script></body></html>
