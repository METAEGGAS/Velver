<!doctype html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><title>الإحالة</title><link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin><link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Arabic:wght@400;500;600;700&display=swap" rel="stylesheet"><style>*{box-sizing:border-box;margin:0;padding:0}html,body{min-height:100%;background:#000;font-family:"Noto Sans Arabic",system-ui}body{color:#fff}.a{min-height:100vh;background:#000;padding:18px 14px 28px}.c{max-width:720px;margin:auto}.card{background:#1f1f1f;border:1px solid rgba(255,255,255,.08);border-radius:22px;padding:16px;box-shadow:0 8px 30px rgba(0,0,0,.35)}.sp{height:18px}.qrw{display:flex;justify-content:center}.qr{width:min(100%,330px);aspect-ratio:1/1;background:#fff;border-radius:24px;padding:18px;display:block;object-fit:contain}.row{display:flex;align-items:center;justify-content:space-between;gap:12px;background:#202020;border:1px solid rgba(255,255,255,.07);border-radius:16px;padding:14px 12px;margin-top:14px}.lab{font-size:13px;color:#d8d8d8;opacity:.9}.val{font-size:17px;color:#fff;line-height:1.4;word-break:break-all}.btn{border:0;background:#d1007c;color:#fff;border-radius:999px;padding:11px 16px;font:700 15px "Noto Sans Arabic";cursor:pointer;white-space:nowrap}.hd{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}.hd h2{font-size:17px}.info{font-size:13px;color:#ff4fa6}.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:0;border:1px solid rgba(255,255,255,.08);border-radius:18px;overflow:hidden;background:#1d1d1d}.st{padding:16px 10px;text-align:center;border-left:1px solid rgba(255,255,255,.06)}.st:last-child{border-left:0}.n{font-size:34px;line-height:1.1}.t1{font-size:16px;margin-top:6px}.t2{font-size:13px;color:#c7c7c7;margin-top:2px}.list{margin-top:12px;display:grid;gap:10px}.it{display:flex;justify-content:space-between;align-items:center;background:#202020;border:1px solid rgba(255,255,255,.06);border-radius:14px;padding:12px}.nm{font-size:15px}.sm{font-size:12px;color:#bbb;margin-top:3px}.tag{background:#2b2b2b;border:1px solid rgba(255,255,255,.08);padding:6px 10px;border-radius:999px;font-size:12px}.emp{padding:16px;text-align:center;color:#aaa}.topbar{max-width:720px;margin:0 auto 12px;display:flex;justify-content:space-between;align-items:center}.topbar a,.topbar button{border:0;background:#1f1f1f;color:#fff;padding:10px 14px;border-radius:12px;text-decoration:none;font:600 14px "Noto Sans Arabic";cursor:pointer}@media(max-width:640px){.stats{grid-template-columns:repeat(2,1fr)}.st:nth-child(2),.st:nth-child(4){border-left:0}.st:nth-child(-n+2){border-bottom:1px solid rgba(255,255,255,.06)}}</style></head><body><div class="a"><div class="topbar"><a href="index.html">الرئيسية</a><button id="logout">خروج</button></div><div class="c"><div class="card"><div class="qrw"><img id="qr" class="qr" alt="QR"></div><div class="row"><div><div class="lab">شفرة الدعوة</div><div id="code" class="val">...</div></div><button class="btn" id="copyCode">ينسخ</button></div><div class="row"><div style="min-width:0"><div class="lab">رابط المشاركة</div><div id="link" class="val">...</div></div><button class="btn" id="copyLink">ينسخ</button></div></div><div class="sp"></div><div class="card"><div class="hd"><h2>أجوري</h2><div class="info">وصف المستوى</div></div><div class="stats"><div class="st"><div id="vip" class="n">VIP0</div><div class="t2">الحالي VIP مستوى</div></div><div class="st"><div id="lv" class="n">LV0</div><div class="t2">مستوى الفريق</div></div><div class="st"><div id="direct" class="n">0</div><div class="t2">مدعو</div></div><div class="st"><div id="income" class="n">0</div><div class="t2">دخل الدعوة</div></div><div class="st"><div id="team" class="n">0</div><div class="t2">حجم الفريق</div></div></div></div><div class="sp"></div><div class="card"><div class="hd"><h2>سجل الإحالات</h2><div class="info" id="cnt">0</div></div><div id="list" class="list"><div class="emp">جاري التحميل...</div></div></div></div></div><script type="module">import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";import{getAuth,onAuthStateChanged,signOut}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";import{getFirestore,doc,getDoc,setDoc,serverTimestamp,collection,getDocs,query,where,limit,increment}from"https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";const FB={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d",measurementId:"G-08BR6LN6PT"},app=initializeApp(FB),auth=getAuth(app),db=getFirestore(app),$=s=>document.querySelector(s),REF_PATH="/";async function genInvCode(uid){for(let i=0;i<10;i++){let c=String(Math.floor(100000+Math.random()*900000)),q=await getDocs(query(collection(db,"users"),where("inviteCode","==",c),limit(1)));if(q.empty){await setDoc(doc(db,"users",uid),{inviteCode:c,inviteCodeCreatedAt:serverTimestamp()},{merge:1});return c}}let c=uid.slice(-6).toUpperCase();await setDoc(doc(db,"users",uid),{inviteCode:c,inviteCodeCreatedAt:serverTimestamp()},{merge:1});return c}async function ensureInvCode(uid){try{let r=await getDoc(doc(db,"users",uid));if(r.exists()&&r.data().inviteCode)return r.data().inviteCode}catch(e){}return await genInvCode(uid)}function fmtDate(x){try{let d=x?.toDate?x.toDate():new Date(x);return d.toLocaleString("ar-EG")}catch(e){return"-"}}async function load(u){let ur=doc(db,"users",u.uid),ud=(await getDoc(ur)).data()||{},code=await ensureInvCode(u.uid),link=location.origin+REF_PATH+"?ref="+code;$("#code").textContent=code;$("#link").textContent=link;$("#qr").src="https://api.qrserver.com/v1/create-qr-code/?size=500x500&data="+encodeURIComponent(link);$("#vip").textContent=ud.vip||"VIP0";$("#lv").textContent=ud.teamLevel||"LV0";$("#income").textContent=ud.inviteIncome||0;let refs=[];try{let q1=await getDocs(collection(db,"users",u.uid,"referrals"));q1.forEach(d=>refs.push({id:d.id,...d.data()}))}catch(e){}if(!refs.length)try{let q2=await getDocs(query(collection(db,"users"),where("inviterUid","==",u.uid)));q2.forEach(d=>refs.push({id:d.id,...d.data()}))}catch(e){}let map={},arr=refs.filter(v=>!map[v.uid||v.id]&&(map[v.uid||v.id]=1)).sort((a,b)=>(b.createdAt?.seconds||0)-(a.createdAt?.seconds||0));$("#direct").textContent=ud.directCount??arr.length;$("#team").textContent=ud.teamCount??arr.length;$("#cnt").textContent=arr.length;$("#list").innerHTML=arr.length?arr.map(v=>`<div class=it><div><div class=nm>${v.email||((v.phoneCode||"")+(" "+(v.phone||""))).trim()||v.uid||"مستخدم"}</div><div class=sm>${fmtDate(v.createdAt)}${v.inviteCode?" • "+v.inviteCode:""}</div></div><div class=tag>${v.status||"direct"}</div></div>`).join(""):'<div class=emp>لا يوجد سجل بعد</div>'}onAuthStateChanged(auth,u=>u?load(u):location.replace(REF_PATH));copyCode.onclick=()=>navigator.clipboard.writeText(code.textContent);copyLink.onclick=()=>navigator.clipboard.writeText(link.textContent);logout.onclick=()=>signOut(auth).then(()=>location.replace(REF_PATH));</script></body></html>
