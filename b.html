<!doctype html><html lang="ar" dir="rtl"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>المعارك</title><style>*{box-sizing:border-box}html,body{margin:0;background:#111a28;color:#fff;font-family:system-ui,-apple-system,"Segoe UI",Tahoma,Arial,sans-serif}body{min-height:100vh;display:flex;justify-content:center}button{font:inherit;border:0;outline:0;cursor:pointer}.app{width:min(100%,430px);min-height:100vh;background:linear-gradient(180deg,#121b29 0,#111a28 100%);overflow:hidden}.top{display:flex;align-items:center;justify-content:space-between;padding:18px 16px 10px}.top h1{margin:0;font-size:25px;font-weight:800;text-decoration:underline;text-underline-offset:4px}.ico{width:24px;height:24px;position:relative;opacity:.9;background:none}.ico:before,.ico:after,.ico i{content:"";position:absolute;height:2px;background:#b9c5d6;border-radius:9px}.ico.l:before{width:14px;left:2px;top:5px}.ico.l i{width:10px;left:2px;top:11px}.ico.l:after{width:14px;left:2px;top:17px}.ico.r:before{width:14px;right:2px;top:5px}.ico.r i{width:9px;right:2px;top:11px}.ico.r:after{width:14px;right:2px;top:17px}.tabs{display:grid;grid-template-columns:repeat(3,1fr);align-items:end;margin-top:2px;border-bottom:1px solid rgba(255,255,255,.07)}.tab{height:50px;background:none;color:#c7d2e0;opacity:.88}.tab.active{height:58px;color:#fff;background:linear-gradient(180deg,#314766,#2a3d5b);border-radius:16px 16px 0 0;box-shadow:inset 0 1px 0 rgba(255,255,255,.05)}.sub{margin:24px 16px 18px;text-align:center;font-size:18px;font-weight:700}.card{margin:0 14px 20px;background:linear-gradient(180deg,#33496a,#2b3f5f 72%,#2a3e5d);border-radius:24px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,.25),inset 0 0 0 1px rgba(255,255,255,.04)}.bodyx{display:flex;flex-direction:row-reverse;gap:14px;align-items:center;padding:16px 14px 14px}.txt{flex:1;text-align:center}.ttl{margin:0 0 8px;font-size:25px;font-weight:500}.st{margin:0 0 14px;color:#d0daea;font-size:14px}.lst{list-style:none;padding:0;margin:0}.lst li{display:flex;justify-content:center;align-items:center;gap:7px;margin:6px 0;color:#edf3ff;font-size:14px}.lst span{font-size:19px;line-height:1}.art{width:140px;height:162px;border-radius:18px;position:relative;overflow:hidden;background:linear-gradient(145deg,#495d85,#314766);box-shadow:inset 0 0 0 1px rgba(255,255,255,.05)}.art:before{content:"";position:absolute;inset:0;background:repeating-linear-gradient(135deg,rgba(255,255,255,.03) 0 2px,transparent 2px 6px);opacity:.7}.social .art:after{content:"";position:absolute;left:40px;bottom:10px;width:55px;height:96px;background:linear-gradient(180deg,rgba(255,255,255,.22),rgba(255,255,255,0));clip-path:polygon(35% 0,65% 0,100% 100%,0 100%);opacity:.55}.ball{position:absolute;border-radius:50%;box-shadow:inset -8px -10px 18px rgba(0,0,0,.18),inset 6px 6px 12px rgba(255,255,255,.18)}.ball:before,.ball:after{content:"";position:absolute;background:#fff;border-radius:50%}.ball:before{width:5px;height:5px;top:11px;left:12px}.ball:after{width:5px;height:5px;top:11px;right:12px}.smile{position:absolute;left:50%;bottom:11px;transform:translateX(-50%);width:20px;height:9px;border:3px solid #fff;border-top:0;border-left-color:transparent;border-right-color:transparent;border-bottom-left-radius:14px;border-bottom-right-radius:14px;opacity:.95}.b1{width:34px;height:34px;right:15px;top:18px;background:#48c86c}.b2{width:32px;height:32px;right:43px;top:17px;background:#ff8e23}.b3{width:38px;height:38px;right:67px;top:28px;background:#f05127}.b4{width:41px;height:41px;right:21px;top:44px;background:#a23bff}.b5{width:59px;height:59px;right:42px;bottom:22px;background:#33b7ff}.private .art{background:linear-gradient(145deg,#41577e,#2d4363)}.private .art .bolt{position:absolute;inset:22px 41px 22px 41px;background:linear-gradient(180deg,#d7e4ff,#90b5ff);clip-path:polygon(48% 0,100% 0,58% 38%,100% 38%,27% 100%,45% 58%,0 58%);opacity:.9;filter:drop-shadow(0 0 8px rgba(157,203,255,.45))}.private .art .p1{width:56px;height:56px;right:52px;bottom:22px;background:#32b6ff}.private .art .p2{width:52px;height:52px;right:13px;bottom:26px;background:#ff951d}.private .art .spark{position:absolute;width:10px;height:10px;background:#c9dfff;clip-path:polygon(50% 0,64% 37%,100% 50%,64% 63%,50% 100%,36% 63%,0 50%,36% 37%);opacity:.85}.private .art .s1{right:29px;top:55px}.private .art .s2{right:63px;top:45px;width:8px;height:8px}.btn{display:block;width:100%;padding:16px 12px;text-align:center;font-size:16px;font-weight:700}.pri{background:linear-gradient(180deg,#33afff,#2698f3);color:#f6ffef}.split{display:grid;grid-template-columns:1fr 1fr}.split .sec{background:#2a3d5a;color:#fff}.split .pri{border-radius:0}.split .sec,.split .pri{border-top:1px solid rgba(255,255,255,.06)}@media (max-width:360px){.ttl{font-size:22px}.art{width:124px;height:148px}.sub{font-size:17px}}</style></head><body><div class="app"><header class="top"><button class="ico r" aria-label="menu"><i></i></button><h1>المعارك</h1><button class="ico l" aria-label="menu"><i></i></button></header><nav class="tabs"><button class="tab active">المعارك</button><button class="tab">خاصة</button><button class="tab">سجل</button></nav><p class="sub">استكشف أوضاع المعارك المختلفة</p><section class="card social"><div class="bodyx"><div class="art"><span class="ball b1"></span><span class="ball b2"></span><span class="ball b3"></span><span class="ball b4"></span><span class="ball b5"><i class="smile"></i></span></div><div class="txt"><h2 class="ttl">Social Sprint</h2><p class="st">جولة تنافسية سريعة</p><ul class="lst"><li><span>🕒</span>جولة واحدة</li><li><span>👥</span>متاحة للجميع</li><li><span>🎯</span>الهدف: تحقيق المركز الأول</li></ul></div></div><button class="btn pri">انضم مجانًا</button></section><section class="card private"><div class="bodyx"><div class="art"><span class="bolt"></span><span class="spark s1"></span><span class="spark s2"></span><span class="ball p1"><i class="smile"></i></span><span class="ball p2"><i class="smile"></i></span></div><div class="txt"><h2 class="ttl">Private</h2><p class="st">الأفضل للفرق والأصدقاء</p><ul class="lst"><li><span>🕒</span>منافسة بلا نهاية</li><li><span>👥</span>بالدعوات فقط</li><li><span>🏆</span>فائزون في كل جولة</li></ul></div></div><div class="split"><button class="sec btn">إنشاء</button><button class="pri btn">العثور على الردهة</button></div></section></div><script>document.querySelectorAll(".tab").forEach(b=>b.onclick=()=>{document.querySelectorAll(".tab").forEach(x=>x.classList.remove("active"));b.classList.add("active")})</script></body></html>
