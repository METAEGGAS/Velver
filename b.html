der-right:1px solid #2d3a4f;flex-shrink:0}.cin{background:none;border:none;color:#fff;font-size:15px;font-weight:600;flex:1;outline:none;text-align:right}.cin::placeholder{color:#8a94a6;font-weight:400}.cb{background:none;border:none;color:#8a94a6;cursor:pointer;font-size:14px;display:none;width:22px;height:22px;border-radius:50%;align-items:center;justify-content:center;flex-shrink:0}.cb:hover{background:#2d3a4f}.tm{margin-top:10px;font-size:12px;color:#8a94a6;text-align:center}.tm a{color:#2196f3;text-decoration:none}.sm{background:rgba(0,200,83,.12);border:1px solid rgba(0,200,83,.3);border-radius:8px;padding:12px 14px;margin-top:12px;display:none;align-items:flex-start;gap:10px;font-size:13px;line-height:1.6;flex-direction:row-reverse}.sm.sh{display:flex}.si{background:#00c853;color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;flex-shrink:0;margin-top:2px}.st{flex:1;text-align:right}.sy{border-top:1px dashed #2d3a4f;padding-top:14px;margin-bottom:14px}.sr{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px}.sr .l{color:#8a94a6;display:flex;align-items:center;gap:8px;flex-direction:row-reverse}.sr .v{font-weight:600;font-size:16px}.br{display:none}.br.sh{display:flex}.br .v{color:#fff}.bbi{background:#2196f3;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold}.pb{width:100%;background:#2196f3;border:none;color:#fff;padding:15px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer}.pb:hover{background:#1976d2}.cl2 .bb{display:none}.cl2 .arr{transform:rotate(-90deg)}</style></head><body><div class="c"><div class="hd"><button class="tb ac">الايداع</button><button class="tb">السحب</button><button class="tb">العمليات</button><button class="tb">المحافظ</button></div><div class="m"><div class="mr"><div class="mrt"><span class="nm">USDT (TRC-20)</span><div class="ic"><img src="https://qxbroker.com/profile/images/usdt_trc20.svg" alt="USDT"><img src="https://qxbroker.com/profile/images/usdt_trc20.svg" alt="TRC20"></div></div></div><div class="ml"><div class="r"><span>أدنى مبلغ:</span><span>$15.00</span></div><div class="r"><span>أعلى مبلغ:</span><span>$50,000.00</span></div></div></div><div class="w"><div class="wt">الحد الأدنى للمبلغ – 15 $. المدفوعات الأصغر لن يتم اعتمادها.</div><div class="wi">!</div></div><div class="ab"><span class="al">مبلغ الإيداع</span><div class="ai"><span class="ds">$</span><input type="number" id="am" value="100" min="15" max="50000"></div></div><div class="qa"><button class="qb" onclick="sa(500)">$ 500</button><button class="qb" onclick="sa(300)">$ 300</button><button class="qb" onclick="sa(200)">$ 200</button><button class="qb" onclick="sa(150)">$ 150</button></div><div class="bs" id="bs"><div class="bh" onclick="tb()"><div class="bhr"><div class="bic">🎟</div><span class="tt">رمز المكافأة</span><span class="bdg" id="bdg">+50% مكافأة</span></div><span class="arr"><img src="https://cdn-icons-png.flaticon.com/128/3925/3925158.png" alt=""></span></div><div class="bb"><div class="civ"><span class="cl">رمز العرض الخاص بك</span><button class="cb" id="cbn" onclick="cc()">✕</button><input type="text" class="cin" id="pc" placeholder="اختر أو أدخل الرمز" oninput="oi()"><button class="ap" onclick="ac()">تطبيق</button><span class="ci">%</span></div><div class="tm">باستخدام المكافأة، فإنك توافق على الشروط. <a href="#">الشروط والأحكام</a></div><div class="sm" id="sm"><div class="st" id="sx"></div><div class="si">!</div></div></div></div><div class="sy"><div class="sr br" id="br"><div class="l"><span id="bl">مكافأة 50%</span><span class="bbi">%</span></div><div class="v" id="bv">$50.00+</div></div><div class="sr"><span class="l">سوف تتلقى</span><span class="v" id="tv">$100.00</span></div></div><button class="pb">المتابعة إلى الدفع</button></div><script>const cs={"WELCOME50":50,"WELCOME60":60};let cb=0;function sa(v){document.getElementById('am').value=v;up()}function tb(){document.getElementById('bs').classList.toggle('cl2')}function oi(){document.getElementById('cbn').style.display=document.getElementById('pc').value?'flex':'none'}function cc(){document.getElementById('pc').value='';document.getElementById('cbn').style.display='none';cb=0;document.getElementById('sm').classList.remove('sh');document.getElementById('br').classList.remove('sh');document.getElementById('bdg').style.display='none';up()}function ac(){const c=document.getElementById('pc').value.trim().toUpperCase();if(cs[c]){cb=cs[c];document.getElementById('sx').innerHTML=`تم تطبيق الرمز الترويجي بنجاح. ستحصل على مكافأة بنسبة ${cb}% (حتى حد أقصى $500.00).`;document.getElementById('sm').classList.add('sh');document.getElementById('br').classList.add('sh');document.getElementById('bl').textContent=`مكافأة ${cb}%`;document.getElementById('bdg').textContent=`+${cb}% مكافأة`;document.getElementById('bdg').style.display='inline-block';up()}else alert('رمز غير صحيح')}function up(){const a=parseFloat(document.getElementById('am').value)||0;if(cb>0){const b=Math.min(a*cb/100,500);document.getElementById('bv').textContent=`$${b.toFixed(2)}+`;document.getElementById('tv').textContent=`$${(a+b).toFixed(2)}`}else document.getElementById('tv').textContent=`$${a.toFixed(2)}`}document.getElementById('am').addEventListener('input',up);up();</script></body></html>
