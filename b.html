<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الملف الشخصي VIP</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#090914;
      --bg-2:#0e1020;
      --panel:#101327;
      --panel-2:#0d1122;
      --stroke:rgba(154,121,255,.14);
      --stroke-2:rgba(255,255,255,.06);
      --text:#ffffff;
      --muted:#8d90a8;
      --muted-2:#6f738e;
      --purple:#9b5cff;
      --purple-2:#7a3cff;
      --purple-3:#b783ff;
      --blue:#6a6bff;
      --success:#ae7dff;
      --shadow:0 18px 60px rgba(0,0,0,.55);
      --glow:0 0 0 1px rgba(173,133,255,.05),0 0 30px rgba(133,77,255,.16),0 10px 30px rgba(0,0,0,.35);
      --radius:22px;
      --radius-md:18px;
      --radius-sm:14px;
    }

    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family:"Cairo",system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
      background:
        radial-gradient(80% 60% at 50% 0%, rgba(129,76,255,.16) 0%, rgba(129,76,255,0) 40%),
        radial-gradient(55% 40% at 100% 100%, rgba(89,73,255,.10) 0%, rgba(89,73,255,0) 50%),
        linear-gradient(180deg,#070812 0%,#090a16 30%,#0b0d1c 100%);
      color:var(--text);
      display:flex;
      justify-content:center;
      padding:28px 14px;
    }

    .phone{
      width:100%;
      max-width:460px;
      min-height:880px;
      background:
        linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.00)),
        linear-gradient(180deg, #0b0e1e 0%, #0b0d1b 100%);
      border:1px solid rgba(255,255,255,.04);
      border-radius:28px;
      box-shadow:
        0 35px 90px rgba(0,0,0,.60),
        inset 0 1px 0 rgba(255,255,255,.03),
        inset 0 -1px 0 rgba(255,255,255,.02);
      overflow:hidden;
      position:relative;
    }

    .phone::before{
      content:"";
      position:absolute;
      inset:-15% -10% auto -10%;
      height:260px;
      background:
        radial-gradient(circle at 50% 25%, rgba(148,84,255,.25), rgba(148,84,255,0) 55%);
      pointer-events:none;
    }

    .screen{
      position:relative;
      padding:26px 18px 18px;
      z-index:1;
    }

    .top{
      display:flex;
      flex-direction:column;
      align-items:center;
      padding-top:10px;
      margin-bottom:18px;
    }

    .avatar-wrap{
      position:relative;
      width:118px;
      height:118px;
      display:grid;
      place-items:center;
      margin-bottom:12px;
    }

    .avatar-ring{
      position:absolute;
      inset:0;
      border-radius:50%;
      background:
        radial-gradient(circle at 50% 50%, rgba(174,110,255,.10) 0%, rgba(174,110,255,.02) 58%, rgba(174,110,255,0) 70%);
      box-shadow:
        0 0 0 1px rgba(181,129,255,.30),
        0 0 26px rgba(140,74,255,.28),
        inset 0 0 20px rgba(150,83,255,.08);
    }

    .avatar{
      width:82px;
      height:82px;
      border-radius:50%;
      position:relative;
      background:
        radial-gradient(circle at 50% 35%, rgba(205,173,255,.18), rgba(205,173,255,.07) 40%, rgba(205,173,255,.02) 100%),
        linear-gradient(180deg, rgba(174,118,255,.20), rgba(125,77,255,.08));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.05);
      overflow:hidden;
    }

    .avatar img{
      width:100%;
      height:100%;
      object-fit:cover;
      display:none;
    }

    .avatar.has-image img{display:block}
    .avatar.has-image .avatar-placeholder{display:none}

    .avatar-placeholder{
      position:absolute;
      inset:0;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .avatar-placeholder::before{
      content:"";
      position:absolute;
      top:16px;
      width:30px;
      height:30px;
      border-radius:50%;
      background:linear-gradient(180deg,#b792ff,#9b69ff);
      box-shadow:0 0 20px rgba(177,125,255,.20);
    }

    .avatar-placeholder::after{
      content:"";
      position:absolute;
      bottom:14px;
      width:52px;
      height:30px;
      border-radius:40px 40px 18px 18px;
      background:linear-gradient(180deg,#b792ff,#9b69ff);
      box-shadow:0 0 20px rgba(177,125,255,.18);
    }

    .camera-btn{
      position:absolute;
      right:0;
      bottom:10px;
      width:38px;
      height:38px;
      border:none;
      border-radius:50%;
      display:grid;
      place-items:center;
      background:linear-gradient(135deg,#a667ff,#7b45ff);
      box-shadow:0 10px 24px rgba(120,65,255,.35), inset 0 1px 0 rgba(255,255,255,.18);
      cursor:pointer;
      color:#fff;
    }

    .camera-btn svg{width:18px;height:18px}

    .name-row{
      display:flex;
      align-items:center;
      gap:8px;
      margin-bottom:2px;
      font-weight:800;
      font-size:31px;
      line-height:1;
      letter-spacing:-.3px;
      text-shadow:0 0 24px rgba(146,88,255,.10);
    }

    .verified{
      width:20px;
      height:20px;
      display:inline-grid;
      place-items:center;
      border-radius:50%;
      background:linear-gradient(135deg,#8c59ff,#6b47ff);
      box-shadow:0 0 16px rgba(123,70,255,.25);
      flex:0 0 auto;
    }

    .verified svg{width:12px;height:12px}

    .email{
      color:#c6c8d7;
      font-size:14px;
      margin-top:2px;
    }

    .hero-card,
    .stats-card,
    .form-card{
      background:
        linear-gradient(180deg, rgba(255,255,255,.02), rgba(255,255,255,.01)),
        linear-gradient(180deg, rgba(19,24,46,.96), rgba(10,13,27,.98));
      border:1px solid var(--stroke);
      border-radius:18px;
      box-shadow:var(--glow);
      backdrop-filter:blur(14px);
    }

    .hero-card{
      display:grid;
      grid-template-columns:1fr 1fr;
      overflow:hidden;
      margin-bottom:10px;
    }

    .hero-col{
      padding:16px 16px 14px;
      min-height:116px;
      position:relative;
    }

    .hero-col + .hero-col{
      border-right:1px solid rgba(255,255,255,.06);
    }

    .level-label{
      color:#d6c4ff;
      font-size:14px;
      margin-bottom:2px;
    }

    .vip-title{
      font-size:28px;
      font-weight:800;
      line-height:1.1;
      color:#ae79ff;
      margin:0 0 6px;
      text-shadow:0 0 18px rgba(148,89,255,.22);
    }

    .points{
      font-size:14px;
      color:#b9bdd0;
    }

    .badge-box{
      position:absolute;
      left:14px;
      top:12px;
      width:84px;
      height:84px;
      display:grid;
      place-items:center;
      opacity:.98;
    }

    .progress-percent{
      font-size:22px;
      font-weight:700;
      margin-bottom:10px;
    }

    .progress-track{
      width:100%;
      height:8px;
      border-radius:999px;
      background:rgba(255,255,255,.06);
      overflow:hidden;
      position:relative;
      box-shadow:inset 0 1px 2px rgba(0,0,0,.35);
      margin-bottom:8px;
    }

    .progress-fill{
      height:100%;
      width:47%;
      border-radius:999px;
      background:linear-gradient(90deg,#b069ff 0%, #9158ff 55%, #7e52ff 100%);
      box-shadow:0 0 14px rgba(152,89,255,.42);
    }

    .progress-note{
      color:#9297b0;
      font-size:12px;
      line-height:1.65;
    }

    .stats-card{
      display:grid;
      grid-template-columns:repeat(3,1fr);
      overflow:hidden;
      margin-bottom:16px;
    }

    .stat{
      padding:14px 12px 12px;
      min-height:82px;
      position:relative;
      display:flex;
      flex-direction:column;
      justify-content:center;
      align-items:flex-start;
      gap:4px;
    }

    .stat + .stat{
      border-right:1px solid rgba(255,255,255,.06);
    }

    .stat-top{
      width:100%;
      display:flex;
      align-items:center;
      justify-content:space-between;
      gap:8px;
      color:#b7bace;
      font-size:13px;
    }

    .stat-value{
      font-size:18px;
      font-weight:700;
      line-height:1.2;
      color:#ffffff;
    }

    .icon-box{
      width:26px;
      height:26px;
      border-radius:8px;
      display:grid;
      place-items:center;
      flex:0 0 auto;
      background:rgba(158,96,255,.08);
      box-shadow:inset 0 0 0 1px rgba(164,103,255,.16);
      color:#a56cff;
    }

    .icon-box svg{width:15px;height:15px}

    .form-card{
      padding:16px 14px 14px;
    }

    .section-head{
      display:flex;
      align-items:flex-start;
      justify-content:space-between;
      gap:10px;
      margin-bottom:12px;
      padding:2px 2px 10px;
      border-bottom:1px solid rgba(255,255,255,.045);
    }

    .section-title{
      font-size:20px;
      font-weight:800;
      margin:0;
    }

    .section-sub{
      margin:2px 0 0;
      color:#80859c;
      font-size:12px;
    }

    .section-head .side-icon{
      width:28px;
      height:28px;
      border-radius:10px;
      display:grid;
      place-items:center;
      color:#ad74ff;
      background:rgba(158,96,255,.06);
      box-shadow:inset 0 0 0 1px rgba(164,103,255,.12);
      margin-top:2px;
      flex:0 0 auto;
    }

    form{
      display:grid;
      gap:12px;
    }

    .field{
      display:grid;
      gap:7px;
    }

    .field label{
      color:#acb0c2;
      font-size:13px;
      padding-inline:2px;
    }

    .control{
      position:relative;
    }

    .control input,
    .control select{
      width:100%;
      height:48px;
      border-radius:12px;
      border:1px solid rgba(255,255,255,.08);
      outline:none;
      background:linear-gradient(180deg, rgba(255,255,255,.01), rgba(255,255,255,.005));
      color:#fff;
      font-family:inherit;
      font-size:15px;
      padding:0 14px 0 54px;
      box-shadow:inset 0 1px 0 rgba(255,255,255,.02);
      transition:.22s ease;
    }

    .control input::placeholder{color:#757a90}

    .control input:focus,
    .control select:focus{
      border-color:rgba(165,108,255,.35);
      box-shadow:
        0 0 0 3px rgba(141,87,255,.08),
        inset 0 1px 0 rgba(255,255,255,.02);
    }

    .field-icon{
      position:absolute;
      inset-inline-start:8px;
      top:50%;
      transform:translateY(-50%);
      width:34px;
      height:34px;
      border-radius:10px;
      display:grid;
      place-items:center;
      color:#af7cff;
      background:rgba(162,100,255,.08);
      box-shadow:inset 0 0 0 1px rgba(170,109,255,.16);
      pointer-events:none;
    }

    .field-icon svg{width:18px;height:18px}

    .select-wrap::after{
      content:"";
      position:absolute;
      inset-inline-end:16px;
      top:50%;
      width:8px;
      height:8px;
      border-right:2px solid #9d9fba;
      border-bottom:2px solid #9d9fba;
      transform:translateY(-65%) rotate(45deg);
      pointer-events:none;
    }

    .control select{
      appearance:none;
      -webkit-appearance:none;
      -moz-appearance:none;
      padding-inline-end:34px;
      cursor:pointer;
    }

    .save-btn{
      margin-top:6px;
      width:100%;
      height:50px;
      border:none;
      border-radius:12px;
      font-family:inherit;
      font-size:16px;
      font-weight:800;
      color:#fff;
      cursor:pointer;
      background:linear-gradient(90deg,#8748ff 0%, #9d5eff 55%, #7f47ff 100%);
      box-shadow:
        0 12px 28px rgba(123,69,255,.30),
        inset 0 1px 0 rgba(255,255,255,.20);
      display:flex;
      align-items:center;
      justify-content:center;
      gap:10px;
      transition:transform .15s ease, box-shadow .15s ease, filter .15s ease;
    }

    .save-btn:hover{
      transform:translateY(-1px);
      filter:brightness(1.04);
      box-shadow:
        0 16px 32px rgba(123,69,255,.36),
        inset 0 1px 0 rgba(255,255,255,.22);
    }

    .save-btn:active{transform:translateY(0)}
    .save-btn svg{width:18px;height:18px}

    .toast{
      position:fixed;
      right:50%;
      bottom:22px;
      transform:translateX(50%) translateY(14px);
      background:linear-gradient(180deg,#161b31,#111524);
      color:#fff;
      border:1px solid rgba(172,112,255,.18);
      border-radius:14px;
      padding:12px 16px;
      box-shadow:0 18px 35px rgba(0,0,0,.45);
      opacity:0;
      pointer-events:none;
      transition:.25s ease;
      font-size:14px;
      white-space:nowrap;
      z-index:30;
    }

    .toast.show{
      opacity:1;
      transform:translateX(50%) translateY(0);
    }

    .hidden-input{
      display:none;
    }

    @media (max-width:420px){
      .screen{padding:22px 14px 14px}
      .name-row{font-size:27px}
      .stat-value{font-size:16px}
      .hero-col{padding:14px 12px}
      .badge-box{width:76px;height:76px}
    }
  </style>
</head>
<body>
  <div class="phone">
    <div class="screen">
      <div class="top">
        <div class="avatar-wrap">
          <div class="avatar-ring"></div>
          <div class="avatar" id="avatarBox">
            <img id="avatarImage" alt="الصورة الشخصية">
            <div class="avatar-placeholder"></div>
          </div>
          <button class="camera-btn" id="avatarTrigger" type="button" aria-label="تغيير الصورة الشخصية">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 8.5A2.5 2.5 0 0 1 6.5 6H8l1.3-2h5.4L16 6h1.5A2.5 2.5 0 0 1 20 8.5v7A2.5 2.5 0 0 1 17.5 18h-11A2.5 2.5 0 0 1 4 15.5v-7Z"/>
              <circle cx="12" cy="12" r="3.5"/>
            </svg>
          </button>
          <input class="hidden-input" id="avatarInput" type="file" accept="image/*">
        </div>

        <div class="name-row">
          <span id="displayName">أحمد خالد</span>
          <span class="verified" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
              <path d="M6 12.5l3.2 3.2L18 7.8"/>
            </svg>
          </span>
        </div>
        <div class="email" id="displayEmail">ahmed.khaled@example.com</div>
      </div>

      <div class="hero-card">
        <div class="hero-col">
          <div class="level-label">المستوى الحالي</div>
          <h2 class="vip-title" id="vipLevel">VIP 2</h2>
          <div class="points" id="pointsText">4,750.00 / 10,000 نقطة</div>

          <div class="badge-box" aria-hidden="true">
            <svg viewBox="0 0 120 120" width="84" height="84">
              <defs>
                <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#bf8cff"/>
                  <stop offset="55%" stop-color="#985cff"/>
                  <stop offset="100%" stop-color="#6e40ff"/>
                </linearGradient>
                <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1">
                  <stop offset="0%" stop-color="#f0d9ff"/>
                  <stop offset="100%" stop-color="#c38fff"/>
                </linearGradient>
                <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
                  <feGaussianBlur stdDeviation="4" result="b"/>
                  <feMerge>
                    <feMergeNode in="b"/>
                    <feMergeNode in="SourceGraphic"/>
                  </feMerge>
                </filter>
              </defs>
              <polygon points="60,8 92,26 92,62 60,80 28,62 28,26" fill="none" stroke="url(#g1)" stroke-width="5" filter="url(#glow)"/>
              <polygon points="60,18 84,31 84,57 60,70 36,57 36,31" fill="rgba(154,92,255,.08)" stroke="rgba(213,170,255,.35)" stroke-width="2"/>
              <circle cx="60" cy="48" r="18" fill="url(#g1)" opacity=".18"/>
              <path d="M60 34l4.8 9.7 10.7 1.6-7.8 7.6 1.9 10.7-9.6-5-9.6 5 1.9-10.7-7.8-7.6 10.7-1.6z" fill="url(#g2)" stroke="#f2deff" stroke-width="1.2"/>
              <circle cx="43" cy="86" r="4" fill="#b57cff"/>
              <circle cx="77" cy="86" r="4" fill="#b57cff"/>
              <path d="M34 90c6 6 14 9 26 9s20-3 26-9" fill="none" stroke="url(#g1)" stroke-width="4" stroke-linecap="round"/>
            </svg>
          </div>
        </div>

        <div class="hero-col">
          <div class="progress-percent" id="progressPercent">47%</div>
          <div class="progress-track" aria-label="نسبة التقدم إلى المستوى التالي">
            <div class="progress-fill" id="progressFill"></div>
          </div>
          <div class="progress-note" id="progressNote">5,250 نقطة للوصول إلى VIP 3</div>
        </div>
      </div>

      <div class="stats-card">
        <div class="stat">
          <div class="stat-top">
            <span>إجمالي الإيداعات</span>
            <span class="icon-box" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3.5 7.5A2.5 2.5 0 0 1 6 5h12a2.5 2.5 0 0 1 2.5 2.5v9A2.5 2.5 0 0 1 18 19H6a2.5 2.5 0 0 1-2.5-2.5v-9Z"/>
                <path d="M15.5 12h5"/>
                <circle cx="15.5" cy="12" r="1"/>
              </svg>
            </span>
          </div>
          <div class="stat-value" id="depositValue">$25,600.00</div>
        </div>

        <div class="stat">
          <div class="stat-top">
            <span>إجمالي التداولات</span>
            <span class="icon-box" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M4 18h16"/>
                <path d="M7 16V9"/>
                <path d="M12 16V6"/>
                <path d="M17 16v-4"/>
                <path d="M5 11l4-4 3 2 5-5 2 2"/>
              </svg>
            </span>
          </div>
          <div class="stat-value" id="tradesValue">128 صفقة</div>
        </div>

        <div class="stat">
          <div class="stat-top">
            <span>تاريخ الانضمام</span>
            <span class="icon-box" aria-hidden="true">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                <path d="M7 3v3M17 3v3M4 9h16"/>
                <rect x="4" y="5.5" width="16" height="14.5" rx="2.5"/>
              </svg>
            </span>
          </div>
          <div class="stat-value" id="joinValue">12 مايو 2024</div>
        </div>
      </div>

      <div class="form-card">
        <div class="section-head">
          <div class="side-icon" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
              <path d="M16 21v-2a4 4 0 0 0-4-4H7a4 4 0 0 0-4 4v2"/>
              <circle cx="9.5" cy="7" r="4"/>
              <path d="M20 8v6M23 11h-6"/>
            </svg>
          </div>

          <div>
            <h3 class="section-title">المعلومات الشخصية</h3>
            <p class="section-sub">قم بتحديث معلوماتك الشخصية</p>
          </div>
        </div>

        <form id="profileForm">
          <div class="field">
            <label for="fullName">الاسم الكامل</label>
            <div class="control">
              <input id="fullName" name="fullName" type="text" value="أحمد خالد" autocomplete="name">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/>
                  <circle cx="12" cy="7" r="4"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="email">البريد الإلكتروني</label>
            <div class="control">
              <input id="email" name="email" type="email" value="ahmed.khaled@example.com" autocomplete="email">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M4 6.5A2.5 2.5 0 0 1 6.5 4h11A2.5 2.5 0 0 1 20 6.5v11a2.5 2.5 0 0 1-2.5 2.5h-11A2.5 2.5 0 0 1 4 17.5v-11Z"/>
                  <path d="m5 7 7 5 7-5"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="phone">رقم الهاتف</label>
            <div class="control">
              <input id="phone" name="phone" type="tel" value="+20 101 123 4567" autocomplete="tel">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M22 16.9v3a2 2 0 0 1-2.2 2 19.8 19.8 0 0 1-8.6-3.1 19.4 19.4 0 0 1-6-6A19.8 19.8 0 0 1 2.1 4.1 2 2 0 0 1 4.1 2h3a2 2 0 0 1 2 1.7l.5 3a2 2 0 0 1-.6 1.8l-1.3 1.3a16 16 0 0 0 6.3 6.3l1.3-1.3a2 2 0 0 1 1.8-.6l3 .5A2 2 0 0 1 22 16.9Z"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="country">بلد الإقامة</label>
            <div class="control select-wrap">
              <select id="country" name="country">
                <option selected>مصر</option>
                <option>السعودية</option>
                <option>الإمارات</option>
                <option>الكويت</option>
                <option>قطر</option>
                <option>البحرين</option>
                <option>عُمان</option>
                <option>الأردن</option>
              </select>
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="9"/>
                  <path d="M3 12h18M12 3a15 15 0 0 1 0 18M12 3a15 15 0 0 0 0 18"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="language">اللغة</label>
            <div class="control select-wrap">
              <select id="language" name="language">
                <option selected>العربية</option>
                <option>English</option>
                <option>Français</option>
              </select>
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M5 7h9M9 4v3a11 11 0 0 1-4 8M7 12c1.3 1.8 2.7 3 5 4"/>
                  <path d="M14 20l4-10 4 10M15.4 16h5.2"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="timezone">المنطقة الزمنية</label>
            <div class="control select-wrap">
              <select id="timezone" name="timezone">
                <option selected>القاهرة (UTC+3)</option>
                <option>الرياض (UTC+3)</option>
                <option>دبي (UTC+4)</option>
                <option>لندن (UTC+1)</option>
              </select>
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <circle cx="12" cy="12" r="9"/>
                  <path d="M12 7v5l3 2"/>
                </svg>
              </span>
            </div>
          </div>

          <div class="field">
            <label for="password">كلمة المرور</label>
            <div class="control">
              <input id="password" name="password" type="password" value="demoPassword123" autocomplete="current-password">
              <span class="field-icon" aria-hidden="true">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.9" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="5" y="11" width="14" height="9" rx="2"/>
                  <path d="M8 11V8a4 4 0 1 1 8 0v3"/>
                </svg>
              </span>
            </div>
          </div>

          <button class="save-btn" type="submit">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.05" stroke-linecap="round" stroke-linejoin="round">
              <path d="M4 5.5A1.5 1.5 0 0 1 5.5 4h10.4L20 8.1V18.5A1.5 1.5 0 0 1 18.5 20h-13A1.5 1.5 0 0 1 4 18.5v-13Z"/>
              <path d="M8 4v5h7V4M8 20v-6h8v6"/>
            </svg>
            <span>حفظ التغييرات</span>
          </button>
        </form>
      </div>
    </div>
  </div>

  <div class="toast" id="toast">تم حفظ التغييرات بنجاح</div>

  <script>
    const STORAGE_KEY = "vip-profile-page-ar";
    const AVATAR_KEY = "vip-profile-avatar-ar";

    const els = {
      form: document.getElementById("profileForm"),
      fullName: document.getElementById("fullName"),
      email: document.getElementById("email"),
      phone: document.getElementById("phone"),
      country: document.getElementById("country"),
      language: document.getElementById("language"),
      timezone: document.getElementById("timezone"),
      password: document.getElementById("password"),
      displayName: document.getElementById("displayName"),
      displayEmail: document.getElementById("displayEmail"),
      avatarTrigger: document.getElementById("avatarTrigger"),
      avatarInput: document.getElementById("avatarInput"),
      avatarImage: document.getElementById("avatarImage"),
      avatarBox: document.getElementById("avatarBox"),
      progressFill: document.getElementById("progressFill"),
      progressPercent: document.getElementById("progressPercent"),
      progressNote: document.getElementById("progressNote"),
      pointsText: document.getElementById("pointsText"),
      vipLevel: document.getElementById("vipLevel"),
      depositValue: document.getElementById("depositValue"),
      tradesValue: document.getElementById("tradesValue"),
      joinValue: document.getElementById("joinValue"),
      toast: document.getElementById("toast")
    };

    const profileState = {
      currentPoints: 4750,
      nextLevelPoints: 10000,
      currentLevel: "VIP 2",
      nextLevel: "VIP 3",
      deposits: 25600,
      trades: 128,
      joinedAt: "12 مايو 2024"
    };

    function formatNumber(n){
      return Number(n).toLocaleString("en-US", {
        minimumFractionDigits: 2,
        maximumFractionDigits: 2
      });
    }

    function renderVip(){
      const pct = Math.floor((profileState.currentPoints / profileState.nextLevelPoints) * 100);
      const remaining = profileState.nextLevelPoints - profileState.currentPoints;

      els.progressFill.style.width = pct + "%";
      els.progressPercent.textContent = pct + "%";
      els.progressNote.textContent = formatNumber(remaining).replace(".00","") + " نقطة للوصول إلى " + profileState.nextLevel;
      els.pointsText.textContent = formatNumber(profileState.currentPoints) + " / " + formatNumber(profileState.nextLevelPoints).replace(".00",".00") + " نقطة";
      els.vipLevel.textContent = profileState.currentLevel;
      els.depositValue.textContent = "$" + formatNumber(profileState.deposits);
      els.tradesValue.textContent = profileState.trades + " صفقة";
      els.joinValue.textContent = profileState.joinedAt;
    }

    function showToast(text){
      els.toast.textContent = text;
      els.toast.classList.add("show");
      clearTimeout(showToast._t);
      showToast._t = setTimeout(() => {
        els.toast.classList.remove("show");
      }, 2200);
    }

    function syncHeader(){
      els.displayName.textContent = els.fullName.value.trim() || "أحمد خالد";
      els.displayEmail.textContent = els.email.value.trim() || "ahmed.khaled@example.com";
    }

    function saveProfile(){
      const data = {
        fullName: els.fullName.value,
        email: els.email.value,
        phone: els.phone.value,
        country: els.country.value,
        language: els.language.value,
        timezone: els.timezone.value,
        password: els.password.value
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      syncHeader();
      showToast("تم حفظ التغييرات بنجاح");
    }

    function loadProfile(){
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      try{
        const data = JSON.parse(raw);
        if(data.fullName) els.fullName.value = data.fullName;
        if(data.email) els.email.value = data.email;
        if(data.phone) els.phone.value = data.phone;
        if(data.country) els.country.value = data.country;
        if(data.language) els.language.value = data.language;
        if(data.timezone) els.timezone.value = data.timezone;
        if(data.password) els.password.value = data.password;
      }catch(e){}
      syncHeader();
    }

    function loadAvatar(){
      const savedAvatar = localStorage.getItem(AVATAR_KEY);
      if(savedAvatar){
        els.avatarImage.src = savedAvatar;
        els.avatarBox.classList.add("has-image");
      }
    }

    els.avatarTrigger.addEventListener("click", () => els.avatarInput.click());

    els.avatarInput.addEventListener("change", (e) => {
      const file = e.target.files && e.target.files[0];
      if(!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        const base64 = reader.result;
        els.avatarImage.src = base64;
        els.avatarBox.classList.add("has-image");
        localStorage.setItem(AVATAR_KEY, base64);
        showToast("تم تحديث الصورة الشخصية");
      };
      reader.readAsDataURL(file);
    });

    [els.fullName, els.email].forEach(el => {
      el.addEventListener("input", syncHeader);
    });

    els.form.addEventListener("submit", (e) => {
      e.preventDefault();
      saveProfile();
    });

    renderVip();
    loadProfile();
    loadAvatar();
    syncHeader();
  </script>
</body>
</html>
