<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>إيداع</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Tahoma,Arial,sans-serif}body{background:#1a2332;color:#fff;min-height:100vh;padding:16px;font-size:14px}.container{max-width:560px;margin:0 auto}.header{display:flex;justify-content:space-between;align-items:center;padding:8px 4px 16px;border-bottom:1px dashed #2d3a4f;margin-bottom:16px}.header h1{font-size:20px;font-weight:600}.close{background:none;border:none;color:#8a94a6;cursor:pointer;font-size:24px;width:32px;height:32px;display:flex;align-items:center;justify-content:center;border-radius:50%}.close:hover{background:#2d3a4f}.method{background:#fff;color:#1a2332;border-radius:12px;padding:16px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center}.method-info{display:flex;align-items:center;gap:8px}.method-icons{display:flex;gap:4px}.method-icons img{width:20px;height:20px;border-radius:50%}.method-name{font-weight:600;font-size:15px}.change{color:#2196f3;font-size:13px;cursor:pointer;font-weight:500}.limits{text-align:left;font-size:13px}.limits div{display:flex;justify-content:space-between;gap:20px;color:#666;margin:2px 0}.limits span{color:#1a2332;font-weight:500}.warning{background:#3d2f1a;border-radius:8px;padding:12px 14px;margin-bottom:16px;display:flex;align-items:center;gap:10px;font-size:13px}.warning-icon{background:#f5a623;color:#1a2332;width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:bold;flex-shrink:0;font-size:13px}.amount-box{border:1px solid #2d3a4f;border-radius:8px;padding:16px;margin-bottom:12px;position:relative}.amount-label{position:absolute;top:-8px;right:14px;background:#1a2332;padding:0 6px;font-size:11px;color:#8a94a6}.amount-input{display:flex;align-items:center;justify-content:space-between}.amount-input input{background:none;border:none;color:#fff;font-size:22px;font-weight:600;text-align:left;outline:none;width:100%;direction:ltr}.dollar{color:#8a94a6;font-size:18px}.quick-amounts{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:16px}.quick-btn{background:#2d3a4f;border:none;color:#fff;padding:12px;border-radius:8px;cursor:pointer;font-size:14px;font-weight:500;transition:.2s}.quick-btn:hover{background:#3d4a5f}.bonus-section{background:#232f45;border-radius:10px;padding:14px;margin-bottom:16px}.bonus-header{display:flex;justify-content:space-between;align-items:center;cursor:pointer;position:relative}.bonus-title{display:flex;align-items:center;gap:10px;font-size:14px}.bonus-icon{background:#8b6f47;width:28px;height:20px;border-radius:3px;display:flex;align-items:center;justify-content:center;font-size:11px;position:relative}.bonus-icon::before,.bonus-icon::after{content:"";position:absolute;width:6px;height:6px;background:#1a2332;border-radius:50%;top:50%;transform:translateY(-50%)}.bonus-icon::before{right:-3px}.bonus-icon::after{left:-3px}.badge{background:#00c853;color:#fff;padding:3px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-right:8px;display:none}.arrow{color:#2196f3;font-size:14px;transition:.3s}.bonus-body{margin-top:14px;display:block}.code-input-wrap{position:relative;border:1px solid #2d3a4f;border-radius:8px;padding:14px 16px;background:#1a2332;display:flex;align-items:center;gap:10px}.code-label{position:absolute;top:-8px;right:14px;background:#232f45;padding:0 6px;font-size:11px;color:#8a94a6}.code-input{background:none;border:none;color:#fff;font-size:15px;font-weight:600;flex:1;outline:none;text-align:right;direction:ltr}.code-input::placeholder{color:#8a94a6;font-weight:400}.apply-btn{background:none;border:none;color:#2196f3;cursor:pointer;font-size:14px;font-weight:500;border-right:1px solid #2d3a4f;padding-right:12px}.clear-btn{background:none;border:none;color:#8a94a6;cursor:pointer;font-size:18px;display:none;width:24px;height:24px;border-radius:50%;align-items:center;justify-content:center}.clear-btn:hover{background:#2d3a4f}.code-icon{background:#2196f3;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold;color:#fff}.terms{margin-top:10px;font-size:12px;color:#8a94a6;text-align:center}.terms a{color:#2196f3;text-decoration:none}.success-msg{background:rgba(0,200,83,.15);border:1px solid rgba(0,200,83,.3);border-radius:8px;padding:12px;margin-top:12px;display:none;align-items:flex-start;gap:8px;font-size:13px;line-height:1.6}.success-msg.show{display:flex}.success-icon{background:#00c853;color:#fff;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:bold;flex-shrink:0;margin-top:1px}.summary{border-top:1px dashed #2d3a4f;padding-top:16px;margin-bottom:16px}.summary-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;font-size:14px}.summary-row .label{color:#8a94a6;display:flex;align-items:center;gap:8px}.summary-row .value{font-weight:600;font-size:16px}.bonus-row{display:none}.bonus-row.show{display:flex}.bonus-row .value{color:#00c853}.bonus-badge-inline{background:#2196f3;width:22px;height:22px;border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:bold}.pay-btn{width:100%;background:#2196f3;border:none;color:#fff;padding:16px;border-radius:8px;font-size:16px;font-weight:600;cursor:pointer;transition:.2s}.pay-btn:hover{background:#1976d2}.collapsed .bonus-body{display:none}.collapsed .arrow{transform:rotate(-90deg)}</style></head><body><div class="container"><div class="header"><h1>إيداع</h1><button class="close" onclick="window.close()">✕</button></div><div class="method"><div class="limits"><div>أدنى مبلغ: <span>$15.00</span></div><div>أعلى مبلغ: <span>$50,000.00</span></div></div><div class="method-info"><span class="change">تغيير</span><span class="method-name">USDT (TRC-20)</span><div class="method-icons"><img src="https://qxbroker.com/profile/images/usdt_trc20.svg" alt="USDT"><img src="https://qxbroker.com/profile/images/usdt_trc20.svg" alt="TRC20"></div></div></div><div class="warning"><div class="warning-icon">!</div><div>الحد الأدنى للمبلغ – 15 $. المدفوعات الأصغر لن يتم اعتمادها.</div></div><div class="amount-box"><span class="amount-label">مبلغ الإيداع</span><div class="amount-input"><span class="dollar">$</span><input type="number" id="amount" value="100" min="15" max="50000"></div></div><div class="quick-amounts"><button class="quick-btn" onclick="setAmount(500)">$ 500</button><button class="quick-btn" onclick="setAmount(300)">$ 300</button><button class="quick-btn" onclick="setAmount(200)">$ 200</button><button class="quick-btn" onclick="setAmount(150)">$ 150</button></div><div class="bonus-section" id="bonusSection"><div class="bonus-header" onclick="toggleBonus()"><div class="bonus-title"><span class="badge" id="bonusBadge">+50% مكافأة</span><span>رمز المكافأة</span><div class="bonus-icon">🎟</div></div><span class="arrow">⌄</span></div><div class="bonus-body"><div class="code-input-wrap"><span class="code-label">رمز العرض الخاص بك</span><button class="apply-btn" onclick="applyCode()">تطبيق</button><input type="text" class="code-input" id="promoCode" placeholder="اختر أو أدخل الرمز" oninput="onCodeInput()"><button class="clear-btn" id="clearBtn" onclick="clearCode()">✕</button><span class="code-icon">%</span></div><div class="terms">باستخدام المكافأة، فإنك توافق على الشروط. <a href="#">الشروط والأحكام</a></div><div class="success-msg" id="successMsg"><div class="success-icon">!</div><div id="successText"></div></div></div></div><div class="summary"><div class="summary-row bonus-row" id="bonusRow"><div class="label"><span class="bonus-badge-inline">%</span><span id="bonusLabel">مكافأة 50%</span></div><div class="value" id="bonusValue">$50.00+</div></div><div class="summary-row"><span class="label">سوف تتلقى</span><span class="value" id="totalValue">$100.00</span></div></div><button class="pay-btn">المتابعة إلى الدفع</button></div><script>const codes={"WELCOME50":50,"WELCOME60":60};let currentBonus=0;function setAmount(v){document.getElementById('amount').value=v;update()}function toggleBonus(){document.getElementById('bonusSection').classList.toggle('collapsed')}function onCodeInput(){const v=document.getElementById('promoCode').value;document.getElementById('clearBtn').style.display=v?'flex':'none'}function clearCode(){document.getElementById('promoCode').value='';document.getElementById('clearBtn').style.display='none';currentBonus=0;document.getElementById('successMsg').classList.remove('show');document.getElementById('bonusRow').classList.remove('show');document.getElementById('bonusBadge').style.display='none';update()}function applyCode(){const code=document.getElementById('promoCode').value.trim().toUpperCase();if(codes[code]){currentBonus=codes[code];document.getElementById('successText').innerHTML=`تم تطبيق الرمز الترويجي بنجاح. ستحصل على مكافأة بنسبة ${currentBonus}% (حتى حد أقصى $500.00).`;document.getElementById('successMsg').classList.add('show');document.getElementById('bonusRow').classList.add('show');document.getElementById('bonusLabel').textContent=`مكافأة ${currentBonus}%`;document.getElementById('bonusBadge').textContent=`+${currentBonus}% مكافأة`;document.getElementById('bonusBadge').style.display='inline-block';update()}else{alert('رمز غير صحيح')}}function update(){const amt=parseFloat(document.getElementById('amount').value)||0;if(currentBonus>0){const bonus=Math.min(amt*currentBonus/100,500);document.getElementById('bonusValue').textContent=`$${bonus.toFixed(2)}+`;document.getElementById('totalValue').textContent=`$${(amt+bonus).toFixed(2)}`}else{document.getElementById('totalValue').textContent=`$${amt.toFixed(2)}`}}document.getElementById('amount').addEventListener('input',update);update();</script></body></html>
