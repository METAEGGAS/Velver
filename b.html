  body { background:#0d1526; color:#fff; padding:18px 16px 40px; direction:rtl; }

  .top { display:flex; align-items:center; justify-content:space-between; margin-bottom:22px; }
  .search-icon { font-size:22px; color:#aab4c8; }
  .asset-pick { display:flex; align-items:center; gap:10px; color:#c7cede; font-size:17px; }

  .tabs { display:flex; justify-content:space-between; align-items:flex-end; border-bottom:1px solid #1c273d; margin-bottom:16px; }
  .tab { padding-bottom:13px; font-size:18px; font-weight:600; color:#6b7690; position:relative; }
  .tab.active { color:#fff; }
  .tab.active::after { content:""; position:absolute; bottom:-1px; right:0; left:0; height:3px; background:#ff7a1a; border-radius:2px; }

  .filters { display:flex; align-items:center; gap:8px; margin-bottom:20px; overflow-x:auto; padding-bottom:4px; }
  .pill { border:1px solid #2b3752; border-radius:24px; padding:11px 16px; font-size:14px; color:#dfe3ec; white-space:nowrap; cursor:pointer; flex-shrink:0; background:transparent; }
  .pill.sel { border-color:#ff7a1a; color:#ff7a1a; }
  .gear { border:1px solid #2b3752; border-radius:50%; width:44px; height:44px; min-width:44px; display:flex; align-items:center; justify-content:center; cursor:pointer; font-size:16px; color:#c7cede; flex-shrink:0; }

  .row { display:flex; align-items:center; justify-content:space-between; padding:16px 0; border-bottom:1px solid #182238; }
  .row-right { display:flex; align-items:center; gap:14px; min-width:0; }
  .row-left { display:flex; align-items:center; gap:14px; flex-shrink:0; }
  .icon { position:relative; width:40px; height:40px; flex-shrink:0; display:flex; align-items:center; justify-content:center; }
  .icon img { width:36px; height:36px; object-fit:contain; }
  .icon .ph { width:36px; height:36px; background:#26314c; border-radius:6px; display:none; }
  .otc { position:absolute; bottom:-4px; left:50%; transform:translateX(-50%); background:#ff7a1a; color:#fff; font-size:8px; font-weight:700; padding:1px 6px; border-radius:6px; white-space:nowrap; }
  .name { font-size:17px; font-weight:600; color:#fff; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .pct { color:#25d998; font-size:18px; font-weight:700; direction:ltr; unicode-bidi:embed; }
  .star { font-size:24px; color:#4b5670; cursor:pointer; user-select:none; line-height:1; }
  .empty { padding:30px 0; text-align:center; color:#5c6785; font-size:15px; }

function escapeHtml(str) {
  return String(str)
    .replace(/&/g, "&amp;")
    .replace(/</g, "&lt;")
    .replace(/>/g, "&gt;")
    .replace(/"/g, "&quot;");
}

function buildRow(name, url) {
  var row = document.createElement("div");
  row.className = "row";

  var rowRight = document.createElement("div");
  rowRight.className = "row-right";

  var iconWrap = document.createElement("div");
  iconWrap.className = "icon";

  if (url) {
    var img = document.createElement("img");
    img.src = url;
    img.alt = "";
    var ph = document.createElement("div");
    ph.className = "ph";
    img.onerror = function () {
      img.style.display = "none";
      ph.style.display = "block";
    };
    iconWrap.appendChild(img);
    iconWrap.appendChild(ph);
  } else {
    var ph2 = document.createElement("div");
    ph2.className = "ph";
    ph2.style.display = "block";
    iconWrap.appendChild(ph2);
  }

  var otc = document.createElement("span");
  otc.className = "otc";
  otc.textContent = "OTC";
  iconWrap.appendChild(otc);

  var nameEl = document.createElement("div");
  nameEl.className = "name";
  nameEl.textContent = name;

  rowRight.appendChild(iconWrap);
  rowRight.appendChild(nameEl);

  var rowLeft = document.createElement("div");
  rowLeft.className = "row-left";

  var pct = document.createElement("div");
  pct.className = "pct";
  pct.textContent = "+" + DEF_PCT + "%";

  var star = document.createElement("div");
  star.className = "star";
  star.textContent = "\u2606";
  star.addEventListener("click", function () {
    if (star.textContent === "\u2606") {
      star.textContent = "\u2605";
      star.style.color = "#ff9f2e";
    } else {
      star.textContent = "\u2606";
      star.style.color = "#4b5670";
    }
  });

  rowLeft.appendChild(pct);
  rowLeft.appendChild(star);

  row.appendChild(rowRight);
  row.appendChild(rowLeft);

  return row;
}

var listEl = document.getElementById("list");
var activeCats = [];

function render() {
  var cats = activeCats.length ? activeCats : Object.keys(DATA);
  var fragment = document.createDocumentFragment();
  var count = 0;

  for (var i = 0; i < cats.length; i++) {
    var arr = DATA[cats[i]];
    if (!arr) continue;
    for (var j = 0; j < arr.length; j++) {
      fragment.appendChild(buildRow(arr[j][0], arr[j][1]));
      count++;
    }
  }

  listEl.innerHTML = "";
  if (count === 0) {
    var empty = document.createElement("div");
    empty.className = "empty";
    empty.textContent = "لا توجد أصول";
    listEl.appendChild(empty);
  } else {
    listEl.appendChild(fragment);
  }
}

var pills = document.querySelectorAll(".pill");
for (var k = 0; k < pills.length; k++) {
  pills[k].addEventListener("click", function () {
    var cat = this.getAttribute("data-cat");
    this.classList.toggle("sel");
    var idx = activeCats.indexOf(cat);
    if (idx === -1) {
      activeCats.push(cat);
    } else {
      activeCats.splice(idx, 1);
    }
    render();
  });
}
