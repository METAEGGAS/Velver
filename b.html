<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"/>
<title>Pro Trading Platform</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Tahoma,Arial,sans-serif;-webkit-tap-highlight-color:transparent}
html,body{width:100%;height:100%;overflow:hidden;background:#0b0e11;color:#eaecef;user-select:none}
.hidden{display:none!important}
.auth-wrap{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:radial-gradient(circle at 30% 20%,#1a2332 0%,#0b0e11 60%)}
.auth-card{width:92%;max-width:400px;background:#161a1e;border:1px solid #2b3139;border-radius:16px;padding:32px 28px;box-shadow:0 20px 60px rgba(0,0,0,.5)}
.auth-card h1{font-size:24px;margin-bottom:6px;background:linear-gradient(90deg,#f0b90b,#ffd447);-webkit-background-clip:text;-webkit-text-fill-color:transparent;text-align:center}
.auth-card p.sub{color:#848e9c;font-size:13px;text-align:center;margin-bottom:24px}
.auth-card input{width:100%;padding:13px 14px;background:#0b0e11;border:1px solid #2b3139;border-radius:10px;color:#eaecef;font-size:14px;margin-bottom:12px;outline:none;transition:.2s}
.auth-card input:focus{border-color:#f0b90b}
.auth-card button.primary{width:100%;padding:13px;background:linear-gradient(90deg,#f0b90b,#ffcf40);border:none;border-radius:10px;color:#000;font-weight:700;font-size:15px;cursor:pointer;margin-top:6px;transition:.2s}
.auth-card button.primary:hover{filter:brightness(1.1)}
.auth-card .switch{text-align:center;margin-top:16px;font-size:13px;color:#848e9c}
.auth-card .switch a{color:#f0b90b;cursor:pointer;text-decoration:none}
.auth-msg{font-size:12px;text-align:center;min-height:16px;margin-top:8px;color:#f6465d}
.auth-msg.ok{color:#0ecb81}
#app{display:flex;flex-direction:column;width:100%;height:100%}
.topbar{display:flex;align-items:center;height:52px;background:#161a1e;border-bottom:1px solid #2b3139;padding:0 14px;gap:12px;flex-shrink:0}
.logo{font-weight:800;font-size:16px;background:linear-gradient(90deg,#f0b90b,#ffd447);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.pair-selector{position:relative}
.pair-btn{background:#0b0e11;border:1px solid #2b3139;padding:8px 14px;border-radius:8px;color:#eaecef;cursor:pointer;font-weight:600;font-size:14px;display:flex;align-items:center;gap:8px}
.pair-btn:hover{border-color:#f0b90b}
.pair-menu{position:absolute;top:calc(100% + 6px);right:0;background:#161a1e;border:1px solid #2b3139;border-radius:10px;min-width:220px;max-height:340px;overflow-y:auto;z-index:100;box-shadow:0 10px 30px rgba(0,0,0,.5)}
.pair-menu input{width:calc(100% - 16px);margin:8px;padding:8px 10px;background:#0b0e11;border:1px solid #2b3139;border-radius:6px;color:#eaecef;outline:none;font-size:13px}
.pair-item{padding:10px 14px;cursor:pointer;font-size:13px;display:flex;justify-content:space-between;border-top:1px solid #1e2329}
.pair-item:hover{background:#1e2329}
.pair-item.active{background:#2b3139;color:#f0b90b}
.pair-item .rm{color:#f6465d;font-size:16px;opacity:.6}
.pair-item .rm:hover{opacity:1}
.add-pair{padding:10px 14px;color:#0ecb81;cursor:pointer;font-size:13px;border-top:1px solid #1e2329;text-align:center;font-weight:600}
.add-pair:hover{background:#1e2329}
.price-info{display:flex;flex-direction:column;line-height:1.15;margin-inline-start:6px}
.price-info .p{font-size:16px;font-weight:700;color:#0ecb81}
.price-info .p.down{color:#f6465d}
.price-info .c{font-size:11px;color:#848e9c}
.spacer{flex:1}
.role-badge{background:#1e2329;color:#f0b90b;padding:6px 10px;border-radius:6px;font-size:11px;font-weight:700;border:1px solid #2b3139}
.role-badge.viewer{color:#848e9c}
.user-box{display:flex;align-items:center;gap:10px;background:#0b0e11;padding:6px 10px;border-radius:8px;border:1px solid #2b3139}
.user-box .n{font-size:12px;color:#eaecef}
.user-box .lg{color:#f6465d;cursor:pointer;font-size:12px;background:none;border:none}
.chart-area{flex:1;position:relative;background:#0b0e11;overflow:hidden}
#chartCanvas{position:absolute;inset:0;display:block;cursor:crosshair;touch-action:none}
.tool-bar{position:absolute;top:10px;left:10px;display:flex;gap:6px;z-index:10}
.tool-bar button{width:34px;height:34px;background:#161a1ecc;backdrop-filter:blur(6px);border:1px solid #2b3139;border-radius:6px;color:#eaecef;cursor:pointer;font-size:16px;font-weight:700;transition:.15s}
.tool-bar button:hover{background:#2b3139;border-color:#f0b90b}
.status{position:absolute;bottom:10px;left:10px;background:#161a1ecc;backdrop-filter:blur(6px);padding:6px 12px;border-radius:6px;font-size:11px;color:#848e9c;border:1px solid #2b3139;z-index:10}
.status .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:#0ecb81;margin-inline-end:6px;animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}
.crosshair-info{position:absolute;top:10px;right:10px;background:#161a1ecc;backdrop-filter:blur(6px);padding:8px 12px;border-radius:6px;font-size:11px;line-height:1.6;border:1px solid #2b3139;z-index:10;min-width:150px}
.crosshair-info span{color:#f0b90b;font-weight:600}
::-webkit-scrollbar{width:6px;height:6px}
::-webkit-scrollbar-track{background:#0b0e11}
::-webkit-scrollbar-thumb{background:#2b3139;border-radius:3px}
@media(max-width:600px){.topbar{height:auto;flex-wrap:wrap;padding:8px;gap:8px}.crosshair-info{font-size:10px;padding:6px 8px}.user-box .n{display:none}}
</style>
</head>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getAuth,createUserWithEmailAndPassword,signInWithEmailAndPassword,signOut,onAuthStateChanged,updateProfile}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import{getFirestore,doc,setDoc,getDoc,updateDoc,onSnapshot,collection,query,orderBy,limit,runTransaction,serverTimestamp,writeBatch}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig={apiKey:"AIzaSyBvzfJOOjRFZnTgTUrwEZQPr8Ba7zKKlNg",authDomain:"hhhxh-5ebe4.firebaseapp.com",databaseURL:"https://hhhxh-5ebe4-default-rtdb.firebaseio.com",projectId:"hhhxh-5ebe4",storageBucket:"hhhxh-5ebe4.firebasestorage.app",messagingSenderId:"79243000696",appId:"1:79243000696:web:ee0fb2d2ccce791954e68d"};
const app=initializeApp(firebaseConfig),auth=getAuth(app),db=getFirestore(app);

const U={$:id=>document.getElementById(id),fmt:(v,d=2)=>Number(v).toLocaleString('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}),clamp:(v,a,b)=>Math.max(a,Math.min(b,v)),now:()=>Date.now(),timeStr:t=>{const d=new Date(t);return d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')+':'+d.getSeconds().toString().padStart(2,'0')},dateStr:t=>{const d=new Date(t);return(d.getMonth()+1)+'/'+d.getDate()+' '+d.getHours().toString().padStart(2,'0')+':'+d.getMinutes().toString().padStart(2,'0')},niceStep:r=>{const p=Math.pow(10,Math.floor(Math.log10(r)));const n=r/p;let s;if(n<1.5)s=1;else if(n<3)s=2;else if(n<7)s=5;else s=10;return s*p}};

const SETTINGS={CANDLE_INTERVAL:5000,MAX_CANDLES:2000,DEFAULT_VIEW:80,MIN_VIEW:10,MAX_VIEW:500,COLORS:{bg:'#0b0e11',grid:'#1e2329',gridStrong:'#2b3139',text:'#848e9c',up:'#0ecb81',down:'#f6465d',wick:'#848e9c',crosshair:'#f0b90b',axisBg:'#161a1e'},PADDING:{top:20,right:70,bottom:30,left:10},DEFAULT_PAIRS:['BTC/USDT','ETH/USDT','BNB/USDT','SOL/USDT','XRP/USDT']};

const PriceGen={base:{'BTC/USDT':67000,'ETH/USDT':3500,'BNB/USDT':600,'SOL/USDT':150,'XRP/USDT':0.55},last:{},volatility:{'BTC/USDT':0.0008,'ETH/USDT':0.0012,'BNB/USDT':0.0010,'SOL/USDT':0.0018,'XRP/USDT':0.0020},init(p){if(!this.last[p])this.last[p]=this.base[p]||100},next(p){this.init(p);const v=this.volatility[p]||0.001;const r=(Math.random()-0.5)*2*v;this.last[p]=Math.max(0.0001,this.last[p]*(1+r));return this.last[p]},seed(p,pr){this.last[p]=pr}};

class CandleEngine{
constructor(){this.candles=[];this.pair=null;this.interval=SETTINGS.CANDLE_INTERVAL}
setPair(p){this.pair=p;this.candles=[]}
setCandles(arr){this.candles=arr.slice(-SETTINGS.MAX_CANDLES).sort((a,b)=>a.t-b.t)}
bucketTime(t){return Math.floor(t/this.interval)*this.interval}
updateLive(price,t=U.now()){
const bt=this.bucketTime(t),last=this.candles[this.candles.length-1];
if(!last||last.t<bt){const o=last?last.c:price;const c={t:bt,o,h:Math.max(o,price),l:Math.min(o,price),c:price};this.candles.push(c);if(this.candles.length>SETTINGS.MAX_CANDLES)this.candles.shift();return{isNew:true,candle:c,closed:last}}
else{last.c=price;last.h=Math.max(last.h,price);last.l=Math.min(last.l,price);return{isNew:false,candle:last}}
}
applyRemote(c){const i=this.candles.findIndex(x=>x.t===c.t);if(i>=0)this.candles[i]=c;else{this.candles.push(c);this.candles.sort((a,b)=>a.t-b.t);if(this.candles.length>SETTINGS.MAX_CANDLES)this.candles.shift()}}
}

class Camera{
constructor(){this.viewCount=SETTINGS.DEFAULT_VIEW;this.offset=0;this.priceCenter=null;this.priceRange=null;this.autoPrice=true}
zoom(f,anchor=0.5){const nv=U.clamp(this.viewCount*f,SETTINGS.MIN_VIEW,SETTINGS.MAX_VIEW);const delta=nv-this.viewCount;this.offset-=delta*(1-anchor);this.viewCount=nv}
panX(dxCandles){this.offset+=dxCandles}
panY(dyRatio){if(this.priceRange){this.autoPrice=false;this.priceCenter+=this.priceRange*dyRatio}}
reset(){this.viewCount=SETTINGS.DEFAULT_VIEW;this.offset=0;this.autoPrice=true}
fit(candles){if(!candles.length)return;const total=candles.length,end=total-1+this.offset,start=end-this.viewCount+1,from=Math.max(0,Math.floor(start)),to=Math.min(total-1,Math.ceil(end)),vis=candles.slice(from,to+1);if(!vis.length)return;if(this.autoPrice){let hi=-Infinity,lo=Infinity;for(const c of vis){if(c.h>hi)hi=c.h;if(c.l<lo)lo=c.l}const pad=(hi-lo)*0.1||hi*0.001;this.priceCenter=(hi+lo)/2;this.priceRange=(hi-lo)+pad*2}return{from,to,vis,start,end}}
}

class Coord{
constructor(){this.w=0;this.h=0;this.plotW=0;this.plotH=0}
update(w,h){this.w=w;this.h=h;this.plotW=w-SETTINGS.PADDING.left-SETTINGS.PADDING.right;this.plotH=h-SETTINGS.PADDING.top-SETTINGS.PADDING.bottom}
xFromIndex(i,start,vc){return SETTINGS.PADDING.left+((i-start)/vc)*this.plotW}
yFromPrice(p,pc,pr){return SETTINGS.PADDING.top+this.plotH-((p-(pc-pr/2))/pr)*this.plotH}
priceFromY(y,pc,pr){return(pc-pr/2)+((SETTINGS.PADDING.top+this.plotH-y)/this.plotH)*pr}
indexFromX(x,start,vc){return start+((x-SETTINGS.PADDING.left)/this.plotW)*vc}
candleWidth(vc){return(this.plotW/vc)*0.75}
}

class GridRenderer{
draw(ctx,co,cam,fit){if(!fit)return;ctx.save();const ps=U.niceStep(cam.priceRange/6),pst=Math.ceil((cam.priceCenter-cam.priceRange/2)/ps)*ps;ctx.strokeStyle=SETTINGS.COLORS.grid;ctx.lineWidth=1;ctx.beginPath();for(let p=pst;p<cam.priceCenter+cam.priceRange/2;p+=ps){const y=Math.round(co.yFromPrice(p,cam.priceCenter,cam.priceRange))+0.5;ctx.moveTo(SETTINGS.PADDING.left,y);ctx.lineTo(co.w-SETTINGS.PADDING.right,y)}ctx.stroke();const step=cam.viewCount<30?5:cam.viewCount<80?10:cam.viewCount<200?20:50;ctx.beginPath();for(let i=Math.ceil(fit.start/step)*step;i<=fit.end;i+=step){const x=Math.round(co.xFromIndex(i,fit.start,cam.viewCount))+0.5;ctx.moveTo(x,SETTINGS.PADDING.top);ctx.lineTo(x,SETTINGS.PADDING.top+co.plotH)}ctx.stroke();ctx.restore()}
}

class CandleRenderer{
draw(ctx,co,cam,candles,fit){if(!fit)return;const{from,to}=fit,cw=Math.max(1,co.candleWidth(cam.viewCount)),half=cw/2;for(let i=from;i<=to;i++){const c=candles[i];if(!c)continue;const x=co.xFromIndex(i,fit.start,cam.viewCount),yO=co.yFromPrice(c.o,cam.priceCenter,cam.priceRange),yC=co.yFromPrice(c.c,cam.priceCenter,cam.priceRange),yH=co.yFromPrice(c.h,cam.priceCenter,cam.priceRange),yL=co.yFromPrice(c.l,cam.priceCenter,cam.priceRange),up=c.c>=c.o,col=up?SETTINGS.COLORS.up:SETTINGS.COLORS.down;ctx.strokeStyle=col;ctx.fillStyle=col;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(Math.round(x)+0.5,yH);ctx.lineTo(Math.round(x)+0.5,yL);ctx.stroke();const bt=Math.min(yO,yC),bb=Math.max(yO,yC),bh=Math.max(1,bb-bt);ctx.fillRect(Math.round(x-half),Math.round(bt),Math.max(1,Math.round(cw)),Math.round(bh))}}
}

class PriceScale{
draw(ctx,co,cam,lp){ctx.save();ctx.fillStyle=SETTINGS.COLORS.axisBg;ctx.fillRect(co.w-SETTINGS.PADDING.right,0,SETTINGS.PADDING.right,co.h);ctx.fillStyle=SETTINGS.COLORS.text;ctx.font='11px Segoe UI';ctx.textAlign='left';ctx.textBaseline='middle';const st=U.niceStep(cam.priceRange/6),ss=Math.ceil((cam.priceCenter-cam.priceRange/2)/st)*st;for(let p=ss;p<cam.priceCenter+cam.priceRange/2;p+=st){const y=co.yFromPrice(p,cam.priceCenter,cam.priceRange);const dec=p<1?4:2;ctx.fillText(U.fmt(p,dec),co.w-SETTINGS.PADDING.right+6,y)}if(lp!=null){const y=co.yFromPrice(lp,cam.priceCenter,cam.priceRange);ctx.fillStyle=SETTINGS.COLORS.crosshair;ctx.fillRect(co.w-SETTINGS.PADDING.right,y-9,SETTINGS.PADDING.right,18);ctx.fillStyle='#000';ctx.font='bold 11px Segoe UI';const dec=lp<1?4:2;ctx.fillText(U.fmt(lp,dec),co.w-SETTINGS.PADDING.right+6,y)}ctx.restore()}
}

class TimeScale{
draw(ctx,co,cam,candles,fit){if(!fit)return;ctx.save();ctx.fillStyle=SETTINGS.COLORS.axisBg;ctx.fillRect(0,co.h-SETTINGS.PADDING.bottom,co.w,SETTINGS.PADDING.bottom);ctx.fillStyle=SETTINGS.COLORS.text;ctx.font='11px Segoe UI';ctx.textAlign='center';ctx.textBaseline='middle';const step=cam.viewCount<30?5:cam.viewCount<80?10:cam.viewCount<200?20:50;for(let i=Math.ceil(fit.start/step)*step;i<=fit.end;i+=step){const c=candles[i];if(!c)continue;const x=co.xFromIndex(i,fit.start,cam.viewCount);if(x<SETTINGS.PADDING.left||x>co.w-SETTINGS.PADDING.right)continue;ctx.fillText(U.timeStr(c.t),x,co.h-SETTINGS.PADDING.bottom/2)}ctx.restore()}
}

class Crosshair{
constructor(){this.x=null;this.y=null;this.active=false}
set(x,y){this.x=x;this.y=y;this.active=true}
clear(){this.active=false}
draw(ctx,co,cam,candles,fit){if(!this.active||!fit)return;ctx.save();ctx.strokeStyle=SETTINGS.COLORS.crosshair;ctx.lineWidth=1;ctx.setLineDash([4,4]);ctx.beginPath();ctx.moveTo(this.x,SETTINGS.PADDING.top);ctx.lineTo(this.x,SETTINGS.PADDING.top+co.plotH);ctx.moveTo(SETTINGS.PADDING.left,this.y);ctx.lineTo(co.w-SETTINGS.PADDING.right,this.y);ctx.stroke();ctx.setLineDash([]);const price=co.priceFromY(this.y,cam.priceCenter,cam.priceRange),dec=price<1?4:2;ctx.fillStyle=SETTINGS.COLORS.crosshair;ctx.fillRect(co.w-SETTINGS.PADDING.right,this.y-9,SETTINGS.PADDING.right,18);ctx.fillStyle='#000';ctx.font='bold 11px Segoe UI';ctx.textAlign='left';ctx.textBaseline='middle';ctx.fillText(U.fmt(price,dec),co.w-SETTINGS.PADDING.right+6,this.y);const idx=Math.round(co.indexFromX(this.x,fit.start,cam.viewCount)),c=candles[idx];if(c){ctx.fillStyle=SETTINGS.COLORS.crosshair;const tw=90;ctx.fillRect(this.x-tw/2,co.h-SETTINGS.PADDING.bottom,tw,SETTINGS.PADDING.bottom);ctx.fillStyle='#000';ctx.textAlign='center';ctx.fillText(U.dateStr(c.t),this.x,co.h-SETTINGS.PADDING.bottom/2)}ctx.restore();return{idx,candle:c,price}}
}

class InputManager{
constructor(canvas,cam,co,onChange,onHover,onLeave){this.canvas=canvas;this.cam=cam;this.co=co;this.onChange=onChange;this.onHover=onHover;this.onLeave=onLeave;this.drag=false;this.lastX=0;this.lastY=0;this.pinchDist=null;canvas.addEventListener('wheel',e=>this.onWheel(e),{passive:false});canvas.addEventListener('mousedown',e=>this.down(e.clientX,e.clientY));window.addEventListener('mousemove',e=>this.move(e.clientX,e.clientY,e));window.addEventListener('mouseup',()=>this.up());canvas.addEventListener('mouseleave',()=>{if(!this.drag)this.onLeave()});canvas.addEventListener('touchstart',e=>this.tStart(e),{passive:false});canvas.addEventListener('touchmove',e=>this.tMove(e),{passive:false});canvas.addEventListener('touchend',e=>this.tEnd(e))}
onWheel(e){e.preventDefault();const r=this.canvas.getBoundingClientRect(),ax=(e.clientX-r.left-SETTINGS.PADDING.left)/this.co.plotW,f=e.deltaY>0?1.1:0.9;this.cam.zoom(f,U.clamp(ax,0,1));this.onChange()}
down(x,y){this.drag=true;this.lastX=x;this.lastY=y;this.canvas.style.cursor='grabbing'}
move(x,y,ev){const r=this.canvas.getBoundingClientRect();if(this.drag){const dx=x-this.lastX,dy=y-this.lastY,cw=this.co.plotW/this.cam.viewCount;this.cam.panX(-dx/cw);this.cam.panY(-dy/this.co.plotH);this.lastX=x;this.lastY=y;this.onChange()}else if(ev){const cx=x-r.left,cy=y-r.top;if(cx>SETTINGS.PADDING.left&&cx<this.co.w-SETTINGS.PADDING.right&&cy>SETTINGS.PADDING.top&&cy<this.co.h-SETTINGS.PADDING.bottom)this.onHover(cx,cy);else this.onLeave()}}
up(){this.drag=false;this.canvas.style.cursor='crosshair'}
tStart(e){e.preventDefault();if(e.touches.length===1)this.down(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2){this.drag=false;this.pinchDist=this.tDist(e)}}
tMove(e){e.preventDefault();if(e.touches.length===1&&this.drag)this.move(e.touches[0].clientX,e.touches[0].clientY);else if(e.touches.length===2){const d=this.tDist(e);if(this.pinchDist){const f=this.pinchDist/d;this.cam.zoom(f,0.5);this.onChange()}this.pinchDist=d}}
tEnd(e){if(e.touches.length===0){this.up();this.pinchDist=null}}
tDist(e){const dx=e.touches[0].clientX-e.touches[1].clientX,dy=e.touches[0].clientY-e.touches[1].clientY;return Math.hypot(dx,dy)}
}

class RenderEngine{
constructor(canvas,engine,cam){this.canvas=canvas;this.ctx=canvas.getContext('2d');this.engine=engine;this.cam=cam;this.co=new Coord();this.grid=new GridRenderer();this.cRend=new CandleRenderer();this.pScale=new PriceScale();this.tScale=new TimeScale();this.cross=new Crosshair();this.needsRedraw=true;this.dpr=window.devicePixelRatio||1;this.resize();window.addEventListener('resize',()=>this.resize());this.loop()}
resize(){const r=this.canvas.getBoundingClientRect();this.canvas.width=r.width*this.dpr;this.canvas.height=r.height*this.dpr;this.canvas.style.width=r.width+'px';this.canvas.style.height=r.height+'px';this.ctx.setTransform(this.dpr,0,0,this.dpr,0,0);this.co.update(r.width,r.height);this.invalidate()}
invalidate(){this.needsRedraw=true}
setCrosshair(x,y){this.cross.set(x,y);this.invalidate();this.emitHover()}
clearCrosshair(){this.cross.clear();this.invalidate();if(this.onHover)this.onHover(null)}
emitHover(){if(!this.lastFit||!this.onHover)return;const idx=Math.round(this.co.indexFromX(this.cross.x,this.lastFit.start,this.cam.viewCount)),c=this.engine.candles[idx];this.onHover(c)}
loop(){if(this.needsRedraw){this.render();this.needsRedraw=false}requestAnimationFrame(()=>this.loop())}
render(){const ctx=this.ctx;ctx.fillStyle=SETTINGS.COLORS.bg;ctx.fillRect(0,0,this.co.w,this.co.h);const fit=this.cam.fit(this.engine.candles);this.lastFit=fit;if(fit){this.grid.draw(ctx,this.co,this.cam,fit);this.cRend.draw(ctx,this.co,this.cam,this.engine.candles,fit)}const last=this.engine.candles[this.engine.candles.length-1];this.pScale.draw(ctx,this.co,this.cam,last?last.c:null);this.tScale.draw(ctx,this.co,this.cam,this.engine.candles,fit);this.cross.draw(ctx,this.co,this.cam,this.engine.candles,fit)}
}

class PairManager{
constructor(){this.pairs=[...SETTINGS.DEFAULT_PAIRS];this.current='BTC/USDT';this.listeners=[]}
async load(uid){try{const s=await getDoc(doc(db,'users',uid));if(s.exists()&&s.data().pairs){const d=s.data().pairs;this.pairs=d.list||this.pairs;this.current=d.current||this.pairs[0]}else await this.save(uid)}catch(e){console.warn('pairs load',e)}}
async save(uid){try{await setDoc(doc(db,'users',uid),{pairs:{list:this.pairs,current:this.current}},{merge:true})}catch(e){}}
add(p){p=p.toUpperCase().trim();if(!p.includes('/'))p+='/USDT';if(!this.pairs.includes(p))this.pairs.push(p);return p}
remove(p){if(this.pairs.length<=1)return;this.pairs=this.pairs.filter(x=>x!==p);if(this.current===p)this.current=this.pairs[0]}
setCurrent(p){this.current=p;this.listeners.forEach(f=>f(p))}
onChange(f){this.listeners.push(f)}
}

class DataManager{
constructor(engine,ui){this.engine=engine;this.ui=ui;this.pair=null;this.uid=null;this.userName='';this.isManager=false;this.candleUnsub=null;this.liveUnsub=null;this.mgrUnsub=null;this.tickTimer=null;this.hbTimer=null;this.pairKey=p=>p.replace(/\//g,'_')}
setUser(uid,name){this.uid=uid;this.userName=name}
async switchPair(pair){
this.stop();this.pair=pair;this.engine.setPair(pair);const key=this.pairKey(pair);
try{
const cq=query(collection(db,'market',key,'candles'),orderBy('t','desc'),limit(SETTINGS.MAX_CANDLES));
const hSnap=await new Promise((res,rej)=>{const u=onSnapshot(cq,s=>{u();res(s)},rej)});
const arr=[];hSnap.forEach(d=>{const v=d.data();arr.push({t:v.t,o:v.o,h:v.h,l:v.l,c:v.c})});arr.reverse();
this.engine.setCandles(arr);if(arr.length)PriceGen.seed(pair,arr[arr.length-1].c);
}catch(e){console.warn('history',e)}
await this.tryBecomeManager(key);
const cq2=query(collection(db,'market',key,'candles'),orderBy('t','desc'),limit(50));
this.candleUnsub=onSnapshot(cq2,snap=>{snap.docChanges().forEach(ch=>{const v=ch.doc.data();this.engine.applyRemote({t:v.t,o:v.o,h:v.h,l:v.l,c:v.c})});this.ui.onData()});
this.liveUnsub=onSnapshot(doc(db,'market',key,'meta','live'),snap=>{if(!snap.exists())return;const v=snap.data();if(!this.isManager){const c={t:v.t,o:v.o,h:v.h,l:v.l,c:v.c},last=this.engine.candles[this.engine.candles.length-1];if(!last||last.t<c.t)this.engine.candles.push(c);else this.engine.candles[this.engine.candles.length-1]=c;PriceGen.seed(this.pair,c.c);this.ui.onData()}});
this.mgrUnsub=onSnapshot(doc(db,'market',key,'meta','manager'),snap=>{const v=snap.exists()?snap.data():null,was=this.isManager;this.isManager=!!(v&&v.uid===this.uid);if(this.isManager&&!was)this.startTicking(key);if(!this.isManager&&was)this.stopTicking();this.ui.onRole(this.isManager,v)});
}
async tryBecomeManager(key){
const r=doc(db,'market',key,'meta','manager');
try{
await runTransaction(db,async tx=>{
const s=await tx.get(r);const now=U.now();
if(!s.exists()){tx.set(r,{uid:this.uid,name:this.userName,alive:true,ts:now});return}
const v=s.data();
if(!v.uid||!v.alive||(now-(v.ts||0)>15000)){tx.set(r,{uid:this.uid,name:this.userName,alive:true,ts:now})}
});
}catch(e){console.warn('mgr tx',e)}
}
startTicking(key){
if(this.tickTimer)clearInterval(this.tickTimer);
this.tickTimer=setInterval(async()=>{
if(!this.pair)return;
const price=PriceGen.next(this.pair),r=this.engine.updateLive(price),live=this.engine.candles[this.engine.candles.length-1];
try{await setDoc(doc(db,'market',key,'meta','live'),live)}catch(e){}
if(r.isNew&&r.closed){try{await setDoc(doc(db,'market',key,'candles',String(r.closed.t)),r.closed)}catch(e){}}
this.ui.onData();
},250);
this.hbTimer=setInterval(()=>{updateDoc(doc(db,'market',key,'meta','manager'),{ts:U.now(),alive:true}).catch(()=>{})},4000);
}
stopTicking(){if(this.tickTimer){clearInterval(this.tickTimer);this.tickTimer=null}if(this.hbTimer){clearInterval(this.hbTimer);this.hbTimer=null}}
async releaseManager(){if(!this.isManager||!this.pair)return;const key=this.pairKey(this.pair);try{await setDoc(doc(db,'market',key,'meta','manager'),{uid:null,name:null,alive:false,ts:U.now()})}catch(e){}}
stop(){this.stopTicking();if(this.isManager)this.releaseManager();if(this.candleUnsub){this.candleUnsub();this.candleUnsub=null}if(this.liveUnsub){this.liveUnsub();this.liveUnsub=null}if(this.mgrUnsub){this.mgrUnsub();this.mgrUnsub=null}this.isManager=false}
}

const UI={
engine:null,cam:null,render:null,input:null,pairMgr:null,dataMgr:null,
init(user){
this.engine=new CandleEngine();this.cam=new Camera();this.pairMgr=new PairManager();
const canvas=U.$('chartCanvas');
this.render=new RenderEngine(canvas,this.engine,this.cam);
this.render.onHover=c=>this.updateOHLC(c);
this.dataMgr=new DataManager(this.engine,this);
this.dataMgr.setUser(user.uid,user.displayName||user.email);
this.input=new InputManager(canvas,this.cam,this.render.co,()=>this.render.invalidate(),(x,y)=>this.render.setCrosshair(x,y),()=>this.render.clearCrosshair());
this.bindUI();
this.pairMgr.load(user.uid).then(()=>{this.renderPairList();this.switchPair(this.pairMgr.current)});
window.addEventListener('beforeunload',()=>{if(this.dataMgr)this.dataMgr.releaseManager()});
},
bindUI(){
U.$('userName').textContent=auth.currentUser?.displayName||auth.currentUser?.email||'';
U.$('btnLogout').onclick=async()=>{if(this.dataMgr)await this.dataMgr.releaseManager();signOut(auth)};
U.$('zoomIn').onclick=()=>{this.cam.zoom(0.8,0.5);this.render.invalidate()};
U.$('zoomOut').onclick=()=>{this.cam.zoom(1.25,0.5);this.render.invalidate()};
U.$('resetView').onclick=()=>{this.cam.reset();this.render.invalidate()};
U.$('pairBtn').onclick=()=>U.$('pairMenu').classList.toggle('hidden');
document.addEventListener('click',e=>{if(!e.target.closest('.pair-selector'))U.$('pairMenu').classList.add('hidden')});
U.$('pairSearch').oninput=e=>this.renderPairList(e.target.value);
U.$('addPairBtn').onclick=async()=>{const v=prompt('اسم الزوج (مثل: DOGE/USDT):');if(!v)return;const p=this.pairMgr.add(v);await this.pairMgr.save(auth.currentUser.uid);this.renderPairList();this.switchPair(p)};
},
renderPairList(filter=''){
const list=U.$('pairList');list.innerHTML='';
this.pairMgr.pairs.filter(p=>p.toLowerCase().includes(filter.toLowerCase())).forEach(p=>{
const el=document.createElement('div');
el.className='pair-item'+(p===this.pairMgr.current?' active':'');
el.innerHTML=`<span>${p}</span>${this.pairMgr.pairs.length>1?'<span class="rm" title="حذف">×</span>':''}`;
el.onclick=e=>{if(e.target.classList.contains('rm')){e.stopPropagation();this.pairMgr.remove(p);this.pairMgr.save(auth.currentUser.uid);this.renderPairList(filter);if(this.pairMgr.current!==this.dataMgr.pair)this.switchPair(this.pairMgr.current);return}this.switchPair(p);U.$('pairMenu').classList.add('hidden')};
list.appendChild(el);
});
},
async switchPair(p){
this.pairMgr.setCurrent(p);
await this.pairMgr.save(auth.currentUser.uid);
U.$('curPair').textContent=p;
U.$('statusText').textContent='تحميل '+p+'...';
this.cam.reset();
await this.dataMgr.switchPair(p);
U.$('statusText').textContent='متصل — '+p;
this.renderPairList();this.onData();
},
onData(){
this.render.invalidate();
const last=this.engine.candles[this.engine.candles.length-1];
if(last){const prev=this.engine.candles[this.engine.candles.length-2],up=!prev||last.c>=prev.c,el=U.$('curPrice'),dec=last.c<1?4:2;el.textContent=U.fmt(last.c,dec);el.className='p'+(up?'':' down');if(prev){const ch=((last.c-prev.c)/prev.c*100);U.$('curChange').textContent=(ch>=0?'+':'')+ch.toFixed(2)+'%'}}
},
onRole(isManager,mgr){const b=U.$('roleBadge');if(isManager){b.textContent='مدير الشارت';b.classList.remove('viewer')}else{b.textContent=mgr&&mgr.name?'مشاهد ('+mgr.name+')':'مشاهد';b.classList.add('viewer')}},
updateOHLC(c){if(!c){U.$('ohlcO').textContent=U.$('ohlcH').textContent=U.$('ohlcL').textContent=U.$('ohlcC').textContent='—';U.$('ohlcT').textContent='—';return}const d=c.c<1?4:2;U.$('ohlcO').textContent=U.fmt(c.o,d);U.$('ohlcH').textContent=U.fmt(c.h,d);U.$('ohlcL').textContent=U.fmt(c.l,d);U.$('ohlcC').textContent=U.fmt(c.c,d);U.$('ohlcT').textContent=U.dateStr(c.t)}
};

const Auth={
init(){
U.$('toRegister').onclick=()=>{U.$('loginCard').classList.add('hidden');U.$('registerCard').classList.remove('hidden')};
U.$('toLogin').onclick=()=>{U.$('registerCard').classList.add('hidden');U.$('loginCard').classList.remove('hidden')};
U.$('btnLogin').onclick=()=>this.login();
U.$('btnRegister').onclick=()=>this.register();
[['loginEmail','loginPass','btnLogin'],['regName','regPass','btnRegister']].forEach(([a,b,c])=>{const bEl=U.$(b);if(bEl)bEl.addEventListener('keydown',e=>{if(e.key==='Enter')U.$(c).click()})});
onAuthStateChanged(auth,u=>{if(u){U.$('authScreen').classList.add('hidden');U.$('app').classList.remove('hidden');UI.init(u)}else{U.$('app').classList.add('hidden');U.$('authScreen').classList.remove('hidden');if(UI.dataMgr)UI.dataMgr.stop()}});
},
async login(){const e=U.$('loginEmail').value.trim(),p=U.$('loginPass').value,m=U.$('loginMsg');m.className='auth-msg';m.textContent='';if(!e||!p){m.textContent='أدخل البريد وكلمة المرور';return}try{await signInWithEmailAndPassword(auth,e,p)}catch(err){m.textContent=this.err(err.code)}},
async register(){const n=U.$('regName').value.trim(),e=U.$('regEmail').value.trim(),p=U.$('regPass').value,m=U.$('regMsg');m.className='auth-msg';m.textContent='';if(!n||!e||!p){m.textContent='املأ جميع الحقول';return}if(p.length<6){m.textContent='كلمة المرور 6 أحرف على الأقل';return}try{const cred=await createUserWithEmailAndPassword(auth,e,p);await updateProfile(cred.user,{displayName:n});await setDoc(doc(db,'users',cred.user.uid),{profile:{name:n,email:e,createdAt:U.now()}},{merge:true});m.className='auth-msg ok';m.textContent='تم إنشاء الحساب'}catch(err){m.textContent=this.err(err.code)}},
err(c){return{'auth/invalid-email':'بريد غير صالح','auth/user-not-found':'المستخدم غير موجود','auth/wrong-password':'كلمة مرور خاطئة','auth/invalid-credential':'بيانات غير صحيحة','auth/email-already-in-use':'البريد مستخدم بالفعل','auth/weak-password':'كلمة مرور ضعيفة','auth/network-request-failed':'خطأ في الشبكة'}[c]||'خطأ: '+c}
};
Auth.init();
</script>
