<!DOCTYPE html><html lang="ar" dir="rtl"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width,initial-scale=1.0"/><title>مساعدة</title><style>*{box-sizing:border-box}html,body{margin:0;padding:0;background:#172231;font-family:Arial,Tahoma,sans-serif;color:#fff}:root{--bg:#172231;--bg2:#2a3650;--tab:#2b3752;--muted:#adb8ca;--blue:#2da4ff;--blue2:#4db3ff;--card:#31415f;--card2:#283754;--shadow:0 6px 14px rgba(0,0,0,.25)}body{display:flex;justify-content:center}.phone{width:100%;max-width:568px;min-height:100vh;background:linear-gradient(180deg,#172231 0%,#283654 100%);position:relative;overflow:hidden}.top{background:#182330;padding:23.4px 14.4px 0;position:relative}.title{margin:0;text-align:center;font-size:21.6px;font-weight:700;letter-spacing:.5px}.icon-btn{position:absolute;top:22px;width:34px;height:34px;border:0;background:transparent;cursor:pointer;padding:0;display:flex;align-items:center;justify-content:center}.icon-btn.left{left:10.8px}.icon-btn.right{right:10.8px}.icon-btn img{width:26px;height:26px;object-fit:contain;filter:brightness(0) invert(1)}.tabs{margin-top:25.2px;display:flex;justify-content:space-between;align-items:stretch;gap:7.2px;color:#c2cbda;font-size:12.6px;overflow-x:auto;white-space:nowrap}.tab{flex:1;text-align:center;padding:14.4px 6px 16.2px;color:#c8d0de;cursor:pointer;position:relative;white-space:nowrap;min-width:max-content}.tab.active{background:#2a3550;color:#fff;border-radius:14.4px 14.4px 0 0;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}.hero-wrap{background:#2b3752;padding:14.4px 0 9px;position:relative}.hero-wrap:before,.hero-wrap:after{content:"";position:absolute;left:-8%;width:116%;height:46.8px;background:#2e3a56;transform:skewY(-4deg);z-index:0}.hero-wrap:before{top:-28.8px}.hero-wrap:after{bottom:-27px;transform:skewY(4deg)}.hero{width:88%;height:252px;margin:7.2px auto 9px;border-radius:10.8px;position:relative;overflow:hidden;background:radial-gradient(circle at 50% 18%,rgba(70,175,255,.95),rgba(52,113,223,.72) 18%,rgba(11,36,85,.35) 42%,transparent 56%),radial-gradient(circle at 50% 52%,rgba(20,91,214,.28),transparent 60%),linear-gradient(180deg,#071a41 0%,#0d2554 26%,#0c1f45 62%,#09152e 100%);box-shadow:var(--shadow);z-index:1}.hero .mesh{position:absolute;inset:0;opacity:.18;background:radial-gradient(circle at 50% 50%,transparent 0 33%,rgba(255,255,255,.25) 33.5% 34%,transparent 34.5%),radial-gradient(circle at 50% 50%,transparent 0 48%,rgba(255,255,255,.18) 48.5% 49%,transparent 49.5%),radial-gradient(circle at 50% 50%,transparent 0 63%,rgba(255,255,255,.12) 63.5% 64%,transparent 64.5%)}.support-text{position:absolute;left:50%;top:55%;transform:translate(-50%,-50%);font-size:77.4px;font-weight:900;letter-spacing:2px;color:#fff;opacity:.95;line-height:1}.orb{position:absolute;left:50%;top:52%;transform:translate(-50%,-50%);width:135px;height:135px;border-radius:50%;background:radial-gradient(circle at 30% 28%,#57c7ff 0,#347cff 28%,#0f48cb 62%,#092e93 100%);box-shadow:0 0 36px rgba(53,143,255,.55),inset -16.2px -18px 27px rgba(0,0,0,.28),inset 9px 9px 18px rgba(255,255,255,.1);z-index:2}.orb .eye,.orb .eye2{position:absolute;top:43.2px;width:16.2px;height:16.2px;border-radius:50%;background:#fff;box-shadow:0 0 9px rgba(255,255,255,.75)}.orb .eye{left:38.7px}.orb .eye2{right:38.7px}.orb .mouth{position:absolute;left:50%;top:73.8px;width:36px;height:16.2px;transform:translateX(-50%);border:4.5px solid #fff;border-top:0;border-left-color:transparent;border-right-color:transparent;border-bottom-left-radius:36px;border-bottom-right-radius:36px}.orb .mic{position:absolute;right:11.7px;bottom:25.2px;width:50.4px;height:50.4px;border-radius:50%;border:11.7px solid #e7ebf7;border-left-color:transparent;transform:rotate(18deg)}.orb .mic:after{content:"";position:absolute;left:-31.5px;bottom:-12.6px;width:46.8px;height:12.6px;border-radius:12.6px;background:#fff;transform:rotate(-30deg)}.orb .mic:before{content:"";position:absolute;right:1.8px;top:10.8px;width:25.2px;height:39.6px;border-radius:16.2px;background:linear-gradient(180deg,#ffffff,#cbd4e5)}.stage{position:absolute;left:50%;bottom:21.6px;transform:translateX(-50%);width:198px;height:41.4px;border-radius:50%;background:linear-gradient(180deg,#f0f3ff,#bcc5da 65%,#8d99b7);box-shadow:0 9px 19.8px rgba(0,0,0,.35)}.stage:before{content:"";position:absolute;left:-9px;right:-9px;bottom:-10.8px;height:12.6px;border-radius:50%;background:radial-gradient(circle,#36c1ff 0,#237cff 46%,rgba(35,124,255,0) 73%)}.alert{position:absolute;width:52.2px;height:52.2px;background:linear-gradient(180deg,#4cbcff,#237dff);clip-path:polygon(50% 0,0 100%,100% 100%);filter:drop-shadow(0 9px 12.6px rgba(0,0,0,.35))}.alert:before{content:"!";position:absolute;left:50%;top:56%;transform:translate(-50%,-50%);font-size:28.8px;font-weight:900;color:#fff}.a1{right:25.2px;bottom:21.6px;transform:rotate(18deg)}.a2{left:37.8px;top:82.8px;transform:rotate(-18deg) scale(.72)}.a3{right:68.4px;top:59.4px;transform:rotate(12deg) scale(.62)}.content{padding:21.6px 19.8px 25.2px;text-align:center}.content h2{margin:7.2px 0 19.8px;font-size:22.5px;line-height:1.4}.content p{margin:0 auto 27px;max-width:468px;font-size:16.2px;line-height:1.85;color:#edf2ff}.content a{color:#42a8ff;text-decoration:none}.content a:hover{text-decoration:underline}.profile{background:linear-gradient(180deg,#344667,#2f3f5e);border-radius:12.6px;padding:18px 16.2px;margin:0 auto 21.6px;box-shadow:inset 0 1px 0 rgba(255,255,255,.05),var(--shadow);display:flex;align-items:center;justify-content:space-between;gap:14.4px}.avatar{width:86.4px;height:86.4px;border-radius:50%;background:radial-gradient(circle at 40% 25%,#c3d8ff 0,#9dbcfb 40%,#6e96f6 68%,#5a7fe8 100%);position:relative;flex:0 0 86.4px;display:flex;align-items:center;justify-content:center;overflow:hidden}.avatar img{width:70%;height:70%;object-fit:contain}.user{flex:1;text-align:center}.user .hello{color:#d8def0;font-size:15.3px;margin-bottom:5.4px}.user .name{font-size:19.8px;font-weight:700;margin-bottom:10.8px}.badges{display:flex;justify-content:center;gap:10.8px;flex-wrap:wrap}.badge{min-width:57.6px;height:25.2px;border-radius:6.3px;display:inline-flex;align-items:center;justify-content:center;padding:0 9px;font-size:12.6px}.badge.dark{background:#4f5f8e;color:#fff;gap:5.4px}.badge.light{background:#fff;color:#111;font-weight:700}.badge.light img{width:18px;height:18px;object-fit:contain;margin-left:5px}.star{font-size:12.6px}.chat-btn{width:100%;height:55.8px;border:0;border-radius:12.6px;background:linear-gradient(180deg,#41b3ff,#2d9fff);color:#fff;font-size:25.2px;cursor:pointer;box-shadow:0 9px 21.6px rgba(45,159,255,.35)}.chat-btn:hover{filter:brightness(1.03)}.modal{position:fixed;inset:0;background:rgba(0,0,0,.48);display:none;align-items:flex-end;justify-content:center;padding:14.4px;z-index:999}.modal.show{display:flex}.sheet{width:min(568px,100%);background:#22324b;color:#fff;border-radius:16.2px 16.2px 0 0;padding:16.2px 16.2px 19.8px;box-shadow:0 -9px 27px rgba(0,0,0,.3)}.sheet h3{margin:0 0 9px;font-size:19.8px}.sheet p{margin:0 0 14.4px;line-height:1.8;color:#d7e3ff}.sheet .row{display:flex;gap:9px;flex-wrap:wrap}.sheet .row button{border:0;border-radius:10.8px;padding:10.8px 16.2px;font-size:14.4px;cursor:pointer}.sheet .ok{background:#2da4ff;color:#fff}.sheet .close{background:#edf2ff;color:#172231}@media (max-width:520px){.title{font-size:18px}.tab{font-size:11px;padding:12px 5px 14px}.hero{height:212.4px}.support-text{font-size:57.6px}.orb{width:106.2px;height:106.2px}.orb .eye,.orb .eye2{top:34.2px;width:12.6px;height:12.6px}.orb .eye{left:29.7px}.orb .eye2{right:29.7px}.orb .mouth{top:60.3px;width:29.7px;height:12.6px;border-width:3.6px}.orb .mic{width:41.4px;height:41.4px;border-width:9px;right:9px;bottom:20.7px}.orb .mic:before{width:19.8px;height:30.6px}.orb .mic:after{width:37.8px;height:9.9px;left:-25.2px;bottom:-9.9px}.stage{width:160.2px;height:34.2px}.content h2{font-size:18px}.content p{font-size:14.4px}.profile{padding:14.4px}.avatar{width:75.6px;height:75.6px;flex-basis:75.6px}.user .name{font-size:16.2px}.chat-btn{font-size:19.8px;height:50.4px}.icon-btn img{width:22px;height:22px}}</style></head><body><div class="phone"><div class="top"><button class="icon-btn left" aria-label="القائمة"><img src="https://cdn-icons-png.flaticon.com/128/70/70255.png" alt=""/></button><h1 class="title">مساعدة</h1><button class="icon-btn right" aria-label="القائمة"><img src="https://cdn-icons-png.flaticon.com/128/70/70255.png" alt=""/></button><div class="tabs"><div class="tab active">الدعم</div><div class="tab">الأسئلة الشائعة</div><div class="tab">الملاحظات</div><div class="tab">اللائحة</div></div></div><div class="hero-wrap"><div class="hero"><div class="mesh"></div><div class="support-text">SUPPORT</div><div class="alert a1"></div><div class="alert a2"></div><div class="alert a3"></div><div class="orb"><span class="eye"></span><span class="eye2"></span><span class="mouth"></span><span class="mic"></span></div><div class="stage"></div></div></div><div class="content"><h2>نحن هنا لمساعدتك 24/7</h2><p>للحصول على استجابة سريعة، انقر فوق الزر <a href="#" id="openInline">فتح الدردشة</a> أو أرسل لنا بريدًا إلكترونيًا.</p><div class="profile"><div class="avatar"><img src="https://cdn-icons-png.flaticon.com/256/8988/8988913.png" alt="user"/></div><div class="user"><div class="hello">مرحبا،</div><div class="name">Gggg Hhhh</div><div class="badges"><span class="badge light">NEWBIE</span><span class="badge dark"><span class="star">☆</span> 0 🛡</span></div></div></div><button class="chat-btn" id="openChat">افتح الدردشة 🗨</button></div></div><div class="modal" id="chatModal"><div class="sheet"><h3>بدء الدردشة</h3><p>هذه واجهة أمامية مشابهة للصورة، ويمكنك ربط زر الدردشة بأي نظام دردشة حقيقي عندك لاحقًا.</p><div class="row"><button class="ok" id="continueChat">متابعة</button><button class="close" id="closeChat">إغلاق</button></div></div></div><script>const modal=document.getElementById('chatModal'),open=()=>modal.classList.add('show'),close=()=>modal.classList.remove('show');document.getElementById('openChat').onclick=open;document.getElementById('openInline').onclick=e=>{e.preventDefault();open()};document.getElementById('closeChat').onclick=close;document.getElementById('continueChat').onclick=()=>alert('اربط هنا نظام الدردشة الفعلي الذي تريده');modal.onclick=e=>{if(e.target===modal)close()};document.onkeydown=e=>{if(e.key==='Escape')close()};</script></body></html>
