<!doctype html><html dir=rtl lang=ar><meta charset=utf-8><meta content=#0d1730 name=theme-color><meta content=width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover name=viewport><title>FXER Chart</title><style>:root{--u:#0d1730;--bd:#223252}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}html,body{height:100%;overflow:hidden}body{background:var(--u);color:#eef5ff;font:500 11px/1.15 system-ui,-apple-system,Segoe UI,Tahoma,Arial,sans-serif;user-select:none}.app{background:var(--u);width:100vw;height:100dvh;display:flex;flex-direction:column;position:relative}.asset{display:grid;grid-template-columns:32px 132px;grid-template-rows:32px;column-gap:6px;direction:ltr;padding:6px 8px;z-index:20;flex:none}.pair{display:flex;align-items:center;gap:6px;grid-column:1/3}.fg{position:relative;width:32px;height:32px}.fg em{position:absolute;font-style:normal;font-size:20px;line-height:1}.fg em.c{top:-2px;left:-2px}.fg em.j{bottom:-2px;right:-2px;font-size:18px}.pair small{color:#8ea3c7;font-size:9px;letter-spacing:.5px;display:block}.pair b{color:#fff;font-size:13px;font-weight:600;display:block;margin-top:1px}.utc-tag-top{background:#1c2b52;color:#8ea3c7;font-size:8px;padding:1px 4px;border-radius:3px;margin-inline-start:4px;font-weight:500}.price-box{margin-inline-start:auto;text-align:left;direction:ltr}.price-box .lbl{color:#8ea3c7;font-size:9px}.price-box .val{color:#ffcf54;font-size:16px;font-weight:700;letter-spacing:.5px;font-variant-numeric:tabular-nums}.price-box .val.up{color:#4caf50}.price-box .val.dn{color:#e57373}.chart{position:relative;flex:1;min-height:0;overflow:hidden;background:var(--u);border-top:1px solid var(--bd);border-bottom:1px solid var(--bd)}.chart canvas{position:absolute;inset:0;width:100%;height:100%;display:block}.ptm{position:absolute;top:8px;left:8px;display:flex;align-items:center;gap:6px;background:rgba(13,23,48,.7);border:1px solid var(--bd);border-radius:6px;padding:3px 8px;z-index:6;direction:ltr;pointer-events:none}.ptm .pi{width:14px;height:14px;border:1px solid #8ea3c7;color:#8ea3c7;border-radius:50%;display:grid;place-items:center;font-size:9px;font-style:italic}.ptm .ptx b{color:#fff;font-size:11px;font-variant-numeric:tabular-nums;display:block}.ptm .ptx small{color:#8ea3c7;font-size:8px}.foot{flex:none;padding:6px 10px;color:#8ea3c7;font-size:10px;text-align:center;border-top:1px solid var(--bd);direction:ltr}.foot span{color:#ffcf54;font-variant-numeric:tabular-nums}</style><div class=app><div class=asset><div class=pair id=pairBtn><div class=fg><em class=c>🇨🇦</em><em class=j>🇯🇵</em></div><div><small>UP &amp; DOWN</small><b>CAD/JPY <span class=utc-tag-top>UTC</span></b></div></div><div class=price-box><div class=lbl>PRICE</div><div class=val id=priceVal>0.000</div></div></div><div class=chart id=CH><canvas id=cv></canvas><canvas id=ov></canvas><div class=ptm><span class=pi>i</span><div class=ptx><b id=ptmH>00:00:00</b><small>UTC</small></div></div></div><div class=foot>CAD/JPY · Live Simulated · O:<span id=oV>-</span> H:<span id=hV>-</span> L:<span id=lV>-</span> C:<span id=cV>-</span></div></div><script>(()=>{const SYMBOL='CAD/JPY',TF_MS=30000,TICK_MS=250,HIST_HOURS=6;const fnv=s=>{let h=2166136261>>>0;for(let i=0;i<s.length;i++)h=Math.imul(h^s.charCodeAt(i),16777619);return h>>>0};const mkRng=seed=>{let x=seed>>>0;return()=>(x=(Math.imul(1664525,x)+1013904223)>>>0)/4294967296};const gauss=r=>{let u=0,v=0;while(!u)u=r();while(!v)v=r();return Math.sqrt(-2*Math.log(u))*Math.cos(2*Math.PI*v)};const base=(k=>{const e=fnv('base:'+k);return 70+e%9000/100})(SYMBOL);const vol=9e-4,floor=.01;const shape=(k=>{const e=fnv('shape:'+k);return{b:(e%2001-1000)/1e8,w:.35+(e>>>11&1023)/900,s:e%6283/1e3,a:.18+(e>>>22)%40/100}})(SYMBOL);const rng=mkRng(fnv('rng:'+SYMBOL));const st={r:rng,d:0,p:base,v:vol,f:floor,bi:shape.b,w:shape.w,ph:shape.s,wa:shape.a,ci:0};const step=(s,dt)=>{const wave=Math.sin((s.ci+=dt/250)*s.w+s.ph)*s.v*s.wa;const bias=s.bi*(dt/250);if(s.r()<.02)s.d=2*(s.r()-.5);s.d*=.985;return Math.max(s.f,s.p*(1+bias+s.d*s.v*.15+wave+gauss(s.r)*s.v*Math.sqrt(dt/250)))};const history=[];let t0=Date.now()-HIST_HOURS*3600*1000;st.p=base;for(let t=t0;t<=Date.now();t+=TICK_MS){st.p=step(st,TICK_MS);history.push({t,p:st.p})}const buildCandles=()=>{const m=new Map;for(const tk of history){const bt=Math.floor(tk.t/TF_MS)*TF_MS;let c=m.get(bt);if(!c){c={t:bt,o:tk.p,h:tk.p,l:tk.p,c:tk.p};m.set(bt,c)}else{if(tk.p>c.h)c.h=tk.p;if(tk.p<c.l)c.l=tk.p;c.c=tk.p}}return[...m.values()].sort((a,b)=>a.t-b.t)};let candles=buildCandles();const CH=document.getElementById('CH'),cv=document.getElementById('cv'),ov=document.getElementById('ov');const bc=cv.getContext('2d'),oc=ov.getContext('2d');let W=0,H=0,DPR=1,VIEW=60,scrollI=0;const priceEl=document.getElementById('priceVal'),ptmH=document.getElementById('ptmH');const oV=document.getElementById('oV'),hV=document.getElementById('hV'),lV=document.getElementById('lV'),cV=document.getElementById('cV');const fx=n=>n.toFixed(3);const resize=()=>{DPR=Math.max(1,window.devicePixelRatio||1);W=CH.clientWidth;H=CH.clientHeight;[cv,ov].forEach(c=>{c.width=W*DPR;c.height=H*DPR;c.getContext('2d').setTransform(DPR,0,0,DPR,0,0)})};addEventListener('resize',resize);const pad={t:14,b:22,l:8,r:64};let prevPriceForColor=base;const draw=()=>{bc.clearRect(0,0,W,H);oc.clearRect(0,0,W,H);if(!candles.length)return;const N=candles.length,view=Math.min(VIEW,N);const from=Math.max(0,N-view-scrollI),to=from+view;const slice=candles.slice(from,to);let hi=-Infinity,lo=Infinity;for(const c of slice){if(c.h>hi)hi=c.h;if(c.l<lo)lo=c.l}const rng=hi-lo||1;hi+=rng*.08;lo-=rng*.08;const cw=(W-pad.l-pad.r)/view,bw=Math.max(2,cw*.65);const y=p=>pad.t+(hi-p)/(hi-lo)*(H-pad.t-pad.b);const x=i=>pad.l+i*cw+cw/2;bc.strokeStyle='#1a294e';bc.lineWidth=1;bc.beginPath();for(let g=0;g<5;g++){const yy=pad.t+(H-pad.t-pad.b)*g/4;bc.moveTo(pad.l,yy);bc.lineTo(W-pad.r,yy)}bc.stroke();bc.fillStyle='#5f76a5';bc.font='10px system-ui';bc.textAlign='left';for(let g=0;g<5;g++){const v=hi-(hi-lo)*g/4;const yy=pad.t+(H-pad.t-pad.b)*g/4;bc.fillText(fx(v),W-pad.r+4,yy+3)}for(let i=0;i<slice.length;i++){const c=slice[i],up=c.c>=c.o;bc.strokeStyle=bc.fillStyle=up?'#4caf50':'#e57373';const cx=x(i);bc.beginPath();bc.moveTo(cx,y(c.h));bc.lineTo(cx,y(c.l));bc.stroke();const y1=y(c.o),y2=y(c.c),top=Math.min(y1,y2),h=Math.max(1,Math.abs(y2-y1));bc.fillRect(cx-bw/2,top,bw,h)}const cp=slice[slice.length-1].c,cpy=y(cp);oc.setLineDash([4,4]);oc.strokeStyle='#ffcf54';oc.lineWidth=1;oc.beginPath();oc.moveTo(pad.l,cpy);oc.lineTo(W-pad.r,cpy);oc.stroke();oc.setLineDash([]);oc.fillStyle='#ffcf54';oc.fillRect(W-pad.r,cpy-9,pad.r-4,18);oc.fillStyle='#0d1730';oc.font='bold 11px system-ui';oc.textAlign='center';oc.fillText(fx(cp),W-pad.r+(pad.r-4)/2,cpy+4);const cur=slice[slice.length-1];oV.textContent=fx(cur.o);hV.textContent=fx(cur.h);lV.textContent=fx(cur.l);cV.textContent=fx(cur.c);const cls=cp>prevPriceForColor?'val up':(cp<prevPriceForColor?'val dn':'val');priceEl.className=cls;priceEl.textContent=fx(cp);prevPriceForColor=cp;const d=new Date();ptmH.textContent=String(d.getUTCHours()).padStart(2,'0')+':'+String(d.getUTCMinutes()).padStart(2,'0')+':'+String(d.getUTCSeconds()).padStart(2,'0')};const tick=()=>{st.p=step(st,TICK_MS);const now=Date.now();history.push({t:now,p:st.p});const bt=Math.floor(now/TF_MS)*TF_MS;let last=candles[candles.length-1];if(!last||last.t!==bt){last={t:bt,o:st.p,h:st.p,l:st.p,c:st.p};candles.push(last)}else{if(st.p>last.h)last.h=st.p;if(st.p<last.l)last.l=st.p;last.c=st.p}if(candles.length>2000)candles.splice(0,candles.length-2000);draw()};resize();draw();setInterval(tick,TICK_MS)})();</script></html>
