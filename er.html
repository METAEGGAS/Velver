<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>إنشاء حساب</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#131722;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:350px;
    background:#1e2433;
    padding:25px;
    border-radius:12px;
}

h2{
    color:#fff;
    text-align:center;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:none;
    border-radius:8px;
    background:#2d3446;
    color:#fff;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    border:none;
    border-radius:8px;
    background:#00b894;
    color:#fff;
    font-size:16px;
    cursor:pointer;
}

#msg{
    color:#fff;
    text-align:center;
    margin-top:15px;
}
</style>
</head>

<body>

<div class="box">
<h2>إنشاء حساب</h2>

<input type="email" id="email" placeholder="البريد الإلكتروني">
<input type="password" id="password" placeholder="كلمة المرور">

<button id="signup">إنشاء حساب</button>

<p id="msg"></p>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.16.0/firebase-auth.js";

const firebaseConfig = {
  apiKey: "AIzaSyDQIKQ5swu_XnVtqET0B9EelRKFjr0LXHI",
  authDomain: "ksksjsh-724f2.firebaseapp.com",
  projectId: "ksksjsh-724f2",
  storageBucket: "ksksjsh-724f2.firebasestorage.app",
  messagingSenderId: "1046924412561",
  appId: "1:1046924412561:web:1a40834236da75d0d6e130",
  measurementId: "G-5D3YJQDH8B"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);

document.getElementById("signup").onclick = () => {

    const email = document.getElementById("email").value;
    const password = document.getElementById("password").value;

    createUserWithEmailAndPassword(auth, email, password)
    .then((userCredential) => {
        document.getElementById("msg").innerText = "✅ تم إنشاء الحساب بنجاح";
        console.log(userCredential.user);
    })
    .catch((error) => {
        document.getElementById("msg").innerText = error.message;
    });

};
</script>

</body>
</html>
